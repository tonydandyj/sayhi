<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国語A1 フラッシュカード</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;700&family=ZCOOL+XiaoWei&display=swap');

:root {
  --ink: #1a1208;
  --paper: #faf7f1;
  --red: #c0392b;
  --red-light: #f5e6e4;
  --gold: #b8941f;
  --gold-light: #f0e6c0;
  --green: #2d6a4f;
  --green-light: #d8ede4;
  --bg: #eee8d8;
  --border: #d4c9a8;
  --shadow: rgba(0,0,0,0.13);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Serif JP',serif;background:var(--bg);color:var(--ink);min-height:100vh;}

/* HEADER */
header{background:var(--ink);padding:14px 16px 10px;text-align:center;position:relative;overflow:hidden;}
header::before{content:'中';position:absolute;left:-10px;top:-12px;font-size:110px;color:rgba(255,255,255,0.04);font-family:'ZCOOL XiaoWei',serif;pointer-events:none;}
header h1{font-family:'ZCOOL XiaoWei',serif;font-size:1.5rem;letter-spacing:.12em;color:var(--gold-light);}
header p{font-size:.72rem;color:rgba(240,230,192,.6);margin-top:2px;}

/* STATS BAR */
.stats-bar{display:flex;justify-content:space-around;align-items:center;background:var(--ink);border-top:1px solid rgba(255,255,255,.07);padding:8px 0 10px;}
.stat-item{text-align:center;}
.stat-num{font-size:1.4rem;font-weight:700;font-family:'ZCOOL XiaoWei',serif;color:var(--gold-light);line-height:1;}
.stat-label{font-size:.6rem;color:rgba(240,230,192,.55);margin-top:2px;letter-spacing:.06em;}
.stat-item.green .stat-num{color:#6ecfa0;}
.stat-item.red .stat-num{color:#f08080;}

/* MODE BAR */
.mode-bar{display:flex;align-items:center;gap:8px;padding:10px 14px 6px;flex-wrap:wrap;}
.mode-toggle{display:flex;background:var(--ink);border-radius:7px;overflow:hidden;flex-shrink:0;}
.mode-btn{padding:7px 12px;font-family:'Noto Serif JP',serif;font-size:.75rem;border:none;cursor:pointer;background:transparent;color:rgba(240,230,192,.55);transition:all .18s;}
.mode-btn.active{background:var(--gold);color:var(--ink);font-weight:700;}
.btn-top{padding:6px 11px;border-radius:7px;font-family:'Noto Serif JP',serif;font-size:.73rem;cursor:pointer;transition:all .18s;white-space:nowrap;border:1.5px solid var(--border);background:var(--paper);color:var(--ink);}
.btn-top:hover{background:var(--border);}
.btn-top.danger{border-color:var(--red);background:var(--red-light);color:var(--red);}
.btn-top.danger:hover{background:var(--red);color:#fff;}

/* CATEGORY SLIDER */
.cat-slider-wrap{position:relative;padding:4px 14px 0;margin-bottom:2px;}
.cat-slider{display:flex;gap:7px;overflow-x:auto;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;padding:6px 0 12px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.cat-slider::-webkit-scrollbar{height:4px;}
.cat-slider::-webkit-scrollbar-track{background:transparent;}
.cat-slider::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.cat-pill{flex-shrink:0;padding:6px 13px;border-radius:20px;font-size:.72rem;cursor:pointer;font-family:'Noto Serif JP',serif;border:1.5px solid var(--border);background:var(--paper);color:#7a6e58;transition:all .15s;white-space:nowrap;}
.cat-pill:hover:not(.active){border-color:var(--gold);color:var(--gold);}
.cat-pill.active{background:var(--ink);color:var(--gold-light);border-color:var(--ink);}
.cat-slider-wrap::after{content:'';position:absolute;right:14px;top:0;bottom:12px;width:36px;background:linear-gradient(to right,transparent,var(--bg));pointer-events:none;}

/* PROGRESS */
.prog-wrap{height:4px;background:var(--border);margin:0 14px 10px;border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--red));border-radius:2px;transition:width .4s ease;}

/* COUNTER */
.card-counter{text-align:center;font-size:.72rem;color:#9a8e76;margin-bottom:8px;letter-spacing:.04em;}

/* CARD */
.card-scene{perspective:1000px;padding:0 14px;margin-bottom:14px;}
.card{width:100%;min-height:245px;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);cursor:pointer;}
.card.flipped{transform:rotateY(180deg);}
.card-face{position:absolute;width:100%;min-height:245px;backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 22px 42px;box-shadow:0 3px 18px var(--shadow),0 0 0 1px var(--border);}
.card-front{background:var(--paper);background-image:radial-gradient(circle at 5% 5%,rgba(184,148,31,.06) 0%,transparent 40%),radial-gradient(circle at 95% 95%,rgba(192,57,43,.04) 0%,transparent 40%);}
.card-back{background:var(--ink);transform:rotateY(180deg);background-image:radial-gradient(circle at 15% 85%,rgba(184,148,31,.15) 0%,transparent 50%),radial-gradient(circle at 85% 15%,rgba(192,57,43,.1) 0%,transparent 50%);}
.card-cat{font-size:.65rem;letter-spacing:.1em;padding:2px 10px;border-radius:20px;margin-bottom:14px;font-family:'Noto Serif JP',serif;}
.card-front .card-cat{background:var(--gold-light);color:var(--gold);}
.card-back  .card-cat{background:rgba(184,148,31,.25);color:var(--gold-light);}
.card-question{font-size:1.5rem;text-align:center;line-height:1.5;font-weight:400;color:var(--ink);}
.card-hint{margin-top:8px;font-size:.75rem;color:#a09070;letter-spacing:.04em;text-align:center;}
.tap-hint-f,.tap-hint-b{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:.67rem;letter-spacing:.07em;white-space:nowrap;}
.tap-hint-f{color:var(--border);}
.tap-hint-b{color:rgba(240,230,192,.35);}
.ans-cn{font-family:'ZCOOL XiaoWei','Noto Sans SC',serif;font-size:2rem;color:var(--gold-light);text-align:center;line-height:1.4;margin-bottom:8px;}
.ans-py{font-size:.88rem;color:rgba(240,230,192,.65);text-align:center;margin-bottom:8px;letter-spacing:.05em;}
.ans-ja{font-size:1.05rem;color:rgba(240,230,192,.9);text-align:center;line-height:1.6;}
.audio-btn{margin-top:14px;padding:6px 16px;border-radius:20px;border:1px solid rgba(184,148,31,.5);background:rgba(184,148,31,.15);color:var(--gold-light);font-size:.74rem;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:5px;font-family:'Noto Serif JP',serif;}
.audio-btn:hover{background:rgba(184,148,31,.3);}
.audio-btn.playing{background:rgba(192,57,43,.3);border-color:rgba(192,57,43,.6);}

/* BOTTOM BUTTONS */
.btn-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:7px;padding:0 14px;margin-bottom:10px;}
.btn{padding:10px 5px;border-radius:9px;border:none;cursor:pointer;font-family:'Noto Serif JP',serif;font-size:.74rem;font-weight:700;letter-spacing:.04em;transition:all .16s;display:flex;flex-direction:column;align-items:center;gap:3px;}
.btn svg{width:15px;height:15px;}
.btn:active{transform:scale(.96);}
.btn-show{background:var(--gold-light);color:var(--gold);border:2px solid var(--gold);}
.btn-show:hover{background:var(--gold);color:#fff;}
.btn-back2{background:var(--paper);color:var(--ink);border:2px solid var(--border);}
.btn-back2:hover{background:var(--border);}
.btn-next{background:var(--ink);color:var(--gold-light);}
.btn-next:hover{background:#2d2416;}
.btn-mem{background:var(--green-light);color:var(--green);border:2px solid var(--green);}
.btn-mem:hover{background:var(--green);color:#fff;}

/* FINISH */
.finish{display:none;text-align:center;padding:40px 20px;margin:0 14px;background:var(--paper);border-radius:14px;border:1px solid var(--border);}
.finish-icon{font-size:3rem;margin-bottom:8px;}
.finish h3{font-family:'ZCOOL XiaoWei',serif;font-size:1.6rem;color:var(--gold);margin-bottom:10px;}
.finish p{color:#7a6e58;margin-bottom:20px;font-size:.88rem;line-height:1.8;}
.btn-restart{padding:11px 26px;background:var(--ink);color:var(--gold-light);border:none;border-radius:9px;cursor:pointer;font-family:'Noto Serif JP',serif;font-size:.88rem;}

/* SHORTCUT */
.shortcut-hint{text-align:center;font-size:.63rem;color:#b0a48a;padding:8px 14px 20px;letter-spacing:.05em;}

@media(max-width:480px){
  .card-question{font-size:1.2rem;}
  .ans-cn{font-size:1.55rem;}
  .btn{font-size:.68rem;padding:9px 3px;}
  .mode-btn{font-size:.7rem;padding:6px 8px;}
}
</style>
</head>
<body>

<header>
  <h1>中国語 A1 フラッシュカード</h1>
  <p>Chinese A1 Flashcard — 約400例文</p>
</header>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-num" id="sTotal">0</div><div class="stat-label">総問題数</div></div>
  <div class="stat-item red"><div class="stat-num" id="sRemain">0</div><div class="stat-label">残り</div></div>
  <div class="stat-item green"><div class="stat-num" id="sMem">0</div><div class="stat-label">覚えた</div></div>
  <div class="stat-item"><div class="stat-num" id="sPct">0%</div><div class="stat-label">達成率</div></div>
</div>

<div class="mode-bar">
  <div class="mode-toggle">
    <button class="mode-btn active" id="btnJC" onclick="setMode('jc')">🇯🇵→🇨🇳 和文中訳</button>
    <button class="mode-btn" id="btnCJ" onclick="setMode('cj')">🇨🇳→🇯🇵 中文和訳</button>
  </div>
  <button class="btn-top" onclick="doShuffle()">🔀 シャッフル</button>
  <button class="btn-top" id="btnMute" onclick="toggleMute()">🔊 ON</button>
  <button class="btn-top danger" onclick="clearAll()">↩ チェック解除</button>
</div>

<div class="cat-slider-wrap">
  <div class="cat-slider" id="catSlider"></div>
</div>

<div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
<div class="card-counter" id="cardCounter">1 / 1</div>

<div class="card-scene">
  <div class="card" id="flashCard" onclick="toggleCard()">
    <div class="card-face card-front">
      <span class="card-cat" id="cardCat">カテゴリー</span>
      <div class="card-question" id="cardQ">読み込み中...</div>
      <div class="card-hint" id="cardHint"></div>
      <span class="tap-hint-f">👆 タップして答えを見る</span>
    </div>
    <div class="card-face card-back">
      <span class="card-cat" id="cardCatB">答え</span>
      <div class="ans-cn" id="ansCN"></div>
      <div class="ans-py" id="ansPY"></div>
      <div class="ans-ja" id="ansJA"></div>
      <button class="audio-btn" id="audioBtn" onclick="speakNow(event)">🔊 読み上げ</button>
      <span class="tap-hint-b">👆 タップして問題に戻る</span>
    </div>
  </div>
</div>

<div class="btn-row">
  <button class="btn btn-back2" onclick="prevCard()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>← 戻る
  </button>
  <button class="btn btn-show" onclick="toggleCard()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>▶ 表示
  </button>
  <button class="btn btn-mem" onclick="markMem()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>✓ 覚えた
  </button>
  <button class="btn btn-next" onclick="nextCard()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>次へ →
  </button>
</div>

<div class="finish" id="finishDiv">
  <div class="finish-icon">🏆</div>
  <h3>コンプリート！</h3>
  <p>すべての例文を覚えました！<br>中国語力が大幅アップ！<br><br>チェック解除してもう一度挑戦しよう。</p>
  <button class="btn-restart" onclick="restart()">🔄 最初からやり直す</button>
</div>

<div class="shortcut-hint">→ 次へ　← 戻る　Space/Enter 答えを見る　M 覚えた</div>

// ================================================================
// STATE
// ================================================================
let mode = 'jc';
let catId = 'all';
let allCards = [];
let deck = [];
let idx = 0;
let flipped = false;
let memorized = new Set();
let hist = [];
let muted = false;

// ================================================================
// INIT
// ================================================================
function init() {
  buildSlider();
  loadMem();
  rebuildDeck();
  render();
}

function buildSlider() {
  const sl = document.getElementById('catSlider');
  sl.innerHTML = '';
  CATS.forEach(c => {
    const count = c.id === 'all'
      ? CATS.filter(x => x.id !== 'all').reduce((s,x) => s + x.cards.length, 0)
      : c.cards.length;
    const pill = document.createElement('button');
    pill.className = 'cat-pill' + (c.id === 'all' ? ' active' : '');
    pill.textContent = c.id === 'all' ? `🗂 すべて (${count})` : `${c.name} (${count})`;
    pill.onclick = () => selectCat(c.id);
    pill.dataset.cat = c.id;
    sl.appendChild(pill);
  });
}

function selectCat(id) {
  catId = id;
  document.querySelectorAll('.cat-pill').forEach(p =>
    p.classList.toggle('active', p.dataset.cat === id)
  );
  const active = document.querySelector('.cat-pill.active');
  if (active) active.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  loadMem();
  rebuildDeck();
  render();
}

function rebuildDeck() {
  if (catId === 'all') {
    allCards = CATS.filter(c => c.id !== 'all').flatMap(c =>
      c.cards.map(card => ({...card, cat: c.name}))
    );
  } else {
    const cat = CATS.find(c => c.id === catId);
    allCards = cat ? cat.cards.map(card => ({...card, cat: cat.name})) : [];
  }
  deck = allCards.filter((_, i) => !memorized.has(String(i)));
  idx = 0; flipped = false; hist = [];
  document.getElementById('finishDiv').style.display = 'none';
}

// ================================================================
// RENDER
// ================================================================
function render() {
  updateStats();
  if (!deck.length) {
    document.getElementById('finishDiv').style.display = 'block';
    return;
  }
  document.getElementById('finishDiv').style.display = 'none';
  const card = deck[idx];
  document.getElementById('flashCard').classList.remove('flipped');
  flipped = false;
  document.getElementById('cardCat').textContent = card.cat;
  document.getElementById('cardCatB').textContent = card.cat;
  document.getElementById('cardCounter').textContent = `${idx + 1} / ${deck.length}`;

  if (mode === 'jc') {
    document.getElementById('cardQ').textContent = card.ja;
    document.getElementById('cardHint').textContent = '';
    document.getElementById('ansCN').textContent = card.cn;
    document.getElementById('ansCN').style.display = '';
    document.getElementById('ansPY').textContent = card.py;
    document.getElementById('ansPY').style.display = '';
    document.getElementById('ansJA').textContent = '';
    document.getElementById('ansJA').style.display = 'none';
  } else {
    document.getElementById('cardQ').textContent = card.cn;
    document.getElementById('cardHint').textContent = card.py;
    document.getElementById('ansCN').style.display = 'none';
    document.getElementById('ansPY').style.display = 'none';
    document.getElementById('ansJA').textContent = card.ja;
    document.getElementById('ansJA').style.display = '';
  }
}

function updateStats() {
  const total = allCards.length;
  const mem = allCards.filter((_,i) => memorized.has(String(i))).length;
  const remain = deck.length;
  const pct = total > 0 ? Math.round(mem / total * 100) : 0;
  document.getElementById('sTotal').textContent = total;
  document.getElementById('sRemain').textContent = remain;
  document.getElementById('sMem').textContent = mem;
  document.getElementById('sPct').textContent = pct + '%';
  document.getElementById('progFill').style.width = pct + '%';
}

// ================================================================
// ACTIONS
// ================================================================
function toggleCard() {
  const fc = document.getElementById('flashCard');
  if (!flipped) {
    fc.classList.add('flipped');
    flipped = true;
    if (!muted) setTimeout(speakNow, 420);
  } else {
    fc.classList.remove('flipped');
    flipped = false;
  }
}

function nextCard() {
  if (!deck.length) return;
  hist.push(idx);
  if (hist.length > 50) hist.shift();
  idx = (idx + 1) % deck.length;
  render();
}

function prevCard() {
  if (hist.length) { idx = hist.pop(); render(); }
}

function markMem() {
  if (!deck.length) return;
  const key = String(allCards.indexOf(deck[idx]));
  memorized.add(key);
  saveMem();
  deck.splice(idx, 1);
  hist = hist.filter(h => h < deck.length);
  if (idx >= deck.length) idx = 0;
  if (!deck.length) { updateStats(); document.getElementById('finishDiv').style.display = 'block'; return; }
  render();
}

function doShuffle() {
  deck.sort(() => Math.random() - .5);
  idx = 0; hist = [];
  render();
}

function clearAll() {
  memorized.clear();
  saveMem();
  rebuildDeck();
  render();
}

function restart() {
  document.getElementById('finishDiv').style.display = 'none';
  clearAll();
}

// ================================================================
// MODE / MUTE
// ================================================================
function setMode(m) {
  mode = m;
  document.getElementById('btnJC').classList.toggle('active', m === 'jc');
  document.getElementById('btnCJ').classList.toggle('active', m === 'cj');
  rebuildDeck();
  render();
}

function toggleMute() {
  muted = !muted;
  document.getElementById('btnMute').textContent = muted ? '🔇 OFF' : '🔊 ON';
}

// ================================================================
// SPEECH
// ================================================================
function speakNow(e) {
  if (e) e.stopPropagation();
  if (!deck.length || muted) return;
  const card = deck[idx];
  const btn = document.getElementById('audioBtn');
  speechSynthesis.cancel();
  const speak = (text, lang, cb) => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = 0.85;
    u.onend = cb || null;
    speechSynthesis.speak(u);
  };
  btn.classList.add('playing');
  const reset = () => btn.classList.remove('playing');
  if (mode === 'jc') {
    speak(card.cn, 'zh-CN', () => setTimeout(() => speak(card.cn, 'zh-CN', reset), 300));
  } else {
    speak(card.ja, 'ja-JP', reset);
  }
}

// ================================================================
// STORAGE
// ================================================================
function saveMem() {
  try { localStorage.setItem('cn_mem_' + catId, JSON.stringify([...memorized])); } catch(e) {}
}
function loadMem() {
  try {
    const d = localStorage.getItem('cn_mem_' + catId);
    memorized = d ? new Set(JSON.parse(d)) : new Set();
  } catch(e) { memorized = new Set(); }
}

// ================================================================
// KEYBOARD
// ================================================================
document.addEventListener('keydown', e => {
  if (['Space','Enter'].includes(e.code)) { e.preventDefault(); toggleCard(); }
  if (e.code === 'ArrowRight') nextCard();
  if (e.code === 'ArrowLeft')  prevCard();
  if (e.code === 'KeyM' || e.code === 'KeyC') markMem();
});

window.onload = init;
</script>
