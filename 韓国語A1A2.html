<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>韓国語フラッシュカード A1/A2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500&family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --red: #C0392B; --red2: #e74c3c;
  --blue: #003893; --blue2: #2980d4;
  --bg: #0d0f1a; --srf: #161929; --srf2: #1e2236; --srf3: #252942;
  --text: #f0f2ff; --muted: #8b90b0;
  --border: rgba(192,57,43,0.2); --border2: rgba(0,56,147,0.3);
  --jp: "M PLUS Rounded 1c", sans-serif;
  --kr: "Noto Sans KR", sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--jp);
  background: var(--bg); color: var(--text);
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
}

/* HEADER */
.header {
  width: 100%;
  background: linear-gradient(135deg, var(--blue) 0%, #001f5c 50%, #1a000a 100%);
  border-bottom: 2px solid var(--red);
  padding: 13px 18px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 4px 20px rgba(192,57,43,0.3);
}
.header h1 { font-size: clamp(0.95rem, 3vw, 1.2rem); font-weight: 700; }
.header h1 span { color: var(--red2); }
.header-controls { display: flex; gap: 8px; align-items: center; }
.icon-btn {
  background: transparent; border: 1.5px solid var(--border);
  border-radius: 9px; padding: 7px 10px; cursor: pointer;
  color: var(--muted); font-size: 1rem; transition: all 0.2s;
  display: flex; align-items: center;
}
.icon-btn:hover { color: var(--text); border-color: var(--red); }

/* MODE */
.mode-selector {
  display: flex; gap: 6px; padding: 10px 16px;
  width: 100%; max-width: 700px; justify-content: center;
}
.mode-btn {
  font-family: var(--jp); padding: 7px 12px; border-radius: 20px;
  border: 1.5px solid var(--border2); background: var(--srf);
  color: var(--muted); cursor: pointer; font-size: 0.78rem;
  transition: all 0.2s; white-space: nowrap;
}
.mode-btn:hover { border-color: var(--red); color: var(--text); }
.mode-btn.active {
  background: linear-gradient(135deg, var(--red), #8a0020);
  border-color: var(--red); color: white; font-weight: 700;
}

/* STATS */
.stats-bar {
  display: flex; gap: 14px; padding: 8px 16px;
  background: var(--srf); border-radius: 10px;
  margin: 4px 16px; width: calc(100% - 32px); max-width: 668px;
  font-size: 0.78rem; color: var(--muted); align-items: center;
}
.stats-bar span { white-space: nowrap; }
.stats-bar span b { color: var(--text); }
.stats-bar .progress-wrap {
  flex: 1; height: 6px; background: var(--srf3);
  border-radius: 3px; overflow: hidden; min-width: 40px;
}
.stats-bar .progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--red), var(--blue));
  border-radius: 3px; transition: width 0.4s;
}

/* CATEGORY FILTER */
.cat-scroll {
  width: 100%; max-width: 700px;
  padding: 6px 16px;
  overflow-x: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--red) var(--srf);
}
.cat-scroll::-webkit-scrollbar { height: 4px; }
.cat-scroll::-webkit-scrollbar-track { background: var(--srf); }
.cat-scroll::-webkit-scrollbar-thumb { background: var(--red); border-radius: 3px; }
.cat-inner {
  display: flex; gap: 6px; width: max-content;
}
.cat-btn {
  font-family: var(--jp); padding: 5px 11px; border-radius: 14px;
  border: 1.5px solid var(--border2); background: var(--srf);
  color: var(--muted); cursor: pointer; font-size: 0.72rem;
  transition: all 0.2s; white-space: nowrap;
}
.cat-btn:hover { border-color: var(--blue); color: var(--text); }
.cat-btn.active { background: var(--blue); border-color: var(--blue); color: white; font-weight: 700; }

/* CARD AREA */
.card-area {
  width: 100%; max-width: 700px;
  padding: 14px 16px; flex: 1;
  display: flex; flex-direction: column;
  align-items: center; gap: 12px;
}

/* FLASHCARD */
.flashcard {
  width: 100%; background: var(--srf);
  border-radius: 18px; border: 1.5px solid var(--border);
  padding: 32px 24px; min-height: 220px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative; cursor: pointer;
  transition: border-color 0.2s, box-shadow 0.2s;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
}
.flashcard:hover { border-color: var(--red); box-shadow: 0 8px 40px rgba(192,57,43,0.15); }
.card-cat-label {
  position: absolute; top: 13px; left: 16px;
  font-size: 0.68rem; color: var(--muted);
  background: var(--srf2); padding: 3px 8px;
  border-radius: 7px; border: 1px solid var(--border2);
  max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.card-counter {
  position: absolute; top: 13px; right: 16px;
  font-size: 0.68rem; color: var(--muted);
}
.done-badge {
  position: absolute; top: 13px; right: 16px;
  font-size: 0.68rem; color: #2ecc71;
  background: rgba(46,204,113,0.15);
  border: 1px solid rgba(46,204,113,0.3);
  padding: 2px 7px; border-radius: 7px;
  display: none;
}
.card-question { text-align: center; width: 100%; }
.card-answer   { text-align: center; width: 100%; display: none; }
.flashcard.revealed .card-question { display: none; }
.flashcard.revealed .card-answer   { display: block; }

.kr-text  { font-family: var(--kr); font-size: clamp(1.7rem, 6.5vw, 3rem); font-weight: 400; line-height: 1.35; margin-bottom: 6px; }
.rom-text { font-size: clamp(0.78rem, 2.3vw, 0.95rem); color: var(--muted); font-style: italic; margin-bottom: 4px; }
.jp-text  { font-size: clamp(1.3rem, 4.5vw, 1.9rem); font-weight: 500; }
.hint-text { font-size: 0.73rem; color: var(--muted); margin-top: 10px; opacity: 0.6; }

/* SPEAK */
.speak-btn {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 16px; padding: 8px 20px; border-radius: 20px;
  border: 1.5px solid rgba(46,204,113,0.4);
  background: rgba(46,204,113,0.08); color: #2ecc71;
  font-family: var(--jp); font-size: 0.83rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.speak-btn:hover { background: rgba(46,204,113,0.18); }
.speak-btn.playing { background: rgba(46,204,113,0.22); border-color: #2ecc71; animation: pulse-s 0.8s ease-in-out infinite alternate; }
@keyframes pulse-s { from { box-shadow: 0 0 4px rgba(46,204,113,0.2); } to { box-shadow: 0 0 16px rgba(46,204,113,0.5); } }

/* CONTROLS */
.card-controls {
  display: flex; gap: 8px; align-items: center;
  justify-content: center; flex-wrap: wrap; width: 100%;
}
.ctrl-btn {
  font-family: var(--jp); padding: 10px 16px; border-radius: 11px;
  border: 1.5px solid var(--border2); background: var(--srf2);
  color: var(--text); cursor: pointer; font-size: 0.82rem; transition: all 0.2s; white-space: nowrap;
}
.ctrl-btn:hover { background: var(--srf3); }
.btn-prev  { border-color: var(--border); color: var(--muted); }
.btn-prev:hover { color: var(--text); }
.btn-show  { background: linear-gradient(135deg, var(--red), #8a0020); border-color: var(--red); color: #fff; font-weight: 700; padding: 10px 18px; }
.btn-show:hover { opacity: 0.88; }
.btn-hide  { background: var(--srf2); border-color: #555a7a; color: var(--muted); font-weight: 600; padding: 10px 18px; }
.btn-hide:hover  { border-color: var(--red); color: var(--text); }
.btn-done  { border-color: #2ecc71; color: #2ecc71; background: transparent; }
.btn-done:hover  { background: rgba(46,204,113,0.1); }
.btn-done.marked { background: rgba(46,204,113,0.15); font-weight: 700; }
.btn-next  { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 700; }
.btn-next:hover { opacity: 0.85; }

/* COMPLETE */
.complete-screen { display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 20px; gap: 16px; }
.complete-screen.show { display: flex; }
.complete-screen .trophy { font-size: 4rem; }
.complete-screen h2 { font-size: 1.5rem; color: var(--red2); }
.complete-screen p { color: var(--muted); }
.reset-btn { font-family: var(--jp); padding: 12px 28px; border-radius: 11px; border: none; background: linear-gradient(135deg, var(--red), var(--blue)); color: #fff; font-size: 0.95rem; font-weight: 700; cursor: pointer; margin-top: 6px; }

/* LIST MODAL */
.list-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; justify-content: center; align-items: flex-start; padding: 16px; }
.list-modal-overlay.show { display: flex; }
.list-modal { background: var(--srf); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 720px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.6); }
.list-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 13px 18px; border-bottom: 1px solid var(--border); background: linear-gradient(135deg, var(--blue) 0%, #001f5c 100%); flex-shrink: 0; }
.list-modal-header h2 { font-size: 1rem; font-weight: 700; color: #fff; }
.list-modal-header span { font-size: 0.8rem; color: rgba(255,255,255,0.6); margin-left: 8px; }
.list-close-btn { font-family: var(--jp); background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); border-radius: 7px; padding: 6px 12px; cursor: pointer; color: #fff; font-size: 0.82rem; }
.list-modal-search { padding: 10px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.list-modal-search input { width: 100%; background: var(--srf2); border: 1px solid var(--border2); border-radius: 8px; padding: 8px 12px; color: var(--text); font-family: var(--jp); font-size: 0.9rem; outline: none; }
.list-modal-search input::placeholder { color: var(--muted); }
.list-modal-body { flex: 1; overflow-y: auto; }
.list-cat-header { position: sticky; top: 0; background: var(--srf); padding: 7px 16px; font-size: 0.72rem; font-weight: 700; color: var(--red2); letter-spacing: 0.06em; border-bottom: 1px solid var(--border); z-index: 5; }
.list-row { display: grid; grid-template-columns: 1fr 1fr; padding: 9px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); cursor: pointer; transition: background 0.1s; }
.list-row:hover { background: var(--srf2); }
.list-row.mastered { opacity: 0.4; }
.list-jp { font-size: 0.83rem; line-height: 1.4; }
.list-kr { font-family: var(--kr); font-size: 0.9rem; font-weight: 400; line-height: 1.4; }
.list-rom { font-size: 0.68rem; color: var(--muted); font-style: italic; margin-top: 2px; }
</style>
</head>
<body>

<!-- LIST MODAL -->
<div class="list-modal-overlay" id="listModalOverlay">
  <div class="list-modal">
    <div class="list-modal-header">
      <div><h2>📋 例文一覧<span id="listCount"></span></h2></div>
      <button class="list-close-btn" id="listCloseBtn">✕ 閉じる</button>
    </div>
    <div class="list-modal-search">
      <input type="text" id="listSearch" placeholder="日本語・韓国語・発音で検索…">
    </div>
    <div class="list-modal-body" id="listModalBody"></div>
  </div>
</div>

<!-- HEADER -->
<header class="header">
  <h1>🇰🇷 韓国語 <span>フラッシュカード A1/A2</span></h1>
  <div class="header-controls">
    <button class="icon-btn" id="listBtn">📋</button>
    <button class="icon-btn" id="shuffleBtn">🔀</button>
    <button class="icon-btn" id="muteBtn">🔊</button>
  </div>
</header>

<!-- MODE -->
<div class="mode-selector">
  <button class="mode-btn active" data-mode="jp2kr">JP → KR 和文韓訳</button>
  <button class="mode-btn" data-mode="kr2jp">KR → JP 韓文和訳</button>
  <button class="mode-btn" data-mode="rand">🎲 ランダム</button>
</div>

<!-- STATS -->
<div class="stats-bar">
  <span>全 <b id="totalCount">0</b></span>
  <span>残り <b id="remainCount">0</b></span>
  <span>✓ <b id="masteredCount">0</b></span>
  <div class="progress-wrap"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>
  <span><b id="percentCount">0</b>%</span>
</div>

<!-- CATEGORY -->
<div class="cat-scroll">
  <div class="cat-inner" id="catInner"></div>
</div>

<!-- CARD AREA -->
<div class="card-area">
  <div class="flashcard" id="flashcard" onclick="handleCardClick()">
    <div class="card-cat-label" id="cardCat"></div>
    <div class="card-counter" id="cardCounter"></div>
    <div class="done-badge" id="doneBadge">✓ 済</div>

    <div class="card-question" id="cardQuestion">
      <div class="jp-text"  id="qJp"></div>
      <div class="kr-text"  id="qKr" style="display:none"></div>
      <div class="hint-text">▶ タップして答えを確認</div>
    </div>

    <div class="card-answer" id="cardAnswer">
      <div class="kr-text"  id="aKr"></div>
      <div class="rom-text" id="aRom"></div>
      <div class="jp-text"  id="aJp" style="display:none"></div>
      <button class="speak-btn" id="speakBtn" onclick="speakAnswer(event)">🔊 読み上げ</button>
    </div>
  </div>

  <div class="card-controls" id="cardControls">
    <button class="ctrl-btn btn-prev" onclick="prevCard()">← 戻る</button>
    <button class="ctrl-btn btn-show" id="showBtn" onclick="revealCard()">▶ 表示</button>
    <button class="ctrl-btn btn-hide" id="hideBtn" onclick="unrevealCard()" style="display:none">◀ 戻す</button>
    <button class="ctrl-btn btn-done" id="doneBtn" onclick="markDone()">✓ 覚えた</button>
    <button class="ctrl-btn btn-next" onclick="nextCard()">次へ →</button>
  </div>

  <div class="complete-screen" id="completeScreen">
    <div class="trophy">🏆</div>
    <h2>完了！おめでとうございます！</h2>
    <p id="completeMsg"></p>
    <button class="reset-btn" onclick="resetAll()">もう一度やり直す</button>
  </div>
</div>

const CARDS = RAW_CARDS.map((c,i)=>({...c,id:i}));
const S = { mode:'jp2kr', cardMode:'jp2kr', filtered:[], order:[], idx:0, done:new Set(), muted:false, activeCat:'すべて' };

function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function cur(){return S.order.length?CARDS[S.order[S.idx]]:null;}
function allCats(){const s=new Set(),r=['すべて'];CARDS.forEach(c=>{if(!s.has(c.cat)){s.add(c.cat);r.push(c.cat);}});return r;}
function getFiltered(){return S.activeCat==='すべて'?CARDS.map(c=>c.id):CARDS.filter(c=>c.cat===S.activeCat).map(c=>c.id);}

function updateStats(){
  const total=S.filtered.length, done=S.filtered.filter(id=>S.done.has(id)).length;
  document.getElementById('totalCount').textContent=total;
  document.getElementById('remainCount').textContent=total-done;
  document.getElementById('masteredCount').textContent=done;
  document.getElementById('percentCount').textContent=total?Math.round(done/total*100):0;
  document.getElementById('progressBar').style.width=(total?done/total*100:0)+'%';
}

function buildCats(){
  const inner=document.getElementById('catInner'); inner.innerHTML='';
  allCats().forEach(cat=>{
    const n=cat==='すべて'?CARDS.length:CARDS.filter(c=>c.cat===cat).length;
    const b=document.createElement('button');
    b.className='cat-btn'+(S.activeCat===cat?' active':'');
    b.textContent=cat+' ('+n+')';
    b.onclick=()=>{S.activeCat=cat;init();};
    inner.appendChild(b);
  });
}

function showCard(){
  const c=cur(); if(!c) return;
  S.cardMode = S.mode==='rand'?(Math.random()<.5?'jp2kr':'kr2jp'):S.mode;
  const m=S.cardMode, isDone=S.done.has(c.id);

  // reset state
  document.getElementById('flashcard').classList.remove('revealed');
  document.getElementById('showBtn').style.display='';
  document.getElementById('hideBtn').style.display='none';

  document.getElementById('cardCat').textContent=c.cat;
  document.getElementById('cardCounter').textContent=(S.idx+1)+' / '+S.order.length;
  document.getElementById('doneBadge').style.display=isDone?'block':'none';
  document.getElementById('doneBtn').className='ctrl-btn btn-done'+(isDone?' marked':'');

  // question
  const qJp=document.getElementById('qJp'), qKr=document.getElementById('qKr');
  if(m==='jp2kr'){ qJp.textContent=c.jp; qJp.style.display=''; qKr.style.display='none'; }
  else           { qKr.textContent=c.ne; qKr.style.display=''; qJp.style.display='none'; }

  // answer
  const aKr=document.getElementById('aKr'), aJp=document.getElementById('aJp');
  if(m==='jp2kr'){ aKr.textContent=c.ne; aKr.style.display=''; aJp.style.display='none'; }
  else           { aJp.textContent=c.jp; aJp.style.display=''; aKr.style.display='none'; }
  document.getElementById('aRom').textContent=c.rom;
}

function revealCard(){
  document.getElementById('flashcard').classList.add('revealed');
  document.getElementById('showBtn').style.display='none';
  document.getElementById('hideBtn').style.display='';
  const c=cur(); if(!c||S.muted) return;
  const btn=document.getElementById('speakBtn');
  window.speechSynthesis&&window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(S.cardMode==='jp2kr'?c.ne:c.jp);
  u.lang=S.cardMode==='jp2kr'?'ko-KR':'ja-JP'; u.rate=.85;
  btn.classList.add('playing');
  u.onend=u.onerror=()=>btn.classList.remove('playing');
  window.speechSynthesis&&window.speechSynthesis.speak(u);
}
function unrevealCard(){
  document.getElementById('flashcard').classList.remove('revealed');
  document.getElementById('showBtn').style.display='';
  document.getElementById('hideBtn').style.display='none';
  window.speechSynthesis&&window.speechSynthesis.cancel();
}
function handleCardClick(){
  if(!document.getElementById('flashcard').classList.contains('revealed')) revealCard();
  else unrevealCard();
}
function speakAnswer(e){
  e.stopPropagation();
  if(S.muted) return;
  const c=cur(); if(!c) return;
  window.speechSynthesis&&window.speechSynthesis.cancel();
  const btn=document.getElementById('speakBtn');
  const u=new SpeechSynthesisUtterance(S.cardMode==='jp2kr'?c.ne:c.jp);
  u.lang=S.cardMode==='jp2kr'?'ko-KR':'ja-JP'; u.rate=.85;
  btn.classList.add('playing');
  u.onend=u.onerror=()=>btn.classList.remove('playing');
  window.speechSynthesis.speak(u);
}

function nextCard(){S.idx=(S.idx+1)%S.order.length; showCard();}
function prevCard(){S.idx=(S.idx-1+S.order.length)%S.order.length; showCard();}
function markDone(){
  const c=cur(); if(!c) return;
  S.done.add(c.id); updateStats();
  document.getElementById('doneBtn').className='ctrl-btn btn-done marked';
  document.getElementById('doneBadge').style.display='block';
  if(S.filtered.every(id=>S.done.has(id))){
    document.getElementById('completeMsg').textContent=S.filtered.length+'枚すべて覚えました！🎉';
    document.getElementById('completeScreen').classList.add('show');
    return;
  }
  setTimeout(nextCard, 300);
}
function resetAll(){
  S.done.clear(); S.order=[...S.filtered]; S.idx=0;
  document.getElementById('completeScreen').classList.remove('show');
  updateStats(); showCard();
}

function init(){
  S.filtered=getFiltered(); S.order=[...S.filtered]; S.idx=0;
  buildCats(); updateStats(); showCard();
}

// mode buttons
document.querySelectorAll('.mode-btn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); S.mode=b.dataset.mode; showCard();
}));

document.getElementById('shuffleBtn').onclick=()=>{S.order=shuffle(S.order);S.idx=0;showCard();};
document.getElementById('muteBtn').onclick=()=>{
  S.muted=!S.muted;
  document.getElementById('muteBtn').textContent=S.muted?'🔇':'🔊';
};
document.getElementById('listBtn').onclick=()=>{
  document.getElementById('listSearch').value=''; buildList('');
  document.getElementById('listModalOverlay').classList.add('show');
};
document.getElementById('listCloseBtn').onclick=()=>document.getElementById('listModalOverlay').classList.remove('show');
document.getElementById('listModalOverlay').onclick=e=>{if(e.target.id==='listModalOverlay')document.getElementById('listModalOverlay').classList.remove('show');};
document.getElementById('listSearch').oninput=e=>buildList(e.target.value);

function buildList(q){
  const body=document.getElementById('listModalBody'); body.innerHTML='';
  q=(q||'').toLowerCase();
  const shown=CARDS.filter(c=>!q||c.ne.includes(q)||c.jp.includes(q)||c.rom.toLowerCase().includes(q));
  document.getElementById('listCount').textContent=' ('+shown.length+'件)';
  const g={}; shown.forEach(c=>(g[c.cat]=g[c.cat]||[]).push(c));
  Object.entries(g).forEach(([cat,cards])=>{
    const h=document.createElement('div'); h.className='list-cat-header'; h.textContent=cat; body.appendChild(h);
    cards.forEach(card=>{
      const r=document.createElement('div');
      r.className='list-row'+(S.done.has(card.id)?' mastered':'');
      r.innerHTML='<div><div class="list-jp">'+card.jp+'</div></div><div><div class="list-kr">'+card.ne+'</div><div class="list-rom">'+card.rom+'</div></div>';
      r.onclick=()=>{
        document.getElementById('listModalOverlay').classList.remove('show');
        const i=S.order.indexOf(card.id);
        if(i>=0){S.idx=i;}else{S.activeCat=card.cat;init();const j=S.order.indexOf(card.id);if(j>=0)S.idx=j;}
        showCard(); updateStats();
      };
      body.appendChild(r);
    });
  });
}

document.addEventListener('keydown',e=>{
  if(document.getElementById('listModalOverlay').classList.contains('show')){if(e.key==='Escape')document.getElementById('listModalOverlay').classList.remove('show');return;}
  if(e.key==='ArrowRight') nextCard();
  else if(e.key==='ArrowLeft') prevCard();
  else if(e.key==='Enter'&&!document.getElementById('flashcard').classList.contains('revealed')) revealCard();
  else if(e.key==='c'||e.key==='C') markDone();
});

init();
</script>
