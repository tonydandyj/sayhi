<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🇩🇪 ドイツ語 B1 フラッシュカード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&family=M+PLUS+Rounded+1c:wght@400;500;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --black:     #1a1a1a;
  --red:       #cc0000;
  --gold:      #ffcc00;
  --cream:     #fffdf0;
  --forest:    #2d5016;
  --text:      #1a1a2e;
  --text-mid:  #3d3d5c;
  --text-muted:#7a7a9a;
  --glass:     rgba(255,255,255,0.84);
  --glass2:    rgba(255,255,255,0.55);
  --border:    rgba(204,0,0,0.18);
  --border2:   rgba(204,0,0,0.35);
  --jp:        'M PLUS Rounded 1c', 'Nunito', sans-serif;
  --foreign:   'Noto Sans', 'Nunito', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--jp);
  background: linear-gradient(145deg,#fffbe8 0%,#fff3cd 40%,#ffe8a0 100%);
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* ===== HEADER ===== */
header{
  width:100%;
  background:linear-gradient(135deg,#1a1a1a 0%,#2d2d2d 60%,#1a0a0a 100%);
  padding:8px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
  box-shadow:0 3px 16px rgba(0,0,0,0.35);
  z-index:10;
}
.header-title{
  font-family:var(--foreign);
  font-weight:800;
  font-size:clamp(0.9rem,2.8vw,1.15rem);
  color:#ffcc00;
  letter-spacing:0.03em;
  display:flex;align-items:center;gap:6px;
}
.header-title span{color:#fff;font-weight:600;font-size:0.9em;}
.header-btns{display:flex;gap:6px;}
.hbtn{
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,204,0,0.25);
  border-radius:8px;
  color:#ffcc00;
  font-size:1rem;
  width:34px;height:34px;
  cursor:pointer;
  transition:all .18s;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);
}
.hbtn:hover{background:rgba(255,204,0,0.18);transform:scale(1.08);}
.hbtn:active{transform:scale(.92);}

/* ===== MODE SELECTOR ===== */
.mode-bar{
  display:flex;gap:7px;padding:7px 16px 5px;flex-shrink:0;
  width:100%;max-width:700px;
}
.mode-btn{
  flex:1;padding:6px 0;border-radius:50px;border:none;cursor:pointer;
  font-family:var(--jp);font-size:0.8rem;font-weight:700;
  background:var(--glass);color:var(--text-mid);
  border:1.5px solid var(--border);
  transition:all .2s;backdrop-filter:blur(8px);
  box-shadow:0 2px 8px rgba(0,0,0,0.07);
}
.mode-btn.active{
  background:linear-gradient(135deg,#1a1a1a 0%,#cc0000 100%);
  color:#ffcc00;border-color:transparent;
  box-shadow:0 3px 12px rgba(204,0,0,0.3);
}
.mode-btn:hover:not(.active){background:rgba(255,204,0,0.2);transform:translateY(-1px);}

/* ===== STATS ===== */
.stats-bar{
  display:flex;align-items:center;gap:8px;
  padding:4px 16px;flex-shrink:0;
  font-size:0.72rem;color:var(--text-mid);font-weight:600;
  width:100%;max-width:700px;
}
.stats-bar span{white-space:nowrap;}
.progress-wrap{flex:1;background:rgba(204,0,0,0.1);border-radius:4px;height:6px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#cc0000,#ffcc00);border-radius:4px;transition:width .4s ease;}
.pct{color:var(--red);font-weight:700;}

/* ===== CATEGORY SCROLL ===== */
.cat-scroll{
  overflow-x:auto;display:flex;gap:7px;
  padding:5px 16px 10px;flex-shrink:0;
  width:100%;max-width:700px;
  scrollbar-width:thin;
  scrollbar-color:var(--gold) rgba(204,0,0,.12);
}
.cat-scroll::-webkit-scrollbar{height:5px;}
.cat-scroll::-webkit-scrollbar-track{background:rgba(204,0,0,.10);border-radius:4px;}
.cat-scroll::-webkit-scrollbar-thumb{background:var(--gold);border-radius:4px;}
.cat-scroll::-webkit-scrollbar-thumb:hover{background:var(--red);}
.cat-pill{
  white-space:nowrap;padding:4px 12px;border-radius:50px;
  font-size:0.72rem;font-weight:700;border:none;cursor:pointer;
  background:var(--glass);color:var(--text-mid);
  border:1.5px solid var(--border);
  transition:all .18s;backdrop-filter:blur(6px);
  box-shadow:0 2px 6px rgba(0,0,0,0.06);
}
.cat-pill.active{
  background:linear-gradient(135deg,#1a1a1a 0%,#a00000 100%);
  color:#ffcc00;border-color:transparent;
  box-shadow:0 3px 10px rgba(204,0,0,0.28);
}
.cat-pill:hover:not(.active){background:rgba(255,204,0,0.2);transform:translateY(-1px);}

/* ===== CARD AREA ===== */
.card-area{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:0 16px;min-height:0;overflow:hidden;
  width:100%;max-width:700px;
}
.card{
  background:var(--glass);
  backdrop-filter:blur(18px);
  border-radius:20px;
  border:1px solid var(--border2);
  box-shadow:0 8px 32px rgba(204,0,0,0.12),0 2px 8px rgba(0,0,0,0.08);
  width:100%;max-width:680px;
  overflow:hidden;
  cursor:pointer;
  transition:transform .2s,box-shadow .2s;
  position:relative;
}
.card:hover{transform:translateY(-3px) scale(1.005);box-shadow:0 14px 40px rgba(204,0,0,0.18);}
.card:active{transform:scale(.98);}
.card-accent{
  height:4px;
  background:linear-gradient(90deg,#1a1a1a 33.3%,#cc0000 33.3% 66.6%,#ffcc00 66.6%);
}
.card-top{
  display:flex;justify-content:space-between;align-items:center;
  padding:9px 14px 4px;
}
.card-cat-label{
  font-size:0.68rem;font-weight:700;
  background:linear-gradient(135deg,rgba(26,26,26,0.1),rgba(204,0,0,0.1));
  color:var(--text-mid);padding:2px 9px;border-radius:50px;
  border:1px solid var(--border);
}
.card-counter{font-size:0.72rem;color:var(--text-muted);font-weight:600;}
.card-body{
  padding:12px 20px 16px;
  display:flex;flex-direction:column;align-items:center;text-align:center;
  min-height:130px;justify-content:center;
}
.card-question{
  font-family:var(--foreign);
  font-size:clamp(1.4rem,5vw,2.2rem);
  font-weight:700;color:var(--text);
  line-height:1.3;margin-bottom:8px;
}
.card-question.jp{
  font-family:var(--jp);
  font-size:clamp(1.1rem,4vw,1.7rem);
}
.card-hint{font-size:0.75rem;color:var(--text-muted);margin-top:4px;}
.card-answer{
  font-family:var(--foreign);
  font-size:clamp(1.3rem,4.5vw,2rem);
  font-weight:700;color:var(--red);
  line-height:1.3;margin-bottom:8px;
}
.card-answer.jp{
  font-family:var(--jp);
  font-size:clamp(1.1rem,3.5vw,1.6rem);
}
.card-divider{width:60px;height:2px;background:linear-gradient(90deg,#cc0000,#ffcc00);border-radius:2px;margin:8px auto;}
.speak-btn{
  background:linear-gradient(135deg,rgba(204,0,0,0.12),rgba(255,204,0,0.12));
  border:1.5px solid var(--border2);
  border-radius:50px;padding:5px 14px;
  font-size:0.82rem;cursor:pointer;color:var(--text-mid);
  transition:all .18s;margin-top:4px;
  display:flex;align-items:center;gap:5px;
  backdrop-filter:blur(6px);
}
.speak-btn:hover{background:rgba(255,204,0,0.25);transform:translateY(-1px);}
.speak-btn.playing{animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(204,0,0,0.3);}50%{box-shadow:0 0 0 7px rgba(204,0,0,0);}}

/* ===== CONTROLS ===== */
.controls{
  display:flex;gap:6px;padding:6px 16px 8px;flex-shrink:0;
  width:100%;max-width:700px;
}
.ctrl-btn{
  flex:1;padding:8px 4px;border-radius:12px;border:none;cursor:pointer;
  font-family:var(--jp);font-size:0.75rem;font-weight:700;
  transition:all .18s;backdrop-filter:blur(8px);
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}
.ctrl-btn:active{transform:scale(.93);}
.btn-prev,.btn-revert{background:var(--glass);color:var(--text-mid);border:1.5px solid var(--border);}
.btn-prev:hover,.btn-revert:hover{background:rgba(255,204,0,0.2);}
.btn-reveal{
  background:linear-gradient(135deg,#a00000 0%,#cc0000 100%);
  color:#fff;border:none;
  box-shadow:0 3px 12px rgba(204,0,0,0.3);
}
.btn-reveal:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(204,0,0,0.4);}
.btn-check{
  background:linear-gradient(135deg,#2d5016 0%,#3d7020 100%);
  color:#fff;border:none;
  box-shadow:0 3px 12px rgba(45,80,22,0.3);
}
.btn-check:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(45,80,22,0.4);}
.btn-check.checked{background:linear-gradient(135deg,#555,#777);box-shadow:none;}
.btn-next{
  background:linear-gradient(135deg,#cc9900 0%,#ffcc00 100%);
  color:#1a1a1a;border:none;
  box-shadow:0 3px 12px rgba(255,204,0,0.3);
}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(255,204,0,0.4);}

/* ===== KEYBOARD HINT ===== */
.kb-hint{
  text-align:center;font-size:0.62rem;color:var(--text-muted);
  padding:2px 16px 6px;flex-shrink:0;
  width:100%;max-width:700px;
}

/* ===== MODAL ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(26,26,26,0.65);
  backdrop-filter:blur(4px);z-index:100;
  display:none;align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--cream);
  border-radius:18px;
  width:min(94vw,620px);
  max-height:88vh;
  display:flex;flex-direction:column;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
.modal-header{
  background:linear-gradient(135deg,#1a1a1a 0%,#cc0000 100%);
  padding:14px 16px;
  display:flex;align-items:center;gap:10px;
}
.modal-title{font-family:var(--foreign);font-weight:800;color:#ffcc00;font-size:1rem;}
.modal-search{
  flex:1;padding:6px 12px;border-radius:50px;border:none;
  font-family:var(--jp);font-size:0.82rem;
  background:rgba(255,255,255,0.18);color:#fff;
  outline:none;
}
.modal-search::placeholder{color:rgba(255,255,255,0.5);}
.modal-close{
  background:rgba(255,255,255,0.15);border:none;border-radius:50%;
  width:30px;height:30px;cursor:pointer;color:#fff;font-size:1rem;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.modal-close:hover{background:rgba(255,255,255,0.3);}
.modal-body{overflow-y:auto;padding:0 0 10px;}
.modal-cat-header{
  font-weight:700;font-size:0.72rem;color:var(--red);
  padding:10px 14px 4px;text-transform:uppercase;letter-spacing:0.08em;
  border-bottom:1px solid var(--border);
}
.modal-row{
  display:flex;gap:8px;padding:7px 14px;
  cursor:pointer;transition:background .15s;align-items:flex-start;
  border-bottom:1px solid rgba(204,0,0,0.06);
}
.modal-row:hover{background:rgba(255,204,0,0.12);}
.modal-row.mastered{opacity:0.38;}
.modal-de{font-family:var(--foreign);font-weight:600;font-size:0.84rem;color:var(--text);flex:1;}
.modal-ja{font-size:0.78rem;color:var(--text-mid);flex:1;}

/* ===== COMPLETE OVERLAY ===== */
.complete-overlay{
  position:fixed;inset:0;
  background:rgba(255,252,220,0.88);
  backdrop-filter:blur(12px);
  z-index:200;
  display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:10px;
}
.complete-overlay.show{display:flex;}
.complete-icon{font-size:3.5rem;}
.complete-text{font-size:1.3rem;font-weight:800;color:var(--red);}
.complete-sub{font-size:0.85rem;color:var(--text-mid);}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-title">🇩🇪 <span>ドイツ語 B1</span> フラッシュカード</div>
  <div class="header-btns">
    <button class="hbtn" id="btnList" title="一覧">📋</button>
    <button class="hbtn" id="btnReset" title="リセット">🔄</button>
    <button class="hbtn" id="btnShuffle" title="シャッフル">🔀</button>
    <button class="hbtn" id="btnMute" title="ミュート">🔊</button>
  </div>
</header>

<!-- MODE -->
<div class="mode-bar">
  <button class="mode-btn active" data-mode="ja2de">和 → 独</button>

  <button class="mode-btn" data-mode="random">🎲 ランダム</button>
</div>

<!-- STATS -->
<div class="stats-bar">

</div>

<!-- CATEGORY SCROLL -->
<div class="cat-scroll" id="catScroll"></div>

<!-- CARD -->
<div class="card-area">

<!-- CONTROLS -->

  <button class="ctrl-btn btn-next" id="btnNext">次へ →</button>
</div>

<!-- KB HINT -->
<div class="kb-hint">→ 次へ ／ ← 戻る ／ Enter 答えを見る ／ C 覚えた</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">📋 例文一覧</span>
      <input class="modal-search" id="modalSearch" placeholder="検索…" autocomplete="off">
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- COMPLETE OVERLAY -->
<div class="complete-overlay" id="completeOverlay">
  <div class="complete-icon">🏆</div>
  <div class="complete-text">全カード完了！</div>
  <div class="complete-sub">チェックを解除してもう一度挑戦しましょう</div>
</div>

  {id:"pas18",cat:"受動態",foreign:"In Deutschland wird großen Wert darauf gelegt, den Müll sorgfältig zu trennen.",ja:"ドイツでは、ゴミをきちんと分別することが非常に重視されています。"},
  {id:"pas19",cat:"受動態",foreign:"Die Unterlagen werden im Moment noch von der Personalabteilung geprüft.",ja:"書類は現在、人事部によって確認されているところです。"},
  {id:"pas20",cat:"受動態",foreign:"Das Fenster ist geöffnet.",ja:"窓が開いています（開けられた状態です）。"},

  // ===== 接続法II式 =====
  {id:"k2_01",cat:"接続法II式",foreign:"Ich hätte gern ein Glas Wasser.",ja:"水を一杯いただきたいのですが。"},
  {id:"k2_02",cat:"接続法II式",foreign:"Könnten Sie mir bitte helfen?",ja:"手伝っていただけませんか？"},
  {id:"k2_03",cat:"接続法II式",foreign:"Wenn ich mehr Zeit hätte, würde ich verreisen.",ja:"もっと時間があれば、旅行するのに。"},
  {id:"k2_04",cat:"接続法II式",foreign:"Das wäre super!",ja:"それは素晴らしいですね！"},
  {id:"k2_05",cat:"接続法II式",foreign:"Ich würde gern mitkommen, aber ich muss arbeiten.",ja:"一緒に行きたいのですが、働かなくてはなりません。"},
  {id:"k2_06",cat:"接続法II式",foreign:"An deiner Stelle würde ich mich sofort beim Arzt anmelden.",ja:"君の立場なら、すぐに医者に予約を入れるけどな。"},
  {id:"k2_07",cat:"接続法II式",foreign:"Könnten Sie mir bitte erklären, wie ich zum Rathaus komme?",ja:"市役所への行き方を説明していただけますか？"},
  {id:"k2_08",cat:"接続法II式",foreign:"Wenn ich reich wäre, würde ich ein Haus am Meer kaufen.",ja:"お金持ちだったら、海辺の家を買うのに。"},
  {id:"k2_09",cat:"接続法II式",foreign:"Es wäre schön, wenn du morgen mitkommen könntest.",ja:"明日一緒に来てくれたら嬉しいんだけど。"},
  {id:"k2_10",cat:"接続法II式",foreign:"Ich hätte gern einen Termin am Donnerstagnachmittag.",ja:"木曜日の午後に予約を取りたいのですが。"},
  {id:"k2_11",cat:"接続法II式",foreign:"Dürfte ich Sie kurz um einen Gefallen bitten?",ja:"ちょっとお願いしてもよろしいですか？"},
  {id:"k2_12",cat:"接続法II式",foreign:"Wenn ich besser Deutsch sprechen könnte, würde ich mich für diese Stelle bewerben.",ja:"もっとドイツ語がうまく話せたら、このポストに応募するのに。"},
  {id:"k2_13",cat:"接続法II式",foreign:"Ich würde gerne mehr Zeit für meine Hobbys haben.",ja:"趣味のための時間がもっと欲しいです。"},
  {id:"k2_14",cat:"接続法II式",foreign:"Ich würde an deiner Stelle diese Gelegenheit nutzen.",ja:"私ならその機会を利用します。"},
  {id:"k2_15",cat:"接続法II式",foreign:"Es wäre besser, wenn wir früher anfangen würden.",ja:"もっと早く始めたほうが良いでしょう。"},
  {id:"k2_16",cat:"接続法II式",foreign:"Ich hätte das anders gemacht.",ja:"私なら違うやり方をしていたでしょう。"},
  {id:"k2_17",cat:"接続法II式",foreign:"Ich wüsste gern, ob der Kurs noch freie Plätze hat.",ja:"その講座にまだ空きがあるかどうか知りたいのですが。"},
  {id:"k2_18",cat:"接続法II式",foreign:"Wenn ich mehr Erfahrung hätte, würde ich mich auf diese Stelle bewerben.",ja:"もっと経験があればこの職に応募するでしょう。"},
  {id:"k2_19",cat:"接続法II式",foreign:"Ich würde Ihnen empfehlen, sich gut vorzubereiten.",ja:"よく準備することをおすすめします。"},
  {id:"k2_20",cat:"接続法II式",foreign:"Wenn ich du wäre, würde ich diese Chance nutzen.",ja:"私があなたならそのチャンスを使います。"},

  // ===== 接続法II式・過去 =====
  {id:"k2p01",cat:"接続法II式・過去",foreign:"Wenn ich das gewusst hätte, hätte ich mich anders entschieden.",ja:"それを知っていたら、違う決断をしていたのに。"},
  {id:"k2p02",cat:"接続法II式・過去",foreign:"Wir hätten den Zug noch erreicht, wenn wir fünf Minuten früher losgegangen wären.",ja:"5分早く出ていたら、電車に間に合っていたのに。"},
  {id:"k2p03",cat:"接続法II式・過去",foreign:"An seiner Stelle hätte ich das Angebot sofort angenommen.",ja:"彼の立場だったら、すぐにそのオファーを受けていただろう。"},
  {id:"k2p04",cat:"接続法II式・過去",foreign:"Hätte ich mehr gelernt, hätte ich eine bessere Note bekommen.",ja:"もっと勉強していたら、もっと良い成績を取れていたのに。"},
  {id:"k2p05",cat:"接続法II式・過去",foreign:"Das hätte nicht passieren dürfen.",ja:"そんなことは起きてはならなかった。"},
  {id:"k2p06",cat:"接続法II式・過去",foreign:"Es wäre schön gewesen, wenn Sie mich früher über die Änderung informiert hätten.",ja:"変更について、もっと早く知らせていただけていたら良かったのですが。"},
  {id:"k2p07",cat:"接続法II式・過去",foreign:"Ich wünschte, ich hätte früher mit dem Deutschlernen angefangen.",ja:"もっと早くドイツ語の勉強を始めていればよかったのに。"},
  {id:"k2p08",cat:"接続法II式・過去",foreign:"Ich hätte nie gedacht, dass mir das Leben im Ausland einmal so viel Freude bereiten würde.",ja:"海外での生活がこれほど楽しいものになるとは、かつては思いもしませんでした。"},

  // ===== zu不定詞句 =====
  {id:"inf01",cat:"zu不定詞句",foreign:"Ich habe vor, Deutsch zu lernen.",ja:"私はドイツ語を学ぶつもりです。"},
  {id:"inf02",cat:"zu不定詞句",foreign:"Es ist wichtig, regelmäßig zu üben.",ja:"定期的に練習することが重要です。"},
  {id:"inf03",cat:"zu不定詞句",foreign:"Er hat vergessen, das Licht auszuschalten.",ja:"彼は電気を消すのを忘れました。"},
  {id:"inf04",cat:"zu不定詞句",foreign:"Sie bittet mich, ihr zu helfen.",ja:"彼女は私に助けてと頼んでいます。"},
  {id:"inf05",cat:"zu不定詞句",foreign:"Ich lerne jeden Tag Deutsch, um die B1-Prüfung zu bestehen.",ja:"B1試験に合格するために、毎日ドイツ語を勉強している。"},
  {id:"inf06",cat:"zu不定詞句",foreign:"Es ist schwierig, in dieser Stadt eine bezahlbare Wohnung zu finden.",ja:"この街で手頃な家賃のアパートを見つけるのは難しい。"},
  {id:"inf07",cat:"zu不定詞句",foreign:"Er hat versucht, das Problem allein zu lösen.",ja:"彼は一人でその問題を解決しようとした。"},
  {id:"inf08",cat:"zu不定詞句",foreign:"Ich habe keine Lust, heute Abend auszugehen.",ja:"今晩出かける気分ではない。"},
  {id:"inf09",cat:"zu不定詞句",foreign:"Vergiss nicht, die Tür abzuschließen, bevor du gehst.",ja:"出かける前にドアの鍵をかけることを忘れないで。"},
  {id:"inf10",cat:"zu不定詞句",foreign:"Es lohnt sich, dieses Museum zu besuchen.",ja:"この美術館は訪れる価値がある。"},
  {id:"inf11",cat:"zu不定詞句",foreign:"Es fällt mir schwer, mich an das kalte Wetter zu gewöhnen.",ja:"寒い天候に慣れるのは私には大変だ。"},
  {id:"inf12",cat:"zu不定詞句",foreign:"Ich habe beschlossen, meine Karriere zu ändern.",ja:"キャリアを変えることに決めました。"},

  // ===== 副文・接続詞（weil/obwohl/damit） =====
  {id:"sub01",cat:"副文・接続詞",foreign:"Ich bleibe zu Hause, weil ich krank bin.",ja:"病気なので、家にいます。"},
  {id:"sub02",cat:"副文・接続詞",foreign:"Obwohl es geregnet hat, sind wir spazieren gegangen.",ja:"雨が降ったけれど、私たちは散歩に行きました。"},
  {id:"sub03",cat:"副文・接続詞",foreign:"Ich lerne Deutsch, damit ich in Deutschland studieren kann.",ja:"ドイツで勉強できるように、ドイツ語を学んでいます。"},
  {id:"sub04",cat:"副文・接続詞",foreign:"Sie fährt nach Berlin, um ihre Freunde zu besuchen.",ja:"彼女は友人を訪ねるためにベルリンへ行きます。"},
  {id:"sub05",cat:"副文・接続詞",foreign:"Da ich wenig Zeit hatte, habe ich das Treffen abgesagt.",ja:"時間がなかったので会議をキャンセルしました。"},
  {id:"sub06",cat:"副文・接続詞",foreign:"Der Zug hatte Verspätung, deshalb bin ich zu spät zur Arbeit gekommen.",ja:"電車が遅れたので仕事に遅れました。"},
  {id:"sub07",cat:"副文・接続詞",foreign:"Ich war müde, trotzdem habe ich weitergearbeitet.",ja:"疲れていたが仕事を続けました。"},
  {id:"sub08",cat:"副文・接続詞",foreign:"Er ist nicht nur fleißig, sondern auch sehr kreativ.",ja:"彼は勤勉なだけでなく、とても創造的でもある。"},
  {id:"sub09",cat:"副文・接続詞",foreign:"Entweder rufst du den Vermieter an, oder ich schreibe ihm eine E-Mail.",ja:"君が大家に電話するか、私がメールを書くかだ。"},
  {id:"sub10",cat:"副文・接続詞",foreign:"Weder das Hotel noch die Lage haben uns überzeugt.",ja:"ホテルも立地も私たちを納得させなかった。"},
  {id:"sub11",cat:"副文・接続詞",foreign:"Je länger ich Deutsch lerne, desto besser verstehe ich die kulturellen Unterschiede.",ja:"ドイツ語を学べば学ぶほど、文化的な違いがよりよく理解できるようになります。"},
  {id:"sub12",cat:"副文・接続詞",foreign:"Indem man regelmäßig liest, erweitert man seinen Wortschatz.",ja:"定期的に読書をすることで語彙が広がる。"},
  {id:"sub13",cat:"副文・接続詞",foreign:"Zwar war das Essen gut, aber der Service war katastrophal.",ja:"確かに料理はよかったが、サービスはひどかった。"},
  {id:"sub14",cat:"副文・接続詞",foreign:"Anstatt ständig zu klagen, könnte man versuchen, aktiv nach einer Lösung zu suchen.",ja:"いつも不満を言う代わりに、積極的に解決策を探そうとすることもできるはずです。"},
  {id:"sub15",cat:"副文・接続詞",foreign:"Je nachdem, wie das Wetter wird, fahren wir an den See oder bleiben zu Hause.",ja:"天気次第で、湖に行くか家にいるかだ。"},
  {id:"sub16",cat:"副文・接続詞",foreign:"Ich habe mir ein Fahrrad gekauft, damit ich nicht mehr so oft mit dem Auto fahren muss.",ja:"車にあまり頻繁に乗らなくてすむように、自転車を買いました。"},
  {id:"sub17",cat:"副文・接続詞",foreign:"Seitdem ich regelmäßig Sport treibe, fühle ich mich deutlich fitter.",ja:"定期的に運動をするようになってから、体調も明らかによくなりました。"},
  {id:"sub18",cat:"副文・接続詞",foreign:"Ich glaube, dass er nicht gekommen ist, weil er den Termin vergessen hat.",ja:"彼は予定を忘れたから来なかったのだと思う。"},

  // ===== 時間の副文 =====
  {id:"tim01",cat:"時間の副文",foreign:"Seitdem ich in Berlin lebe, habe ich viele neue Freunde gefunden.",ja:"ベルリンに住んで以来、たくさんの新しい友人ができた。"},
  {id:"tim02",cat:"時間の副文",foreign:"Bevor du den Vertrag unterschreibst, solltest du ihn sorgfältig durchlesen.",ja:"契約書に署名する前に、注意深く読むべきだ。"},
  {id:"tim03",cat:"時間の副文",foreign:"Nachdem ich die Prüfung bestanden hatte, habe ich eine Woche Urlaub gemacht.",ja:"試験に合格した後、一週間休暇を取った。"},
  {id:"tim04",cat:"時間の副文",foreign:"Während ich auf den Bus wartete, fing es plötzlich an zu regnen.",ja:"バスを待っている間に、突然雨が降り出した。"},
  {id:"tim05",cat:"時間の副文",foreign:"Als ich ein Kind war, haben wir jeden Sommer am See Urlaub gemacht.",ja:"子供の頃、毎年夏に湖で休暇を過ごした。"},
  {id:"tim06",cat:"時間の副文",foreign:"Immer wenn ich Stress habe, gehe ich im Park spazieren.",ja:"ストレスがあるたびに、公園を散歩する。"},
  {id:"tim07",cat:"時間の副文",foreign:"Bis ich eine neue Wohnung gefunden habe, wohne ich bei meinen Eltern.",ja:"新しいアパートが見つかるまで、両親のところに住んでいる。"},
  {id:"tim08",cat:"時間の副文",foreign:"Als ich gestern nach Hause kam, stand ein Paket vor der Tür.",ja:"昨日帰宅したとき、ドアの前に荷物があった。"},
  {id:"tim09",cat:"時間の副文",foreign:"Nachdem er die E-Mail gelesen hatte, rief er sofort seinen Chef an.",ja:"メールを読んだ後、彼はすぐに上司に電話した。"},
  {id:"tim10",cat:"時間の副文",foreign:"Als wir am Bahnhof ankamen, war der Zug schon abgefahren.",ja:"駅に着いたとき、電車はもう出発していた。"},
  {id:"tim11",cat:"時間の副文",foreign:"Wir werden uns treffen, sobald ich angekommen bin.",ja:"到着したらすぐ会いましょう。"},
  {id:"tim12",cat:"時間の副文",foreign:"Sobald alle Unterlagen vollständig sind, wird der Antrag sofort bearbeitet.",ja:"書類がすべて揃い次第、申請はすぐに処理される。"},

  // ===== 過去完了形 =====
  {id:"plp01",cat:"過去完了形",foreign:"Ich war müde, weil ich die ganze Nacht gearbeitet hatte.",ja:"一晩中働いていたので疲れていた。"},
  {id:"plp02",cat:"過去完了形",foreign:"Bevor sie nach Deutschland zog, hatte sie drei Jahre in Frankreich gelebt.",ja:"ドイツに引っ越す前、彼女はフランスに3年住んでいた。"},
  {id:"plp03",cat:"過去完了形",foreign:"Sie erzählte mir, dass sie vor zwei Jahren ihren Job verloren hatte.",ja:"彼女は2年前に職を失ったと話してくれました。"},
  {id:"plp04",cat:"過去完了形",foreign:"Nachdem wir gegessen hatten, sind wir spazieren gegangen.",ja:"食事が終わった後、散歩に行きました。"},
  {id:"plp05",cat:"過去完了形",foreign:"Als ich in Berlin ankam, hatte ich meinen Koffer vergessen.",ja:"ベルリンに着いた時、スーツケースを忘れていました。"},

  // ===== 間接話法 =====
  {id:"ind01",cat:"間接話法",foreign:"Der Sprecher sagte, die Situation sei unter Kontrolle.",ja:"報道官は状況はコントロール下にあると述べた。"},
  {id:"ind02",cat:"間接話法",foreign:"Die Zeitung berichtet, der Minister habe seinen Rücktritt erklärt.",ja:"新聞は大臣が辞任を表明したと報じている。"},
  {id:"ind03",cat:"間接話法",foreign:"Er meinte, er könne leider nicht kommen.",ja:"彼は残念ながら来られないと言った。"},
  {id:"ind04",cat:"間接話法",foreign:"Sie sagte, sie wisse nicht, worum es gehe.",ja:"彼女は何が問題なのか分からないと言った。"},
  {id:"ind05",cat:"間接話法",foreign:"Er hat mir erzählt, dass er demnächst eine längere Reise nach Südamerika plant.",ja:"彼は、近々南米への長期旅行を計画していると私に話しました。"},
  {id:"ind06",cat:"間接話法",foreign:"Es heißt, dass die Lebensqualität in dieser Stadt sehr hoch sei.",ja:"この街の生活の質はとても高いと言われています。"},
  {id:"ind07",cat:"間接話法",foreign:"In der E-Mail stand, dass der Termin aus organisatorischen Gründen verschoben werden muss.",ja:"メールには、運営上の理由により日程を延期しなければならないと書かれていました。"},
  {id:"ind08",cat:"間接話法",foreign:"Mir wurde gesagt, dass ich die Unterlagen spätestens bis Freitag einreichen muss.",ja:"遅くとも金曜日までに書類を提出しなければならないと、私は言われました。"},

  // ===== 比較表現 =====
  {id:"cmp01",cat:"比較表現",foreign:"Mein Auto ist schneller als deins.",ja:"私の車はあなたのより速いです。"},
  {id:"cmp02",cat:"比較表現",foreign:"Dieser Kuchen schmeckt besser als der gestrige.",ja:"このケーキは昨日のよりおいしいです。"},
  {id:"cmp03",cat:"比較表現",foreign:"Das ist der beste Film, den ich je gesehen habe.",ja:"これは私が今まで見た中で最高の映画です。"},
  {id:"cmp04",cat:"比較表現",foreign:"Sie ist genauso alt wie ich.",ja:"彼女は私と同じ年齢です。"},
  {id:"cmp05",cat:"比較表現",foreign:"Je länger man wartet, desto schwieriger wird die Entscheidung.",ja:"待てば待つほど決断は難しくなる。"},
  {id:"cmp06",cat:"比較表現",foreign:"Je mehr ich übe, desto besser werde ich.",ja:"練習すればするほど上手くなる。"},
  {id:"cmp07",cat:"比較表現",foreign:"Er tut so, als ob er alles verstanden hätte.",ja:"彼はすべて理解したかのように振る舞っている。"},
  {id:"cmp08",cat:"比較表現",foreign:"Die neue Wohnung ist deutlich größer als die alte.",ja:"新しいアパートは古いものよりずっと広い。"},
  {id:"cmp09",cat:"比較表現",foreign:"Dieses Semester ist genauso anstrengend wie das letzte.",ja:"今学期は前の学期と同じくらい大変だ。"},
  {id:"cmp10",cat:"比較表現",foreign:"Im Vergleich zu Japan wirkt der Alltag in Deutschland auf mich etwas entspannter.",ja:"日本と比べると、ドイツの日常はややのんびりしているように感じます。"},

  // ===== 動詞の前置詞支配 =====
  {id:"vpr01",cat:"前置詞結合動詞",foreign:"Ich warte auf den Bus.",ja:"私はバスを待っています。"},
  {id:"vpr02",cat:"前置詞結合動詞",foreign:"Wir freuen uns auf den Urlaub.",ja:"私たちは休暇を楽しみにしています。"},
  {id:"vpr03",cat:"前置詞結合動詞",foreign:"Er interessiert sich für Kunst.",ja:"彼は芸術に興味があります。"},
  {id:"vpr04",cat:"前置詞結合動詞",foreign:"Ich warte seit einer Stunde auf den Techniker.",ja:"1時間前から技術者を待っている。"},
  {id:"vpr05",cat:"前置詞結合動詞",foreign:"Sie hat lange über das Angebot nachgedacht.",ja:"彼女はそのオファーについて長く考えた。"},
  {id:"vpr06",cat:"前置詞結合動詞",foreign:"Wir müssen uns auf die Prüfung vorbereiten.",ja:"試験の準備をしなければならない。"},
  {id:"vpr07",cat:"前置詞結合動詞",foreign:"Er kümmert sich liebevoll um seine kranke Mutter.",ja:"彼は病気の母親を愛情を込めて世話している。"},
  {id:"vpr08",cat:"前置詞結合動詞",foreign:"Ich habe mich über die Verspätung des Fluges geärgert.",ja:"フライトの遅延に腹が立った。"},
  {id:"vpr09",cat:"前置詞結合動詞",foreign:"Sie träumt davon, ein eigenes Café zu eröffnen.",ja:"彼女は自分のカフェを開くことを夢見ている。"},
  {id:"vpr10",cat:"前置詞結合動詞",foreign:"Die Entscheidung hängt von den Ergebnissen der Untersuchung ab.",ja:"その決定は検査結果次第だ。"},
  {id:"vpr11",cat:"前置詞結合動詞",foreign:"Ich freue mich sehr darauf, Sie nächste Woche persönlich kennenzulernen.",ja:"来週、あなたに直接お会いできるのをとても楽しみにしています。"},

  // ===== 再帰動詞 =====
  {id:"ref01",cat:"再帰動詞",foreign:"Ich muss mich bis Freitag für den Kurs anmelden.",ja:"金曜日までに講座に申し込まなければならない。"},
  {id:"ref02",cat:"再帰動詞",foreign:"Wir haben uns über das Geschenk sehr gefreut.",ja:"プレゼントをとても喜んだ。"},
  {id:"ref03",cat:"再帰動詞",foreign:"Kannst du dich noch an unseren ersten Urlaub erinnern?",ja:"最初の旅行のことをまだ覚えてる？"},
  {id:"ref04",cat:"再帰動詞",foreign:"Ich interessiere mich sehr für deutsche Geschichte.",ja:"ドイツの歴史にとても興味がある。"},
  {id:"ref05",cat:"再帰動詞",foreign:"Sie hat sich um die Stelle als Projektleiterin beworben.",ja:"彼女はプロジェクトリーダーのポストに応募した。"},
  {id:"ref06",cat:"再帰動詞",foreign:"Wir müssen uns beeilen, sonst verpassen wir den Zug.",ja:"急がないと電車に乗り遅れる。"},
  {id:"ref07",cat:"再帰動詞",foreign:"Er hat sich entschieden, den Job zu wechseln.",ja:"彼は転職することに決めた。"},
  {id:"ref08",cat:"再帰動詞",foreign:"Ich habe mich an das Leben in der Großstadt gewöhnt.",ja:"大都市での生活に慣れた。"},
  {id:"ref09",cat:"再帰動詞",foreign:"Sie beschwerte sich beim Vermieter über den Lärm.",ja:"彼女は騒音について大家に苦情を言った。"},
  {id:"ref10",cat:"再帰動詞",foreign:"Wir haben uns darauf geeinigt, das Projekt in zwei Phasen aufzuteilen.",ja:"私たちは、そのプロジェクトを2つの段階に分けることで合意しました。"},
  {id:"ref11",cat:"再帰動詞",foreign:"Manchmal ärgere ich mich über mich selbst, weil ich immer wieder die gleichen Fehler mache.",ja:"時々、自分で自分に腹が立ちます。なぜなら、何度も同じミスを繰り返してしまうからです。"},

  // ===== lassen =====
  {id:"las01",cat:"lassen",foreign:"Ich lasse mir morgen die Haare schneiden.",ja:"明日髪を切ってもらう。"},
  {id:"las02",cat:"lassen",foreign:"Er hat sein Auto in der Werkstatt reparieren lassen.",ja:"彼は修理工場で車を修理してもらった。"},

// ===== APP STATE =====
const LS_KEY = 'german_mastered_b1_v1';
let cards = [];
let filtered = [];
let currentIdx = 0;
let currentCat = 'すべて';
let currentMode = 'ja2de';
let revealed = false;
let mastered = new Set();
let isMuted = false;
let isSpeaking = false;

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function loadMastered() {
  try {
    const d = localStorage.getItem(LS_KEY);
    if (d) mastered = new Set(JSON.parse(d));
  } catch(e) { mastered = new Set(); }
}
function saveMastered() {
  try { localStorage.setItem(LS_KEY, JSON.stringify([...mastered])); } catch(e){}
}

function init() {
  loadMastered();
  cards = CARDS_RAW.map((d, i) => ({ ...d, _id: d.id || i }));
  buildCatButtons();
  applyFilter();
  updateStats();
  renderCard();
}

function buildCatButtons() {
  const cats = ['すべて', ...new Set(cards.map(c => c.cat))];
  const scroll = document.getElementById('catScroll');
  scroll.innerHTML = '';
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-pill' + (cat === currentCat ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => selectCat(cat);
    scroll.appendChild(btn);
  });
}

function selectCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-pill').forEach(b => {
    b.classList.toggle('active', b.textContent === cat);
  });
  applyFilter();
  currentIdx = 0;
  revealed = false;
  renderCard();
  updateStats();
}

function applyFilter() {
  if (currentCat === 'すべて') {
    filtered = [...cards];
  } else {
    filtered = cards.filter(c => c.cat === currentCat);
  }
}

function updateStats() {
  const total = filtered.length;
  const done = filtered.filter(c => mastered.has(c._id)).length;
  const rem = total - done;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('statTotal').textContent = `全${total}件`;
  document.getElementById('statRem').textContent = `残り${rem}件`;
  document.getElementById('statDone').textContent = `✓${done}件`;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('statPct').textContent = pct + '%';
}

function getCard() {
  return filtered[currentIdx] || null;
}

function getEffectiveMode(card) {
  if (currentMode === 'random') return Math.random() < 0.5 ? 'ja2de' : 'de2ja';
  return currentMode;
}

function renderCard() {
  const card = getCard();
  const body = document.getElementById('cardBody');
  const qEl = document.getElementById('cardQ');
  const catLbl = document.getElementById('cardCat');
  const counter = document.getElementById('cardCounter');

  if (!card) {
    catLbl.textContent = '–';
    counter.textContent = '0 / 0';
    body.innerHTML = '<div class="card-question">カードがありません</div>';
    return;
  }

  catLbl.textContent = card.cat;
  counter.textContent = `${currentIdx + 1} / ${filtered.length}`;

  const isMastered = mastered.has(card._id);
  document.getElementById('btnCheck').classList.toggle('checked', isMastered);

  if (!revealed) {
    const mode = getEffectiveMode(card);
    const qText = mode === 'ja2de' ? card.ja : card.foreign;
    const isJp = mode === 'ja2de';
    body.innerHTML = `
      <div class="card-question${isJp ? ' jp' : ''}" id="cardQ">${escHtml(qText)}</div>
      <div class="card-hint">👆 タップして答えを見る</div>
    `;
  } else {
    const mode = getEffectiveMode(card);
    const qText = mode === 'ja2de' ? card.ja : card.foreign;
    const aText = mode === 'ja2de' ? card.foreign : card.ja;
    const qIsJp = mode === 'ja2de';
    const aIsJp = mode === 'de2ja';
    body.innerHTML = `
      <div class="card-question${qIsJp ? ' jp' : ''}">${escHtml(qText)}</div>
      <div class="card-divider"></div>
      <div class="card-answer${aIsJp ? ' jp' : ''}" id="cardA">${escHtml(aText)}</div>
      <button class="speak-btn" id="speakBtn" onclick="event.stopPropagation();speakAnswer()">🔊 読み上げ</button>
    `;
  }
}

function revealCard() {
  if (revealed) {
    revealed = false;
    renderCard();
    return;
  }
  revealed = true;
  renderCard();
  speakAnswer();
}

function speakAnswer() {
  const card = getCard();
  if (!card) return;
  const mode = getEffectiveMode(card);
  const btn = document.getElementById('speakBtn');
  if (btn) { btn.classList.add('playing'); }
  const onDone = () => {
    if (btn) btn.classList.remove('playing');
  };
  if (mode === 'ja2de') {
    speakForeign(card.foreign, onDone);
  } else {
    speakJapanese(card.ja, onDone);
  }
}

function speakForeign(text, onDone) {
  if (isMuted) { if (onDone) onDone(); return; }
  window.speechSynthesis.cancel();
  function doSpeak(lang) {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = 0.8;
    u.pitch = 1.0;
    u.onend = () => { if (onDone) onDone(); };
    u.onerror = () => { if (onDone) onDone(); };
    window.speechSynthesis.speak(u);
  }
  const voices = window.speechSynthesis.getVoices();
  const preferred = ['de-DE', 'de', 'en-US'];
  let chosen = null;
  for (const lang of preferred) {
    const v = voices.find(v => v.lang === lang || v.lang.startsWith('de'));
    if (v) { chosen = v.lang; break; }
  }
  doSpeak(chosen || 'de-DE');
}

function speakJapanese(text, onDone) {
  if (isMuted) { if (onDone) onDone(); return; }
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  u.rate = 0.85;
  u.onend = () => { if (onDone) onDone(); };
  u.onerror = () => { if (onDone) onDone(); };
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

function nextCard() {
  window.speechSynthesis.cancel();
  let next = currentIdx + 1;
  let count = 0;
  while (next < filtered.length) {
    if (!mastered.has(filtered[next]._id)) break;
    next++;
    count++;
    if (count > filtered.length) break;
  }
  if (next >= filtered.length) {
    // check if all mastered
    const allDone = filtered.every(c => mastered.has(c._id));
    if (allDone) {
      showComplete();
      return;
    }
    next = 0;
    while (next < filtered.length && mastered.has(filtered[next]._id)) next++;
  }
  currentIdx = next;
  revealed = false;
  renderCard();
}

function prevCard() {
  window.speechSynthesis.cancel();
  let prev = currentIdx - 1;
  if (prev < 0) prev = filtered.length - 1;
  currentIdx = prev;
  revealed = false;
  renderCard();
}

function checkCard() {
  const card = getCard();
  if (!card) return;
  if (mastered.has(card._id)) return;
  mastered.add(card._id);
  saveMastered();
  updateStats();
  document.getElementById('btnCheck').classList.add('checked');
  setTimeout(() => nextCard(), 300);
}

function showComplete() {
  const ov = document.getElementById('completeOverlay');
  ov.classList.add('show');
  setTimeout(() => {
    mastered.clear();
    saveMastered();
    updateStats();
    currentIdx = 0;
    revealed = false;
    renderCard();
    ov.classList.remove('show');
  }, 1800);
}

// Header buttons
document.getElementById('btnList').onclick = openModal;
document.getElementById('btnReset').onclick = () => {
  if (mastered.size === 0) return;
  mastered.clear();
  saveMastered();
  currentIdx = 0;
  revealed = false;
  updateStats();
  renderCard();
  const btn = document.getElementById('btnReset');
  btn.textContent = '✅';
  setTimeout(() => btn.textContent = '🔄', 800);
};
document.getElementById('btnShuffle').onclick = () => {
  for (let i = filtered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
  }
  currentIdx = 0;
  revealed = false;
  renderCard();
  const btn = document.getElementById('btnShuffle');
  btn.textContent = '✅';
  setTimeout(() => btn.textContent = '🔀', 800);
};
document.getElementById('btnMute').onclick = () => {
  isMuted = !isMuted;
  document.getElementById('btnMute').textContent = isMuted ? '🔇' : '🔊';
  if (isMuted) window.speechSynthesis.cancel();
};

// Mode buttons
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.onclick = () => {
    currentMode = btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    revealed = false;
    renderCard();
  };
});

// Controls
document.getElementById('mainCard').onclick = revealCard;
document.getElementById('btnReveal').onclick = (e) => { e.stopPropagation(); if(!revealed){revealed=true;renderCard();speakAnswer();} };
document.getElementById('btnRevert').onclick = (e) => { e.stopPropagation(); revealed=false; renderCard(); };
document.getElementById('btnPrev').onclick = (e) => { e.stopPropagation(); prevCard(); };
document.getElementById('btnNext').onclick = (e) => { e.stopPropagation(); nextCard(); };
document.getElementById('btnCheck').onclick = (e) => { e.stopPropagation(); checkCard(); };

// Keyboard
document.addEventListener('keydown', e => {
  if (document.getElementById('modalOverlay').classList.contains('open')) {
    if (e.key === 'Escape') closeModal();
    return;
  }
  if (e.key === 'ArrowRight') nextCard();
  else if (e.key === 'ArrowLeft') prevCard();
  else if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); revealCard(); }
  else if (e.key === 'c' || e.key === 'C') checkCard();
});

// Modal
function openModal() {
  buildModal('');
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('modalSearch').value = '';
  document.getElementById('modalSearch').focus();
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
document.getElementById('modalClose').onclick = closeModal;
document.getElementById('modalOverlay').onclick = (e) => { if(e.target===document.getElementById('modalOverlay')) closeModal(); };
document.getElementById('modalSearch').oninput = (e) => buildModal(e.target.value);

function buildModal(query) {
  const q = query.trim().toLowerCase();
  const body = document.getElementById('modalBody');
  const cats = [...new Set(cards.map(c => c.cat))];
  let html = '';
  cats.forEach(cat => {
    const items = cards.filter(c => c.cat === cat && (
      !q || c.foreign.toLowerCase().includes(q) || c.ja.includes(q)
    ));
    if (items.length === 0) return;
    html += `<div class="modal-cat-header">${escHtml(cat)}</div>`;
    items.forEach(c => {
      const isMast = mastered.has(c._id);
      html += `<div class="modal-row${isMast?' mastered':''}" data-id="${escHtml(c._id)}">
        <span class="modal-de">${escHtml(c.foreign)}</span>
        <span class="modal-ja">${escHtml(c.ja)}</span>
      </div>`;
    });
  });
  body.innerHTML = html;
  body.querySelectorAll('.modal-row').forEach(row => {
    row.onclick = () => {
      const id = row.dataset.id;
      const cardIdx = cards.findIndex(c => String(c._id) === String(id));
      if (cardIdx < 0) return;
      const targetCat = cards[cardIdx].cat;
      if (currentCat !== targetCat && currentCat !== 'すべて') {
        selectCat('すべて');
      }
      const filtIdx = filtered.findIndex(c => String(c._id) === String(id));
      if (filtIdx >= 0) {
        currentIdx = filtIdx;
        revealed = false;
        renderCard();
      }
      closeModal();
    };
  });
}

init();
window.speechSynthesis.onvoiceschanged = function(){};
</script>
