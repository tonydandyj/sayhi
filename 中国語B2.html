<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国語 B2 フラッシュカード</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;700&family=ZCOOL+XiaoWei&display=swap');

:root {
  --ink:#1a1208; --paper:#faf7f1; --red:#c0392b; --red-light:#f5e6e4;
  --gold:#b8941f; --gold-light:#f0e6c0; --green:#2d6a4f; --green-light:#d8ede4;
  --bg:#eee8d8; --border:#d4c9a8; --shadow:rgba(0,0,0,.13);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Serif JP',serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;}

/* ── HEADER ── */
header{width:100%;background:var(--ink);padding:16px 20px 14px;text-align:center;position:relative;overflow:hidden;}
header::before{content:'語';position:absolute;left:-14px;top:-16px;font-size:130px;color:rgba(255,255,255,.03);font-family:'ZCOOL XiaoWei',serif;pointer-events:none;user-select:none;}
header h1{font-family:'ZCOOL XiaoWei',serif;font-size:1.55rem;letter-spacing:.14em;color:var(--gold-light);}

/* ── STATS BAR ── */
.stats-bar{max-width:700px;width:100%;display:flex;align-items:center;gap:10px;padding:9px 16px;background:var(--bg);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.stat-inline{font-size:.78rem;color:#7a6e58;white-space:nowrap;}
.stat-inline strong{font-family:'ZCOOL XiaoWei',serif;font-size:1rem;color:var(--ink);margin:0 1px;}
.stat-inline.s-mem strong{color:var(--green);}
.stat-inline.s-remain strong{color:var(--red);}
.prog-wrap{flex:1;min-width:60px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--red));border-radius:3px;transition:width .4s ease;}
.stat-pct{font-size:.78rem;font-family:'ZCOOL XiaoWei',serif;color:var(--gold);font-weight:700;white-space:nowrap;}

/* ── LIST MODAL ── */
.list-modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(10,8,4,.72);display:none;align-items:center;justify-content:center;padding:16px;}
.list-modal-overlay.show{display:flex;}
.list-modal{background:var(--paper);border-radius:14px;width:100%;max-width:700px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.4);}
.list-modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;background:linear-gradient(135deg,var(--ink) 0%,#2e2010 100%);flex-shrink:0;}
.list-modal-header h2{font-family:'ZCOOL XiaoWei',serif;font-size:1.05rem;color:var(--gold-light);letter-spacing:.08em;}
.list-modal-header h2 span{font-size:.75rem;color:var(--border);margin-left:8px;font-family:'Noto Serif JP',serif;letter-spacing:.04em;}
.list-modal-search{padding:10px 14px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;}
.list-modal-search input{width:100%;padding:8px 12px;border-radius:8px;border:1.5px solid var(--border);background:#fff;color:var(--ink);font-size:.82rem;font-family:'Noto Serif JP',serif;outline:none;transition:border-color .18s;}
.list-modal-search input:focus{border-color:var(--gold);}
.list-modal-body{overflow-y:auto;flex:1;padding:6px 0 12px;}
.list-cat-heading{position:sticky;top:0;background:var(--bg);padding:7px 16px 5px;font-size:.7rem;font-weight:700;color:var(--gold);letter-spacing:.1em;border-bottom:1px solid var(--border);z-index:1;}
.list-row{display:grid;grid-template-columns:1fr 1fr;gap:2px 10px;padding:8px 16px;border-bottom:1px solid rgba(212,201,168,.4);cursor:pointer;transition:background .13s;}
.list-row:hover{background:var(--gold-light);}
.list-row-jp{font-size:.75rem;color:#7a6e58;}
.list-row-ne{font-size:.85rem;color:var(--ink);font-family:'ZCOOL XiaoWei',serif;}
.list-row-rom{grid-column:1/-1;font-size:.63rem;color:#a09070;margin-top:1px;letter-spacing:.03em;}
.list-row.mastered-row{opacity:.4;}
.list-close-btn{padding:6px 13px;border-radius:7px;border:1.5px solid rgba(212,201,168,.4);background:rgba(255,255,255,.1);color:var(--gold-light);font-size:.72rem;cursor:pointer;font-family:'Noto Serif JP',serif;transition:all .15s;white-space:nowrap;}
.list-close-btn:hover{background:rgba(255,255,255,.2);}
.list-no-result{text-align:center;padding:40px 16px;color:#a09070;font-size:.82rem;}

/* ── MODE BAR ── */
.mode-bar{max-width:700px;width:100%;display:flex;align-items:center;gap:7px;padding:10px 16px 8px;flex-wrap:wrap;background:var(--paper);border-bottom:1px solid var(--border);}
.mode-toggle{display:flex;background:var(--ink);border-radius:8px;overflow:hidden;flex-shrink:0;}
.mode-btn{padding:7px 11px;font-family:'Noto Serif JP',serif;font-size:.73rem;border:none;cursor:pointer;background:transparent;color:rgba(240,230,192,.5);transition:all .18s;}
.mode-btn.active{background:var(--gold);color:var(--ink);font-weight:700;}
.btn-top{padding:6px 11px;border-radius:7px;font-family:'Noto Serif JP',serif;font-size:.72rem;cursor:pointer;transition:all .18s;white-space:nowrap;border:1.5px solid var(--border);background:var(--paper);color:var(--ink);}
.btn-top:hover{background:var(--border);}
.btn-top.danger{border-color:var(--red);background:var(--red-light);color:var(--red);}
.btn-top.danger:hover{background:var(--red);color:#fff;}

/* ── CATEGORY SLIDER ── */
.cat-slider-wrap{max-width:700px;width:100%;position:relative;padding:6px 16px 0;background:var(--paper);border-bottom:1px solid var(--border);}
.cat-slider{display:flex;gap:7px;overflow-x:auto;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;padding:4px 0 10px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.cat-slider::-webkit-scrollbar{height:3px;}
.cat-slider::-webkit-scrollbar-track{background:transparent;}
.cat-slider::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.cat-pill{flex-shrink:0;padding:5px 13px;border-radius:20px;font-size:.71rem;cursor:pointer;font-family:'Noto Serif JP',serif;border:1.5px solid var(--border);background:transparent;color:#7a6e58;transition:all .15s;white-space:nowrap;}
.cat-pill:hover:not(.active){border-color:var(--gold);color:var(--gold);}
.cat-pill.active{background:var(--ink);color:var(--gold-light);border-color:var(--ink);}
.cat-slider-wrap::after{content:'';position:absolute;right:0;top:0;bottom:0;width:40px;background:linear-gradient(to right,transparent,var(--paper));pointer-events:none;}

/* ── CARD AREA ── */
.card-area{max-width:700px;width:100%;padding:10px 16px 8px;}
.card-cat-label{position:absolute;top:11px;left:14px;font-size:.63rem;letter-spacing:.08em;padding:2px 10px;border-radius:20px;background:var(--gold-light);color:var(--gold);font-family:'Noto Serif JP',serif;z-index:1;}
.card-counter{position:absolute;top:12px;right:14px;font-size:.68rem;color:#9a8e76;letter-spacing:.04em;font-family:'ZCOOL XiaoWei',serif;z-index:1;}
.card-back-counter{position:absolute;top:12px;right:14px;font-size:.68rem;color:rgba(240,230,192,.45);letter-spacing:.04em;font-family:'ZCOOL XiaoWei',serif;}
.card-scene{perspective:1000px;width:100%;}
.card{width:100%;min-height:230px;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);cursor:pointer;}
.card.flipped{transform:rotateY(180deg);}
.card-face{position:absolute;width:100%;min-height:230px;backface-visibility:hidden;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:42px 24px 44px;box-shadow:0 4px 22px var(--shadow),0 0 0 1px var(--border);}
.card-front{background:var(--paper);background-image:radial-gradient(circle at 8% 8%,rgba(184,148,31,.07) 0%,transparent 45%),radial-gradient(circle at 92% 92%,rgba(192,57,43,.04) 0%,transparent 45%);}
.card-back{background:var(--ink);transform:rotateY(180deg);background-image:radial-gradient(circle at 15% 85%,rgba(184,148,31,.18) 0%,transparent 50%),radial-gradient(circle at 85% 15%,rgba(192,57,43,.12) 0%,transparent 50%);}
.card-question{font-size:1.45rem;text-align:center;line-height:1.6;font-weight:400;color:var(--ink);}
.card-hint{margin-top:10px;font-size:.78rem;color:#a09070;letter-spacing:.05em;text-align:center;}
.tap-hint-f,.tap-hint-b{position:absolute;bottom:13px;left:50%;transform:translateX(-50%);font-size:.64rem;letter-spacing:.07em;white-space:nowrap;}
.tap-hint-f{color:var(--border);}
.tap-hint-b{color:rgba(240,230,192,.3);}
.ans-cn{font-family:'ZCOOL XiaoWei','Noto Sans SC',serif;font-size:2rem;color:var(--gold-light);text-align:center;line-height:1.4;margin-bottom:8px;}
.ans-py{font-size:.88rem;color:rgba(240,230,192,.65);text-align:center;margin-bottom:8px;letter-spacing:.06em;}
.ans-ja{font-size:1rem;color:rgba(240,230,192,.9);text-align:center;line-height:1.7;}
.audio-btn{margin-top:14px;padding:6px 16px;border-radius:20px;border:1px solid rgba(184,148,31,.5);background:rgba(184,148,31,.15);color:var(--gold-light);font-size:.72rem;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:5px;font-family:'Noto Serif JP',serif;}
.audio-btn:hover{background:rgba(184,148,31,.3);}
.audio-btn.playing{background:rgba(192,57,43,.3);border-color:rgba(192,57,43,.6);}
.card-back-cat{position:absolute;top:11px;left:14px;font-size:.63rem;letter-spacing:.08em;padding:2px 10px;border-radius:20px;font-family:'Noto Serif JP',serif;background:rgba(184,148,31,.25);color:var(--gold-light);}

/* ── BUTTON ROW ── */
.btn-row{max-width:700px;width:100%;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;padding:10px 16px;}
.btn{padding:11px 5px;border-radius:10px;border:none;cursor:pointer;font-family:'Noto Serif JP',serif;font-size:.74rem;font-weight:700;letter-spacing:.04em;transition:all .16s;display:flex;flex-direction:column;align-items:center;gap:4px;}
.btn svg{width:15px;height:15px;}
.btn:active{transform:scale(.96);}
.btn-show{background:var(--gold-light);color:var(--gold);border:2px solid var(--gold);}
.btn-show:hover{background:var(--gold);color:#fff;}
.btn-back2{background:var(--paper);color:var(--ink);border:2px solid var(--border);}
.btn-back2:hover{background:var(--border);}
.btn-next{background:var(--ink);color:var(--gold-light);}
.btn-next:hover{background:#2d2416;}
.btn-mem{background:var(--green-light);color:var(--green);border:2px solid var(--green);}
.btn-mem:hover{background:var(--green);color:#fff;}

/* ── FINISH ── */
.finish{display:none;text-align:center;padding:40px 20px;margin:0 16px;background:var(--paper);border-radius:16px;border:1px solid var(--border);max-width:700px;width:calc(100% - 32px);}
.finish-icon{font-size:3rem;margin-bottom:8px;}
.finish h3{font-family:'ZCOOL XiaoWei',serif;font-size:1.6rem;color:var(--gold);margin-bottom:10px;}
.finish p{color:#7a6e58;margin-bottom:20px;font-size:.88rem;line-height:1.8;}
.btn-restart{padding:11px 26px;background:var(--ink);color:var(--gold-light);border:none;border-radius:9px;cursor:pointer;font-family:'Noto Serif JP',serif;font-size:.88rem;}
.btn-restart:hover{background:#2d2416;}

/* ── SHORTCUT ── */
.shortcut-hint{max-width:700px;width:100%;text-align:center;font-size:.62rem;color:#b0a48a;padding:8px 16px 24px;letter-spacing:.05em;}

@media(max-width:480px){
  .card-question{font-size:1.2rem;}
  .ans-cn{font-size:1.55rem;}
  .btn{font-size:.68rem;padding:9px 3px;}
  .mode-btn{font-size:.68rem;padding:6px 8px;}
  .stats-bar{gap:6px;padding:8px 12px;}
}
</style>
</head>
<body>

<header>
  <h1>中国語 B2 フラッシュカード</h1>
</header>

<div class="stats-bar">
  <span class="stat-inline">全 <strong id="sTotal">0</strong></span>
  <span class="stat-inline s-remain">残り <strong id="sRemain">0</strong></span>
  <span class="stat-inline s-mem">✓ <strong id="sMem">0</strong></span>
  <div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <span class="stat-pct" id="sPct">0%</span>
</div>

<!-- LIST MODAL -->
<div class="list-modal-overlay" id="listModalOverlay">
  <div class="list-modal">
    <div class="list-modal-header">
      <div><h2>📋 例文一覧<span id="listCount"></span></h2></div>
      <button class="list-close-btn" id="listCloseBtn">✕ 閉じる</button>
    </div>
    <div class="list-modal-search">
      <input type="text" id="listSearch" placeholder="日本語・中国語・ピンインで検索…">
    </div>
    <div class="list-modal-body" id="listModalBody"></div>
  </div>
</div>

<div class="mode-bar">
  <div class="mode-toggle">
    <button class="mode-btn active" id="btnJC" onclick="setMode('jc')">🇯🇵→🇨🇳</button>
    <button class="mode-btn" id="btnCJ" onclick="setMode('cj')">🇨🇳→🇯🇵</button>
  </div>
  <button class="btn-top" onclick="doShuffle()">🔀</button>
  <button class="btn-top" id="listBtn" onclick="openListModal()">📋</button>
  <button class="btn-top" id="btnMute" onclick="toggleMute()">🔊 ON</button>
  <button class="btn-top" id="btnAutoPlay" onclick="toggleAutoPlay()">▶ 自動再生 ON</button>
  <button class="btn-top danger" onclick="clearAll()">↩ チェック解除</button>
</div>

<div class="cat-slider-wrap">
  <div class="cat-slider" id="catSlider"></div>
</div>

<div class="card-area">
  <div class="card-scene">
    <div class="card" id="flashCard" onclick="toggleCard()">
      <div class="card-face card-front">
        <span class="card-cat-label" id="cardCat">カテゴリー</span>
        <span class="card-counter" id="cardCounter">1 / 1</span>
        <div class="card-question" id="cardQ">読み込み中...</div>
        <div class="card-hint" id="cardHint"></div>
        <span class="tap-hint-f">👆 タップして答えを見る</span>
      </div>
      <div class="card-face card-back">
        <span class="card-back-cat" id="cardCatB">答え</span>
        <span class="card-back-counter" id="cardCounterB">1 / 1</span>
        <div class="ans-cn" id="ansCN"></div>
        <div class="ans-py" id="ansPY"></div>
        <div class="ans-ja" id="ansJA"></div>
        <button class="audio-btn" id="audioBtn" onclick="speakNow(event)">🔊 読み上げ</button>
        <span class="tap-hint-b">👆 タップして問題に戻る</span>
      </div>
    </div>
  </div>
</div>

<div class="btn-row">
  <button class="btn btn-back2" onclick="prevCard()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>← 戻る
  </button>
  <button class="btn btn-show" onclick="toggleCard()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>▶ 表示
  </button>
  <button class="btn btn-mem" onclick="markMem()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>✓ 覚えた
  </button>
  <button class="btn btn-next" onclick="nextCard()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>次へ →
  </button>
</div>

<div class="finish" id="finishDiv">
  <div class="finish-icon">🏆</div>
  <h3>コンプリート！</h3>
  <p>すべての例文を覚えました！<br>B2レベルの中国語力が身につきました！<br><br>チェック解除してもう一度挑戦しよう。</p>
  <button class="btn-restart" onclick="restart()">🔄 最初からやり直す</button>
</div>

<div class="shortcut-hint">→ 次へ　← 戻る　Space/Enter 答えを見る　M 覚えた</div>

<script>
// ================================================================
// DATA
// ================================================================
const CATS = [

// STATE
// ================================================================
let allCards = [], deck = [], idx = 0, hist = [];
let mode = 'jc', muted = false, catId = 'all', autoPlay = true;
let memorized = new Set();

// ================================================================
// INIT
// ================================================================
function init() {
  CATS[0].cards = CATS.slice(1).flatMap(c => c.cards);
  allCards = CATS[0].cards;

  const slider = document.getElementById('catSlider');
  CATS.forEach(cat => {
    const pill = document.createElement('button');
    pill.className = 'cat-pill' + (cat.id === 'all' ? ' active' : '');
    pill.textContent = cat.name;
    pill.onclick = () => selectCat(cat.id);
    pill.dataset.id = cat.id;
    slider.appendChild(pill);
  });

  selectCat('all');

  // autoPlay初期スタイル
  const ap = document.getElementById('btnAutoPlay');
  ap.style.background = 'var(--gold-light)';
  ap.style.borderColor = 'var(--gold)';
  ap.style.color = 'var(--gold)';
}

function selectCat(id) {
  catId = id;
  document.querySelectorAll('.cat-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.id === id);
  });
  loadMem();
  rebuildDeck();
  render();
}

function rebuildDeck() {
  const cat = CATS.find(c => c.id === catId);
  if (!cat) return;
  allCards = cat.id === 'all' ? CATS[0].cards : cat.cards;
  const memKeys = new Set([...memorized].map(String));
  deck = allCards
    .map(c => ({ c, gk: String(CATS[0].cards.indexOf(c)) }))
    .filter(({ gk }) => !memKeys.has(gk))
    .map(({ c }) => c);
  idx = 0; hist = [];
}

// ================================================================
// RENDER
// ================================================================
function render() {
  document.getElementById('flashCard').classList.remove('flipped');
  if (!deck.length) {
    document.getElementById('finishDiv').style.display = 'block';
    updateStats(); return;
  }
  document.getElementById('finishDiv').style.display = 'none';
  const card = deck[idx];
  const cat = CATS.find(c => c.id !== 'all' && c.cards.includes(card)) || CATS[0];

  if (mode === 'jc') {
    document.getElementById('cardQ').textContent = card.ja;
    document.getElementById('cardHint').textContent = '';
    document.getElementById('ansCN').textContent = card.cn;
    document.getElementById('ansCN').style.display = '';
    document.getElementById('ansPY').textContent = card.py;
    document.getElementById('ansPY').style.display = '';
    document.getElementById('ansJA').textContent = '';
    document.getElementById('ansJA').style.display = 'none';
  } else {
    document.getElementById('cardQ').textContent = card.cn;
    document.getElementById('cardHint').textContent = card.py;
    document.getElementById('ansCN').style.display = 'none';
    document.getElementById('ansPY').style.display = 'none';
    document.getElementById('ansJA').textContent = card.ja;
    document.getElementById('ansJA').style.display = '';
  }

  document.getElementById('cardCat').textContent = cat.name;
  document.getElementById('cardCatB').textContent = cat.name;
  document.getElementById('cardCounter').textContent = (idx + 1) + ' / ' + deck.length;
  document.getElementById('cardCounterB').textContent = (idx + 1) + ' / ' + deck.length;
  updateStats();
}

function updateStats() {
  const total = allCards.length;
  const mem = allCards.filter(c => memorized.has(String(CATS[0].cards.indexOf(c)))).length;
  const remain = total - mem;
  const pct = total ? Math.round(mem / total * 100) : 0;
  document.getElementById('sTotal').textContent = total;
  document.getElementById('sRemain').textContent = remain;
  document.getElementById('sMem').textContent = mem;
  document.getElementById('sPct').textContent = pct + '%';
  document.getElementById('progFill').style.width = pct + '%';
}

// ================================================================
// NAVIGATION
// ================================================================
function toggleCard() {
  const card = document.getElementById('flashCard');
  card.classList.toggle('flipped');
  if (card.classList.contains('flipped') && autoPlay && !muted) {
    setTimeout(() => speakNow(null), 300);
  }
}

function nextCard() {
  if (!deck.length) return;
  hist.push(idx);
  idx = (idx + 1) % deck.length;
  render();
}

function prevCard() {
  if (hist.length) { idx = hist.pop(); render(); }
}

function markMem() {
  if (!deck.length) return;
  const key = String(CATS[0].cards.indexOf(deck[idx]));
  memorized.add(key);
  saveMem();
  deck.splice(idx, 1);
  hist = hist.filter(h => h < deck.length);
  if (idx >= deck.length) idx = 0;
  if (!deck.length) { updateStats(); document.getElementById('finishDiv').style.display = 'block'; return; }
  render();
}

function doShuffle() {
  deck.sort(() => Math.random() - .5);
  idx = 0; hist = []; render();
}

function clearAll() {
  memorized.clear(); saveMem(); rebuildDeck(); render();
}

function restart() {
  document.getElementById('finishDiv').style.display = 'none';
  clearAll();
}

// ================================================================
// MODE / MUTE / AUTOPLAY
// ================================================================
function setMode(m) {
  mode = m;
  document.getElementById('btnJC').classList.toggle('active', m === 'jc');
  document.getElementById('btnCJ').classList.toggle('active', m === 'cj');
  rebuildDeck(); render();
}

function toggleMute() {
  muted = !muted;
  document.getElementById('btnMute').textContent = muted ? '🔇 OFF' : '🔊 ON';
}

function toggleAutoPlay() {
  autoPlay = !autoPlay;
  const btn = document.getElementById('btnAutoPlay');
  btn.textContent = autoPlay ? '▶ 自動再生 ON' : '▶ 自動再生 OFF';
  btn.style.background = autoPlay ? 'var(--gold-light)' : '';
  btn.style.borderColor = autoPlay ? 'var(--gold)' : '';
  btn.style.color = autoPlay ? 'var(--gold)' : '';
}

// ================================================================
// SPEECH
// ================================================================
function speakNow(e) {
  if (e) e.stopPropagation();
  if (!deck.length || muted) return;
  const card = deck[idx];
  const btn = document.getElementById('audioBtn');
  btn.classList.add('playing');
  const reset = () => btn.classList.remove('playing');

  const lang = mode === 'jc' ? 'zh-CN' : 'ja-JP';
  const text = mode === 'jc' ? card.cn : card.ja;

  // Windows Chrome/Edge では SpeechSynthesis の先頭音節が欠ける問題がある。
  // ウォームアップ・タイミング系の対策はすべて効果がなかったため、
  // テキスト先頭に読み上げ間を作る句読点を挿入することで対処する。
  // 中国語: 「、」を先頭に → TTS が短ポーズを入れてから本文を読む
  // 日本語: 同様に「、」を先頭に
  // Windows Chrome/Edge workaround:
  // 診断結果: TTSは常に先頭1文字を欠く。どんな対策をしても1文字分は失われる。
  // → 本文の先頭1文字を2回繰り返してダミーとして「犠牲」にする。
  // 例: "你好吗" → "你你好吗" (最初の"你"が切れても"你好吗"は完全に聞こえる)
  // Windows Chrome/Edge のみ先頭1文字を複製して犠牲にする
  // 他環境（iPhone Safari・Android等）では不要なため UA で分岐
  const isWinChromium = /Windows/.test(navigator.userAgent) &&
                        /Chrome|Edg/.test(navigator.userAgent);
  const sacrificePrefix = (t) => isWinChromium ? t.charAt(0) + t : t;

  const doSpeak = () => {
    const u1 = new SpeechSynthesisUtterance(sacrificePrefix(text));
    u1.lang = lang; u1.rate = 0.85;
    if (mode === 'jc') {
      u1.onend = () => {
        const u2 = new SpeechSynthesisUtterance(sacrificePrefix(card.cn));
        u2.lang = 'zh-CN'; u2.rate = 0.85;
        u2.onend = reset;
        speechSynthesis.speak(u2);
      };
    } else {
      u1.onend = reset;
    }
    speechSynthesis.speak(u1);
  };

  if (speechSynthesis.speaking) {
    speechSynthesis.cancel();
    const waitCancel = () => {
      if (!speechSynthesis.speaking) { doSpeak(); }
      else { requestAnimationFrame(waitCancel); }
    };
    requestAnimationFrame(waitCancel);
  } else {
    doSpeak();
  }
}

// ================================================================
// STORAGE
// ================================================================
function saveMem() {
  try { localStorage.setItem('cn_mem_b2_' + catId, JSON.stringify([...memorized])); } catch(e) {}
}
function loadMem() {
  try {
    const d = localStorage.getItem('cn_mem_b2_' + catId);
    memorized = d ? new Set(JSON.parse(d)) : new Set();
  } catch(e) { memorized = new Set(); }
}

// ================================================================
// LIST MODAL
// ================================================================
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildListModal(query) {
  const body = document.getElementById('listModalBody');
  const q = query.trim().toLowerCase();
  body.innerHTML = '';
  let totalShown = 0;
  CATS.slice(1).forEach(cat => {
    let cards = cat.cards;
    if (q) cards = cards.filter(c =>
      (c.ja||'').toLowerCase().includes(q) ||
      (c.cn||'').toLowerCase().includes(q) ||
      (c.py||'').toLowerCase().includes(q)
    );
    if (!cards.length) return;
    const h = document.createElement('div');
    h.className = 'list-cat-heading';
    h.textContent = cat.name + '　' + cards.length + '件';
    body.appendChild(h);
    cards.forEach(card => {
      const gi = CATS[0].cards.indexOf(card);
      const row = document.createElement('div');
      row.className = 'list-row' + (memorized.has(String(gi)) ? ' mastered-row' : '');
      row.innerHTML =
        '<div class="list-row-jp">' + escHtml(card.ja) + '</div>' +
        '<div class="list-row-ne">' + escHtml(card.cn) + '</div>' +
        '<div class="list-row-rom">' + escHtml(card.py) + '</div>';
      row.addEventListener('click', () => {
        let pos = deck.indexOf(card);
        if (pos === -1) { selectCat('all'); pos = deck.indexOf(card); }
        if (pos !== -1) idx = pos;
        document.getElementById('flashCard').classList.remove('flipped');
        render(); closeListModal();
      });
      body.appendChild(row);
      totalShown++;
    });
  });
  if (!totalShown) {
    const d = document.createElement('div');
    d.className = 'list-no-result';
    d.textContent = '「' + query + '」は見つかりませんでした';
    body.appendChild(d);
  }
  document.getElementById('listCount').textContent =
    q ? totalShown + '件' : '全' + CATS[0].cards.length + '件';
}

function openListModal() {
  document.getElementById('listSearch').value = '';
  buildListModal('');
  document.getElementById('listModalOverlay').classList.add('show');
  setTimeout(() => document.getElementById('listSearch').focus(), 50);
}

function closeListModal() {
  document.getElementById('listModalOverlay').classList.remove('show');
}

document.getElementById('listCloseBtn').addEventListener('click', closeListModal);
document.getElementById('listModalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('listModalOverlay')) closeListModal();
});
document.getElementById('listSearch').addEventListener('input', e => buildListModal(e.target.value));

// ================================================================
// KEYBOARD
// ================================================================
document.addEventListener('keydown', e => {
  if (['Space','Enter'].includes(e.code)) { e.preventDefault(); toggleCard(); }
  if (e.code === 'ArrowRight') nextCard();
  if (e.code === 'ArrowLeft')  prevCard();
  if (e.code === 'KeyM' || e.code === 'KeyC') markMem();
});

window.onload = init;
</script>
</body>
</html>
