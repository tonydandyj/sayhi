<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇹🇷 トルコ語フラッシュカード</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 1rem; }
  #app { width: 100%; max-width: 600px; padding: 1.5rem 1rem; }
  .header { text-align: center; margin-bottom: 1.25rem; }
  .header h1 { font-size: 20px; font-weight: 600; color: #1a1a18; }
  .header p { font-size: 13px; color: #888780; margin-top: 4px; }
  .progress-bar { width: 100%; height: 4px; background: #d3d1c7; border-radius: 2px; margin: 0.75rem 0 3px; }
  .progress-fill { height: 4px; background: #1D9E75; border-radius: 2px; transition: width 0.3s; }
  .progress-text { font-size: 12px; color: #888780; text-align: right; }
  .mode-tabs { display: flex; gap: 8px; margin-bottom: 1rem; justify-content: center; flex-wrap: wrap; }
  .mode-tab { padding: 6px 16px; border: 1px solid #d3d1c7; border-radius: 20px; font-size: 13px; cursor: pointer; background: white; color: #5f5e5a; transition: all 0.15s; }
  .mode-tab.active { background: #1D9E75; color: white; border-color: #1D9E75; }
  .card-wrap { perspective: 1000px; height: 290px; margin-bottom: 1rem; cursor: pointer; user-select: none; }
  .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; }
  .card-wrap.flipped .card-inner { transform: rotateY(180deg); }
  .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; border: 1px solid #d3d1c7; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; }
  .card-back { transform: rotateY(180deg); background: #f1efe8; }
  .card-lang { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: #b4b2a9; margin-bottom: 0.75rem; text-transform: uppercase; }
  .card-word { font-size: 32px; font-weight: 500; color: #1a1a18; margin-bottom: 0.5rem; text-align: center; line-height: 1.2; }
  .card-meaning { font-size: 22px; color: #1a1a18; margin-bottom: 0.5rem; text-align: center; }
  .card-note { font-size: 13px; color: #5f5e5a; text-align: center; line-height: 1.5; }
  .card-example { font-size: 13px; color: #5f5e5a; text-align: center; line-height: 1.6; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid #d3d1c7; }
  .card-example em { color: #1a1a18; font-style: normal; font-weight: 500; }
  .card-hint { font-size: 12px; color: #b4b2a9; margin-top: 1rem; }
  .speak-btn { margin-top: 0.75rem; padding: 6px 14px; border: 1px solid #d3d1c7; border-radius: 20px; background: white; font-size: 12px; color: #5f5e5a; cursor: pointer; display: flex; align-items: center; gap: 5px; }
  .speak-btn:hover { background: #f1efe8; }
  .controls { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
  .ctrl-btn { padding: 8px 18px; border: 1px solid #d3d1c7; border-radius: 10px; background: white; color: #1a1a18; font-size: 14px; cursor: pointer; transition: all 0.15s; }
  .ctrl-btn:hover { background: #f1efe8; }
  .ctrl-btn.primary { background: #1D9E75; color: white; border-color: #1D9E75; }
  .ctrl-btn.primary:hover { background: #0F6E56; }
  .ctrl-btn.auto-on { background: #BA7517; color: white; border-color: #BA7517; }
  .auto-speed { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #5f5e5a; margin-bottom: 0.75rem; justify-content: center; }
  .auto-speed input[type=range] { width: 100px; }
  .result-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 0.75rem; }
  .result-btn { flex: 1; max-width: 140px; padding: 9px; border: 1px solid #d3d1c7; border-radius: 10px; background: white; font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .result-btn.good { color: #0F6E56; border-color: #5DCAA5; }
  .result-btn.good:hover { background: #E1F5EE; }
  .result-btn.bad { color: #993C1D; border-color: #F0997B; }
  .result-btn.bad:hover { background: #FAECE7; }
  .stats-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 1rem; }
  .stat-card { flex: 1; max-width: 110px; background: white; border: 1px solid #d3d1c7; border-radius: 10px; padding: 8px; text-align: center; }
  .stat-card .val { font-size: 22px; font-weight: 500; color: #1a1a18; }
  .stat-card .lbl { font-size: 11px; color: #888780; margin-top: 2px; }
  .shuffle-row { text-align: center; display: flex; gap: 8px; justify-content: center; }
  .auto-indicator { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: #BA7517; background: #FAEEDA; padding: 3px 10px; border-radius: 12px; margin-bottom: 8px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #BA7517; animation: pulse 1s infinite; }
  #auto-ind { text-align: center; min-height: 24px; margin-bottom: 4px; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>🇹🇷 トルコ語フラッシュカード</h1>
    <p>カードをタップして表裏を確認しよう</p>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('ja-tr')">日→トルコ語</button>
    <button class="mode-tab" onclick="setMode('tr-ja')">トルコ語→日本語</button>
    <button class="mode-tab" onclick="setMode('random')">ランダム</button>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
  <div class="progress-text" id="prog-text">1 / 80</div>

  <div class="stats-row">
    <div class="stat-card"><div class="val" id="stat-ok">0</div><div class="lbl">覚えた</div></div>
    <div class="stat-card"><div class="val" id="stat-ng">0</div><div class="lbl">もう一度</div></div>
    <div class="stat-card"><div class="val" id="stat-left">80</div><div class="lbl">残り</div></div>
  </div>

  <div id="auto-ind"></div>

  <div class="card-wrap" id="card" onclick="flipCard()">
    <div class="card-inner" id="card-inner">
      <div class="card-face" id="card-front">
        <div class="card-lang" id="front-lang">日本語</div>
        <div class="card-word" id="front-word">こんにちは</div>
        <div class="card-hint">タップして答えを見る</div>
      </div>
      <div class="card-face card-back" id="card-back">
        <div class="card-lang" id="back-lang">トルコ語</div>
        <div class="card-meaning" id="back-word">Merhaba</div>
        <div class="card-note" id="back-note">最も一般的な挨拶です</div>
        <div class="card-example" id="back-example"></div>
        <button class="speak-btn" onclick="speak(event)">🔊 発音を聞く</button>
      </div>
    </div>
  </div>

  <div class="result-row" id="result-row" style="display:none">
    <button class="result-btn bad" onclick="markCard(false)">😕 もう一度</button>
    <button class="result-btn good" onclick="markCard(true)">😊 覚えた！</button>
  </div>

  <div class="controls">
    <button class="ctrl-btn" onclick="prevCard()">← 前へ</button>
    <button class="ctrl-btn primary" onclick="nextCard()">次へ →</button>
    <button class="ctrl-btn" id="auto-btn" onclick="toggleAuto()">▶ 全自動再生</button>
  </div>

  <div class="auto-speed">
    <span>速度:</span>
    <input type="range" min="1" max="5" value="3" id="speed-slider" oninput="updateSpeed(this.value)">
    <span id="speed-label">普通</span>
  </div>

  <div class="shuffle-row">
    <button class="ctrl-btn" onclick="shuffle()" style="font-size:12px">🔀 シャッフル</button>
    <button class="ctrl-btn" onclick="resetStats()" style="font-size:12px">↺ リセット</button>
  </div>
</div>

<script>
const vocab = [
  {tr:"Merhaba",ja:"こんにちは",note:"最も一般的な挨拶",ex_tr:"Merhaba, nasılsın?",ex_ja:"こんにちは、元気ですか？"},

  {tr:"Hoş buldum",ja:"ありがとう（歓迎への返答）",note:"Hoş geldinへの決まった返答",ex_tr:"Hoş geldin! — Hoş buldum.",ex_ja:"ようこそ！— ありがとう。"},
  {tr:"Teşekkür ederim",ja:"ありがとう",note:"丁寧な感謝の言葉",ex_tr:"Yardımın için teşekkür ederim.",ex_ja:"助けてくれてありがとう。"},

  {tr:"Hadi",ja:"さあ・早く",note:"相手を促す時のかけ声",ex_tr:"Hadi gidelim!",ex_ja:"さあ行こう！"},

  {tr:"Burası",ja:"ここ・この場所",note:"「ここ」を主語にする時に使う",ex_tr:"Burası çok güzel.",ex_ja:"ここはとても美しい。"},

  {tr:"Görünmek",ja:"見える",note:"Görünüyorで「〜のように見える」",ex_tr:"Mutlu görünüyorsun.",ex_ja:"幸せそうに見えます。"},

  {tr:"Yorgun",ja:"疲れた",note:"Yorgun musun?で「疲れてる？」",ex_tr:"Çok yorgunum, uyumak istiyorum.",ex_ja:"とても疲れた、寝たい。"},
  {tr:"Çay",ja:"茶・チャイ",note:"トルコの紅茶のこと",ex_tr:"Bir çay içer misin?",ex_ja:"チャイを一杯いかがですか？"},
  {tr:"İstemek",ja:"欲しがる・〜したい",note:"İster misin?で「欲しいですか？」",ex_tr:"Su istemiyorum, teşekkürler.",ex_ja:"水はいらないです、ありがとう。"},
  {tr:"Olmak",ja:"なる・である",note:"İyi olurで「良いですね」",ex_tr:"Öğretmen olmak istiyorum.",ex_ja:"先生になりたいです。"},
  {tr:"Buyur",ja:"どうぞ",note:"渡す・招く・促す時の言葉",ex_tr:"Buyur, içeri girin.",ex_ja:"どうぞ、中へお入りください。"},

  {tr:"Doymak",ja:"お腹がいっぱいになる",note:"Doydumで「満腹になりました」",ex_tr:"Çok yedim, doydum.",ex_ja:"たくさん食べた、満腹です。"},
];

let deck = [...vocab.map((_,i)=>i)];
let current = 0;
let mode = 'ja-tr';
let flipped = false;
let stats = {ok:0, ng:0};
let autoPlay = false;
let autoTimer = null;
let autoPhase = 0;
let speedMs = 2500;
const speedLabels = ['とても遅い','遅い','普通','速い','とても速い'];
const speedValues = [5000, 3500, 2500, 1800, 1200];

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach((t,i)=>{
    t.classList.toggle('active', ['ja-tr','tr-ja','random'][i]===m);
  });
  showCard();
}

function getCardMode() {
  if(mode === 'random') return Math.random() < 0.5 ? 'ja-tr' : 'tr-ja';
  return mode;
}

function showCard() {
  const idx = deck[current];
  const v = vocab[idx];
  const m = getCardMode();
  document.getElementById('card').classList.remove('flipped');
  flipped = false;
  document.getElementById('result-row').style.display = 'none';
  if(m === 'ja-tr') {
    document.getElementById('front-lang').textContent = '日本語';
    document.getElementById('front-word').textContent = v.ja;
    document.getElementById('back-lang').textContent = 'トルコ語';
    document.getElementById('back-word').textContent = v.tr;
  } else {
    document.getElementById('front-lang').textContent = 'トルコ語';
    document.getElementById('front-word').textContent = v.tr;
    document.getElementById('back-lang').textContent = '日本語';
    document.getElementById('back-word').textContent = v.ja;
  }
  document.getElementById('back-note').textContent = v.note;
  document.getElementById('back-example').innerHTML = '<em>' + v.ex_tr + '</em><br>' + v.ex_ja;
  updateProgress();
}

function flipCard() {
  if(flipped) return;
  document.getElementById('card').classList.add('flipped');
  flipped = true;
  document.getElementById('result-row').style.display = 'flex';
  speakCurrent();
}

function speakCurrent() {
  const v = vocab[deck[current]];
  speakText(v.tr);
}

function speak(e) {
  e.stopPropagation();
  speakCurrent();
}

function speakText(text) {
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'tr-TR';
  u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

function nextCard() {
  current = (current + 1) % deck.length;
  showCard();
}

function prevCard() {
  current = (current - 1 + deck.length) % deck.length;
  showCard();
}

function markCard(ok) {
  if(ok) stats.ok++; else stats.ng++;
  document.getElementById('stat-ok').textContent = stats.ok;
  document.getElementById('stat-ng').textContent = stats.ng;
  document.getElementById('stat-left').textContent = deck.length - current - 1;
  nextCard();
}

function updateProgress() {
  const pct = ((current+1)/deck.length*100).toFixed(0);
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('prog-text').textContent = (current+1) + ' / ' + deck.length;
  document.getElementById('stat-left').textContent = deck.length - current - 1;
}

function shuffle() {
  for(let i=deck.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [deck[i],deck[j]]=[deck[j],deck[i]];
  }
  current=0;
  showCard();
}

function resetStats() {
  stats={ok:0,ng:0};
  current=0;
  deck=[...vocab.map((_,i)=>i)];
  document.getElementById('stat-ok').textContent='0';
  document.getElementById('stat-ng').textContent='0';
  showCard();
}

function updateSpeed(v) {
  const idx = parseInt(v)-1;
  speedMs = speedValues[idx];
  document.getElementById('speed-label').textContent = speedLabels[idx];
}

function toggleAuto() {
  autoPlay = !autoPlay;
  const btn = document.getElementById('auto-btn');
  const ind = document.getElementById('auto-ind');
  if(autoPlay) {
    btn.textContent = '⏹ 停止';
    btn.classList.add('auto-on');
    ind.innerHTML = '<span class="auto-indicator"><span class="dot"></span>自動再生中</span>';
    autoPhase = 0;
    runAuto();
  } else {
    btn.textContent = '▶ 全自動再生';
    btn.classList.remove('auto-on');
    ind.innerHTML = '';
    clearTimeout(autoTimer);
  }
}

function runAuto() {
  if(!autoPlay) return;
  if(autoPhase === 0) {
    showCard();
    autoPhase = 1;
    autoTimer = setTimeout(runAuto, speedMs);
  } else {
    document.getElementById('card').classList.add('flipped');
    flipped = true;
    document.getElementById('result-row').style.display = 'flex';
    speakCurrent();
    autoPhase = 0;
    autoTimer = setTimeout(function(){
      current = (current + 1) % deck.length;
      runAuto();
    }, speedMs * 1.5);
  }
}

showCard();
</script>
</body>
</html>
