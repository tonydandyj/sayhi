<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タガログ語 A1 フレーズ練習</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Zen+Kaku+Gothic+New:wght@400;700&family=Inconsolata:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#08090f;--surface:#0f1120;--surface2:#161829;
    --accent:#ffd700;--accent2:#0038a8;--accent3:#ce1126;
    --text:#eeedf5;--text-dim:#7e7e9a;--border:#1e2040;
    --btn-a:#ffd700;--btn-b:#0038a8;--btn-c:#ce1126;--btn-d:#a78bfa;
    --success:#56d364;--radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inconsolata',monospace;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 55% 45% at 80% 10%,rgba(255,215,0,.07) 0%,transparent 55%),radial-gradient(ellipse 40% 35% at 15% 85%,rgba(0,56,168,.07) 0%,transparent 55%);pointer-events:none;z-index:0;}
  body::after{content:'';position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent3) 0%,var(--accent) 33%,var(--accent2) 66%,var(--accent3) 100%);z-index:999;}
  #app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
  header{flex-shrink:0;padding:9px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:rgba(8,9,15,.95);backdrop-filter:blur(14px);}
  .flag-badge{font-size:22px;line-height:1;}
  .header-text h1{font-family:'Libre Baskerville',serif;font-size:1.05rem;color:var(--accent);letter-spacing:.04em;}
  .header-text p{font-size:.59rem;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;margin-top:1px;}
  .lesson-counter{margin-left:auto;background:var(--surface2);border:1px solid var(--border);border-radius:50px;padding:4px 14px;font-size:.66rem;color:var(--text-dim);white-space:nowrap;}
  .lesson-counter span{color:var(--accent);font-weight:700;}
  .nav-bar{flex-shrink:0;display:flex;gap:5px;padding:7px 16px;overflow-x:auto;scrollbar-width:none;background:var(--bg);border-bottom:1px solid var(--border);align-items:center;}
  .nav-bar::-webkit-scrollbar{display:none;}
  .skit-sep{flex-shrink:0;font-size:.55rem;color:rgba(255,215,0,.3);padding:0 3px;user-select:none;}
  .nav-btn{flex-shrink:0;background:var(--surface);border:1px solid var(--border);color:var(--text-dim);border-radius:50px;padding:4px 11px;font-size:.62rem;font-family:'Inconsolata',monospace;cursor:pointer;transition:all .15s;white-space:nowrap;}
  .nav-btn:hover{border-color:var(--accent);color:var(--accent);}
  .nav-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600;}
  main{flex:1;overflow:hidden;display:flex;align-items:stretch;justify-content:center;padding:10px 16px;gap:12px;}
  .content-wrap{display:flex;gap:12px;width:100%;max-width:1100px;align-items:stretch;}
  .col-left,.col-right{flex:1;display:flex;flex-direction:column;gap:8px;}
  .skit-badge{display:inline-flex;align-items:center;gap:6px;font-size:.6rem;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;border:1px solid rgba(255,215,0,.4);border-radius:4px;padding:3px 12px;background:rgba(255,215,0,.07);align-self:flex-start;font-family:'Libre Baskerville',serif;}
  .phrase-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px 14px;position:relative;overflow:hidden;flex:1;display:flex;flex-direction:column;justify-content:center;}
  .phrase-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent3),var(--accent),var(--accent2),var(--btn-d));}
  .phrase-card::after{content:'✦';position:absolute;bottom:10px;right:14px;font-size:1.2rem;color:rgba(255,215,0,.07);pointer-events:none;}
  .phrase-number{display:inline-flex;align-items:center;gap:6px;font-size:.6rem;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
  .phrase-number-badge{background:var(--accent);color:var(--bg);border-radius:3px;padding:1px 7px;font-weight:700;font-size:.63rem;}
  .phrase-tagalog{font-family:'Libre Baskerville',serif;font-size:3rem;font-weight:700;line-height:1.35;color:var(--text);margin-bottom:6px;word-break:break-word;}
  .phrase-romaji{font-size:1.6rem;color:rgba(167,139,250,.9);margin-bottom:5px;font-style:italic;letter-spacing:.02em;}
  .phrase-japanese{font-size:1.8rem;color:var(--text-dim);font-family:'Zen Kaku Gothic New',sans-serif;}
  .buttons-label{font-size:.58rem;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;}
  .example-buttons{display:grid;grid-template-columns:1fr 1fr;gap:7px;flex-shrink:0;}
  .ex-btn{background:var(--surface2);border:1.5px solid var(--border);color:var(--text);border-radius:9px;padding:9px 12px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:.82rem;cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;gap:8px;}
  .ex-btn:hover{transform:translateY(-1px);}
  .ex-btn[data-idx="0"]{border-color:rgba(255,215,0,.45);}
  .ex-btn[data-idx="1"]{border-color:rgba(0,56,168,.6);}
  .ex-btn[data-idx="2"]{border-color:rgba(206,17,38,.5);}
  .ex-btn[data-idx="3"]{border-color:rgba(167,139,250,.45);}
  .ex-btn[data-idx="0"]:hover,.ex-btn.active[data-idx="0"]{background:rgba(255,215,0,.12);border-color:var(--btn-a);box-shadow:0 0 0 2px rgba(255,215,0,.25);}
  .ex-btn[data-idx="1"]:hover,.ex-btn.active[data-idx="1"]{background:rgba(0,56,168,.15);border-color:var(--btn-b);box-shadow:0 0 0 2px rgba(0,56,168,.3);}
  .ex-btn[data-idx="2"]:hover,.ex-btn.active[data-idx="2"]{background:rgba(206,17,38,.12);border-color:var(--btn-c);box-shadow:0 0 0 2px rgba(206,17,38,.25);}
  .ex-btn[data-idx="3"]:hover,.ex-btn.active[data-idx="3"]{background:rgba(167,139,250,.12);border-color:var(--btn-d);box-shadow:0 0 0 2px rgba(167,139,250,.25);}
  .label-tag{font-size:.62rem;font-weight:700;font-family:'Inconsolata',monospace;padding:2px 6px;border-radius:3px;flex-shrink:0;}
  .ex-btn[data-idx="0"] .label-tag{background:var(--btn-a);color:var(--bg);}
  .ex-btn[data-idx="1"] .label-tag{background:var(--btn-b);color:#fff;}
  .ex-btn[data-idx="2"] .label-tag{background:var(--btn-c);color:#fff;}
  .ex-btn[data-idx="3"] .label-tag{background:var(--btn-d);color:#fff;}
  .result-panel{background:var(--surface2);border:1px solid var(--border);border-radius:11px;overflow:hidden;animation:slideIn .2s ease;flex:1;display:flex;flex-direction:column;}
  .result-placeholder{flex:1;display:flex;align-items:center;justify-content:center;border:1px dashed var(--border);border-radius:11px;color:var(--text-dim);font-size:.7rem;letter-spacing:.06em;text-align:center;padding:20px;line-height:2;font-family:'Zen Kaku Gothic New',sans-serif;}
  @keyframes slideIn{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}
  .result-header{flex-shrink:0;padding:8px 16px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border);font-size:.63rem;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;}
  .result-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .result-body{padding:14px 16px;flex:1;display:flex;flex-direction:column;justify-content:center;}
  .result-tagalog{font-family:'Libre Baskerville',serif;font-size:2.5rem;font-weight:600;margin-bottom:5px;line-height:1.4;}
  .result-romaji{font-size:1.56rem;font-style:italic;color:rgba(167,139,250,.9);margin-bottom:4px;letter-spacing:.02em;}
  .result-japanese{font-family:'Zen Kaku Gothic New',sans-serif;font-size:1.76rem;color:var(--text-dim);margin-bottom:12px;}
  .play-btn{display:inline-flex;align-items:center;gap:7px;padding:7px 16px;border-radius:50px;border:none;cursor:pointer;font-family:'Inconsolata',monospace;font-size:.66rem;font-weight:600;transition:all .14s;letter-spacing:.05em;align-self:flex-start;}
  .play-btn svg{transition:transform .12s;}
  .play-btn:hover svg{transform:scale(1.2);}
  .play-btn[data-idx="0"]{background:var(--btn-a);color:var(--bg);}
  .play-btn[data-idx="1"]{background:var(--btn-b);color:#fff;}
  .play-btn[data-idx="2"]{background:var(--btn-c);color:#fff;}
  .play-btn[data-idx="3"]{background:var(--btn-d);color:#fff;}
  .play-btn:hover{filter:brightness(1.12);transform:translateY(-1px);}
  .play-btn:active{transform:translateY(0);}
  .play-btn.playing{animation:pulse .55s ease infinite alternate;}
  @keyframes pulse{from{opacity:1;}to{opacity:.6;}}
  .audio-status{font-size:.58rem;color:var(--text-dim);margin-top:5px;}
  .audio-status.ready{color:var(--success);}
  .toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface2);border:1px solid var(--accent);color:var(--text);font-size:.72rem;padding:7px 18px;border-radius:50px;transition:transform .25s ease;z-index:100;white-space:nowrap;font-family:'Zen Kaku Gothic New',sans-serif;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:var(--surface);}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

  /* ── Auto-play button ── */
  .autoplay-btn {
    position: fixed;
    bottom: 16px;
    right: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 18px;
    border-radius: 50px;
    border: 2px solid var(--accent);
    background: var(--bg);
    color: var(--accent);
    font-family: 'Inconsolata', monospace;
    font-size: 0.72rem;
    font-weight: 600;
    cursor: pointer;
    z-index: 50;
    transition: all 0.2s;
    letter-spacing: 0.05em;
    box-shadow: 0 0 0 0 rgba(255,215,0,0);
  }
  .autoplay-btn:hover {
    background: rgba(255,215,0,0.1);
    box-shadow: 0 0 16px rgba(255,215,0,0.2);
  }
  .autoplay-btn.playing {
    background: var(--accent);
    color: var(--bg);
    box-shadow: 0 0 20px rgba(255,215,0,0.35);
    animation: autoPulse 1.8s ease infinite;
  }
  @keyframes autoPulse {
    0%,100% { box-shadow: 0 0 20px rgba(255,215,0,0.35); }
    50%      { box-shadow: 0 0 32px rgba(255,215,0,0.6); }
  }
  .autoplay-btn .ap-icon { font-size: 0.9rem; transition: transform 0.2s; }
  .autoplay-btn.playing .ap-icon { animation: apSpin 0; }
  .autoplay-progress {
    position: fixed;
    bottom: 58px;
    right: 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 4px 14px;
    font-size: 0.62rem;
    color: var(--text-dim);
    font-family: 'Inconsolata', monospace;
    z-index: 50;
    transition: opacity 0.3s;
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
  }
  .autoplay-progress.visible { opacity: 1; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="flag-badge">🇵🇭</div>
    <div class="header-text">
      <h1>タガログ語 フレーズ練習帳</h1>
      <p>A1 Level · Set Phrase Substitution Drills</p>
    </div>
    <div class="lesson-counter">構文 <span id="currentNum">1</span> / 28</div>
  </header>
  <div class="nav-bar" id="navBar"></div>
  <main>
    <div class="content-wrap">
      <div class="col-left">
        <div class="skit-badge" id="skitBadge">スキット 1</div>
        <div class="phrase-card" id="phraseCard"></div>
      </div>
      <div class="col-right">
        <p class="buttons-label">▸ 入れ替え語を選んでください</p>
        <div class="example-buttons" id="exampleButtons"></div>
        <div id="resultArea">
          <div class="result-placeholder">← A〜D のボタンを押すと<br>例文とタガログ語音声が表示されます</div>
        </div>
      </div>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>
<button class="autoplay-btn" id="autoplayBtn" onclick="toggleAutoPlay()">
  <span class="ap-icon">▶</span>
  <span id="autoplayLabel">自動再生</span>
</button>
<div class="autoplay-progress" id="autoplayProgress"></div>

let currentId=1,activeExIdx=null,currentAudio=null;

function playAudio(phraseId,exIdx,btnEl){
  const key=`p${phraseId}_ex${exIdx}`,src=AUDIO_DATA[key];
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  document.querySelectorAll('.play-btn').forEach(b=>b.classList.remove('playing'));
  if(!src){showToast('⚠️ 音声ファイルはまだ登録されていません');return;}
  const audio=new Audio(src);currentAudio=audio;
  if(btnEl)btnEl.classList.add('playing');
  audio.play().catch(()=>showToast('⚠️ 再生に失敗しました'));
  audio.onended=()=>{if(btnEl)btnEl.classList.remove('playing');currentAudio=null;};
  showToast('▶ タガログ語を再生中...');
}

function buildNav(){
  const nav=document.getElementById('navBar');nav.innerHTML='';let lastSkit=null;
  PHRASES.forEach(p=>{
    if(lastSkit&&p.skit!==lastSkit){const s=document.createElement('span');s.className='skit-sep';s.textContent='│';nav.appendChild(s);}
    const btn=document.createElement('button');
    btn.className='nav-btn'+(p.id===currentId?' active':'');
    btn.textContent=`構文${p.id}`;btn.onclick=()=>switchPhrase(p.id);nav.appendChild(btn);lastSkit=p.skit;
  });
}

function switchPhrase(id){
  currentId=id;activeExIdx=null;
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  document.getElementById('currentNum').textContent=id;

let autoPlaying = false;
let autoTimer = null;
let autoAudio = null;

function buildPlayQueue(fromPhraseId, fromExIdx) {
  // Build queue from current position to end of all phrases
  const queue = [];
  let started = false;
  for (const p of PHRASES) {
    for (let i = 0; i < p.examples.length; i++) {
      if (!started) {
        if (p.id === fromPhraseId && i === fromExIdx) started = true;
        else continue;
      }
      const key = `p${p.id}_ex${i}`;
      if (AUDIO_DATA[key]) {
        queue.push({ phraseId: p.id, exIdx: i, key });
      }
    }
  }
  return queue;
}

let autoQueue = [];
let autoQueuePos = 0;

function toggleAutoPlay() {
  if (autoPlaying) {
    stopAutoPlay();
  } else {
    startAutoPlay();
  }
}

function startAutoPlay() {
  autoPlaying = true;
  const btn = document.getElementById('autoplayBtn');
  btn.classList.add('playing');
  document.getElementById('autoplayLabel').textContent = '停止';

  // Build queue from current phrase+example (or first example of current phrase)
  const startEx = activeExIdx !== null ? activeExIdx : 0;
  autoQueue = buildPlayQueue(currentId, startEx);
  autoQueuePos = 0;

  if (autoQueue.length === 0) {
    // No audio available from here — try from beginning
    autoQueue = buildPlayQueue(PHRASES[0].id, 0);
    autoQueuePos = 0;
  }

  if (autoQueue.length === 0) {
    showToast('⚠️ 再生できる音声がありません');
    stopAutoPlay();
    return;
  }

  playNextInQueue();
}

function stopAutoPlay() {
  autoPlaying = false;
  if (autoAudio) { autoAudio.pause(); autoAudio = null; }
  clearTimeout(autoTimer);
  const btn = document.getElementById('autoplayBtn');
  btn.classList.remove('playing');
  document.getElementById('autoplayLabel').textContent = '自動再生';
  document.getElementById('autoplayProgress').classList.remove('visible');
}

function playNextInQueue() {
  if (!autoPlaying) return;
  if (autoQueuePos >= autoQueue.length) {
    // 最後まで再生したら構文1に戻って最初から再開
    autoQueue = buildPlayQueue(PHRASES[0].id, 0);
    autoQueuePos = 0;
    if (autoQueue.length === 0) { stopAutoPlay(); return; }
  }

  const { phraseId, exIdx, key } = autoQueue[autoQueuePos];

  // Navigate to the phrase and highlight example
  if (phraseId !== currentId) {
    currentId = phraseId;
    document.getElementById('currentNum').textContent = phraseId;
    buildNav();
    renderPhrase();
  }
  activeExIdx = exIdx;
  renderButtons();
  renderResult();

  // Scroll nav button into view
  const a = document.querySelector('.nav-btn.active');
  if (a) a.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

  // Update progress
  const total = autoQueue.length;
  const current = autoQueuePos + 1;
  const p = PHRASES.find(x => x.id === phraseId);
  const labels = ['A','B','C','D'];
  document.getElementById('autoplayProgress').textContent =
    `${current} / ${total}　構文${phraseId} — ${labels[exIdx]}`;
  document.getElementById('autoplayProgress').classList.add('visible');

  // Play audio
  if (autoAudio) { autoAudio.pause(); autoAudio = null; }
  const src = AUDIO_DATA[key];
  const audio = new Audio(src);
  autoAudio = audio;

  // Highlight play button
  document.querySelectorAll('.play-btn').forEach(b => b.classList.remove('playing'));
  const playBtn = document.getElementById('playBtnResult');
  if (playBtn) playBtn.classList.add('playing');

  audio.play().catch(() => {});
  audio.onended = () => {
    if (playBtn) playBtn.classList.remove('playing');
    autoAudio = null;
    autoQueuePos++;
    if (autoPlaying) {
      // 1.2s pause between examples, 2s between phrases
      const next = autoQueue[autoQueuePos];
      const gap = (next && next.phraseId !== phraseId) ? 2000 : 1200;
      autoTimer = setTimeout(playNextInQueue, gap);
    }
  };
}

function renderButtons(){
  const p=PHRASES.find(x=>x.id===currentId),L=['A','B','C','D'];
  document.getElementById('exampleButtons').innerHTML=p.examples.map((ex,i)=>
    `<button class="ex-btn${activeExIdx===i?' active':''}" data-idx="${i}" onclick="selectExample(${p.id},${i})">
      <span class="label-tag">${L[i]}</span>${ex.label}</button>`).join('');
}

function renderResult(){
  const area=document.getElementById('resultArea');
  if(activeExIdx===null){area.innerHTML='<div class="result-placeholder">← A〜D のボタンを押すと<br>例文とタガログ語音声が表示されます</div>';return;}
  const p=PHRASES.find(x=>x.id===currentId),ex=p.examples[activeExIdx];
  const key=`p${p.id}_ex${activeExIdx}`,hasAudio=!!AUDIO_DATA[key];
  const colors=['var(--btn-a)','var(--btn-b)','var(--btn-c)','var(--btn-d)'],L=['A','B','C','D'];
  area.innerHTML=`<div class="result-panel">
    <div class="result-header"><span class="result-dot" style="background:${colors[activeExIdx]}"></span>例文 ${L[activeExIdx]} — ${ex.label}</div>
    <div class="result-body">
      <div class="result-tagalog" style="color:${colors[activeExIdx]}">${ex.tagalog}</div>
      <div class="result-romaji">${ex.romaji}</div>
      <div class="result-japanese">${ex.japanese}</div>
      <button class="play-btn" id="playBtnResult" data-idx="${activeExIdx}" onclick="playAudio(${p.id},${activeExIdx},this)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        タガログ語を再生</button>
      <div class="audio-status ${hasAudio?'ready':'missing'}">${hasAudio?'● 音声あり':'○ 音声未登録 — mp3ファイルを受け取り次第追加します'}</div>
    </div></div>`;
}

function selectExample(phraseId,idx){
  activeExIdx=idx;renderButtons();renderResult();
  const key=`p${phraseId}_ex${idx}`;
  if(AUDIO_DATA[key])setTimeout(()=>playAudio(phraseId,idx,document.getElementById('playBtnResult')),150);
}

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

function toggleAutoPlay() {
  if (autoPlaying) {
    stopAutoPlay();
  } else {
    startAutoPlay();
  }
}

function startAutoPlay() {
  autoPlaying = true;
  const btn = document.getElementById('autoplayBtn');
  btn.classList.add('playing');
  document.getElementById('autoplayLabel').textContent = '停止';

  // Build queue from current phrase+example (or first example of current phrase)
  const startEx = activeExIdx !== null ? activeExIdx : 0;
  autoQueue = buildPlayQueue(currentId, startEx);
  autoQueuePos = 0;

  if (autoQueue.length === 0) {
    // No audio available from here — try from beginning
    autoQueue = buildPlayQueue(PHRASES[0].id, 0);
    autoQueuePos = 0;
  }

  if (autoQueue.length === 0) {
    showToast('⚠️ 再生できる音声がありません');
    stopAutoPlay();
    return;
  }

  playNextInQueue();
}

function stopAutoPlay() {
  autoPlaying = false;
  if (autoAudio) { autoAudio.pause(); autoAudio = null; }
  clearTimeout(autoTimer);
  const btn = document.getElementById('autoplayBtn');
  btn.classList.remove('playing');
  document.getElementById('autoplayLabel').textContent = '自動再生';
  document.getElementById('autoplayProgress').classList.remove('visible');
}

function playNextInQueue() {
  if (!autoPlaying) return;
  if (autoQueuePos >= autoQueue.length) {
    // 最後まで再生したら構文1に戻って最初から再開
    autoQueue = buildPlayQueue(PHRASES[0].id, 0);
    autoQueuePos = 0;
    if (autoQueue.length === 0) { stopAutoPlay(); return; }
  }

  const { phraseId, exIdx, key } = autoQueue[autoQueuePos];

  // Navigate to the phrase and highlight example
  if (phraseId !== currentId) {
    currentId = phraseId;
    document.getElementById('currentNum').textContent = phraseId;
    buildNav();
    renderPhrase();
  }
  activeExIdx = exIdx;
  renderButtons();
  renderResult();

  // Scroll nav button into view
  const a = document.querySelector('.nav-btn.active');
  if (a) a.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

  // Update progress
  const total = autoQueue.length;
  const current = autoQueuePos + 1;
  const p = PHRASES.find(x => x.id === phraseId);
  const labels = ['A','B','C','D'];
  document.getElementById('autoplayProgress').textContent =
    `${current} / ${total}　構文${phraseId} — ${labels[exIdx]}`;
  document.getElementById('autoplayProgress').classList.add('visible');

  // Play audio
  if (autoAudio) { autoAudio.pause(); autoAudio = null; }
  const src = AUDIO_DATA[key];
  const audio = new Audio(src);
  autoAudio = audio;

  // Highlight play button
  document.querySelectorAll('.play-btn').forEach(b => b.classList.remove('playing'));
  const playBtn = document.getElementById('playBtnResult');
  if (playBtn) playBtn.classList.add('playing');

  audio.play().catch(() => {});
  audio.onended = () => {
    if (playBtn) playBtn.classList.remove('playing');
    autoAudio = null;
    autoQueuePos++;
    if (autoPlaying) {
      // 1.2s pause between examples, 2s between phrases
      const next = autoQueue[autoQueuePos];
      const gap = (next && next.phraseId !== phraseId) ? 2000 : 1200;
      autoTimer = setTimeout(playNextInQueue, gap);
    }
  };
}

buildNav();renderPhrase();renderButtons();renderResult();
</script>
</body>
</html>
