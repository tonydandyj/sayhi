<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇮🇩 インドネシア語フラッシュカード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&family=M+PLUS+Rounded+1c:wght@400;500;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --jungle:    #059669;
  --leaf:      #34d399;
  --terracotta:#d97706;
  --gold:      #fbbf24;
  --cream:     #fefce8;
  --red:       #dc2626;
  --text:      #1a3a2a;
  --text-mid:  #2d6a4f;
  --text-muted:#6aaa88;
  --glass:     rgba(255,255,255,0.80);
  --glass2:    rgba(255,255,255,0.55);
  --border:    rgba(5,150,105,0.22);
  --border2:   rgba(5,150,105,0.40);
  --jp:        'M PLUS Rounded 1c', 'Nunito', sans-serif;
  --foreign:   'Noto Sans', 'Nunito', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  overflow: hidden;
  font-family: var(--jp);
  background: linear-gradient(135deg, #d1fae5 0%, #fefce8 40%, #ecfdf5 70%, #fef3c7 100%);
  color: var(--text);
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 20% 20%, rgba(52,211,153,0.18) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 80%, rgba(251,191,36,0.13) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}
#app {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  height: 100vh; height: 100dvh;
  max-width: 640px;
  margin: 0 auto;
  overflow: hidden;
}

/* HEADER */
header {
  background: linear-gradient(135deg, #065f46 0%, #059669 60%, #0d9488 100%);
  color: #fff;
  padding: 10px 14px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  box-shadow: 0 2px 12px rgba(5,150,105,0.35);
}
.header-left { display: flex; align-items: center; gap: 7px; }
.header-left h1 {
  font-family: var(--foreign);
  font-size: clamp(0.88rem, 3.2vw, 1.05rem);
  font-weight: 800;
  letter-spacing: 0.01em;
  color: #fff;
}
.flag { font-size: 1.4em; }
.header-btns { display: flex; gap: 6px; }
.hbtn {
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  border-radius: 8px;
  width: 34px; height: 34px;
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.18s, transform 0.12s;
  flex-shrink: 0;
}
.hbtn:hover { background: rgba(255,255,255,0.30); transform: scale(1.08); }
.hbtn:active { transform: scale(0.92); }

/* MODE */
.mode-row {
  display: flex; gap: 7px; padding: 8px 14px 6px;
  flex-shrink: 0;
}
.mbtn {
  flex: 1;
  padding: 7px 4px;
  border-radius: 20px;
  border: 1.5px solid var(--border2);
  background: var(--glass2);
  color: var(--text-mid);
  font-family: var(--jp);
  font-size: 0.78rem; font-weight: 700;
  cursor: pointer;
  transition: all 0.18s;
  backdrop-filter: blur(6px);
}
.mbtn:hover { background: var(--glass); border-color: var(--jungle); }
.mbtn.active {
  background: linear-gradient(135deg, #065f46 0%, #059669 100%);
  color: #fff; border-color: transparent;
  box-shadow: 0 3px 12px rgba(5,150,105,0.38);
}

/* STATS */
.stats-row {
  display: flex; align-items: center; gap: 8px;
  padding: 3px 14px 5px;
  font-size: 0.72rem; color: var(--text-mid); font-weight: 600;
  flex-shrink: 0;
}
.stat-item { white-space: nowrap; }
.prog-wrap {
  flex: 1;
  height: 6px; background: rgba(5,150,105,0.15);
  border-radius: 3px; overflow: hidden;
}
.prog-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--jungle), var(--gold));
  border-radius: 3px;
  transition: width 0.4s ease;
}
.pct { white-space: nowrap; font-weight: 700; color: var(--jungle); }

/* CATEGORY SCROLL */
.cat-scroll {
  overflow-x: auto;
  display: flex;
  gap: 7px;
  padding: 4px 14px 8px;
  flex-shrink: 0;
  scrollbar-width: thin;
  scrollbar-color: var(--leaf) rgba(5,150,105,.12);
}
.cat-scroll::-webkit-scrollbar { height: 5px; }
.cat-scroll::-webkit-scrollbar-track { background: rgba(5,150,105,.10); border-radius: 4px; }
.cat-scroll::-webkit-scrollbar-thumb { background: var(--leaf); border-radius: 4px; }
.cat-scroll::-webkit-scrollbar-thumb:hover { background: var(--jungle); }
.cpill {
  padding: 5px 12px;
  border-radius: 16px;
  border: 1.5px solid var(--border);
  background: var(--glass2);
  color: var(--text-mid);
  font-size: 0.73rem; font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.17s;
  flex-shrink: 0;
  backdrop-filter: blur(6px);
}
.cpill:hover { background: var(--glass); border-color: var(--jungle); }
.cpill.active {
  background: linear-gradient(135deg, #065f46, #059669);
  color: #fff; border-color: transparent;
  box-shadow: 0 2px 10px rgba(5,150,105,0.35);
}

/* CARD AREA */
.card-area {
  flex: 1;
  display: flex; flex-direction: column;
  padding: 6px 14px 4px;
  overflow: hidden;
  min-height: 0;
}
.card-wrap {
  flex: 1;
  perspective: 900px;
  min-height: 0;
}
.card {
  width: 100%; height: 100%;
  background: var(--glass);
  backdrop-filter: blur(12px);
  border-radius: 18px;
  border: 1.5px solid var(--border2);
  box-shadow: 0 8px 32px rgba(5,150,105,0.13), 0 1px 4px rgba(0,0,0,0.06);
  display: flex; flex-direction: column;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  overflow: hidden;
  position: relative;
}
.card:hover { transform: translateY(-2px) scale(1.003); box-shadow: 0 12px 40px rgba(5,150,105,0.18); }
.card:active { transform: scale(0.97); }
.card-accent {
  height: 4px;
  background: linear-gradient(90deg, var(--red) 50%, #fff 50%);
  flex-shrink: 0;
}
.card-meta {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 14px 2px;
  flex-shrink: 0;
}
.cat-label {
  font-size: 0.66rem; font-weight: 700;
  color: var(--jungle);
  background: rgba(5,150,105,0.10);
  padding: 2px 8px; border-radius: 10px;
  letter-spacing: 0.02em;
}
.card-counter { font-size: 0.66rem; color: var(--text-muted); font-weight: 600; }
.card-body {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 8px 18px 6px; text-align: center;
  gap: 8px; min-height: 0;
}
.card-main {
  font-family: var(--foreign);
  font-size: clamp(1.4rem, 5vw, 2.2rem);
  font-weight: 700;
  color: var(--text);
  line-height: 1.25;
}
.card-main.jp {
  font-family: var(--jp);
  font-size: clamp(1.1rem, 4vw, 1.7rem);
  color: var(--text-mid);
}
.rom {
  font-family: var(--foreign);
  font-size: clamp(0.72rem, 2.2vw, 0.92rem);
  font-style: italic;
  color: var(--text-muted);
  background: rgba(5,150,105,0.07);
  padding: 3px 10px; border-radius: 8px;
  letter-spacing: 0.03em;
}
.tap-hint {
  font-size: 0.72rem; color: var(--text-muted);
  margin-top: 4px;
}
.speak-btn {
  background: rgba(5,150,105,0.10);
  border: 1px solid rgba(5,150,105,0.25);
  border-radius: 50%; width: 38px; height: 38px;
  font-size: 1.1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0;
  margin-top: 4px;
}
.speak-btn:hover { background: rgba(5,150,105,0.20); transform: scale(1.1); }
.speak-btn.pulsing { animation: pulse 0.7s infinite alternate; }
@keyframes pulse { from { box-shadow: 0 0 0 0 rgba(5,150,105,0.4); } to { box-shadow: 0 0 0 8px rgba(5,150,105,0); } }
.divider { width: 80%; height: 1px; background: var(--border); margin: 4px 0; flex-shrink: 0; }

/* BUTTONS */
.btn-row {
  display: flex; gap: 6px;
  padding: 6px 14px 8px;
  flex-shrink: 0;
}
.btn {
  flex: 1; padding: 9px 4px;
  border-radius: 12px;
  border: none; cursor: pointer;
  font-family: var(--jp);
  font-size: 0.73rem; font-weight: 700;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 3px;
}
.btn:active { transform: scale(0.94); }
.btn-back { background: var(--glass2); border: 1.5px solid var(--border); color: var(--text-mid); backdrop-filter: blur(6px); }
.btn-back:hover { background: var(--glass); border-color: var(--jungle); }
.btn-reveal {
  background: linear-gradient(135deg, #065f46, #059669);
  color: #fff;
  box-shadow: 0 3px 10px rgba(5,150,105,0.35);
  flex: 1.3;
}
.btn-reveal:hover { box-shadow: 0 5px 16px rgba(5,150,105,0.45); transform: translateY(-1px); }
.btn-unreveal { background: var(--glass2); border: 1.5px solid var(--border); color: var(--text-mid); backdrop-filter: blur(6px); }
.btn-check {
  background: linear-gradient(135deg, #34d399, #059669);
  color: #fff;
  box-shadow: 0 3px 10px rgba(52,211,153,0.35);
}
.btn-check:hover { box-shadow: 0 5px 16px rgba(52,211,153,0.45); transform: translateY(-1px); }
.btn-next {
  background: linear-gradient(135deg, var(--terracotta), var(--gold));
  color: #fff;
  box-shadow: 0 3px 10px rgba(217,119,6,0.35);
  flex: 1.3;
}
.btn-next:hover { box-shadow: 0 5px 16px rgba(217,119,6,0.45); transform: translateY(-1px); }

/* KEYBOARD HINT */
.kbd-hint {
  text-align: center;
  font-size: 0.62rem;
  color: var(--text-muted);
  padding: 0 14px 6px;
  flex-shrink: 0;
  letter-spacing: 0.01em;
}

/* COMPLETE OVERLAY */
#complete-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(10px);
  align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
  animation: fadeIn 0.3s ease;
}
#complete-overlay.show { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.complete-box {
  background: linear-gradient(135deg, #065f46 0%, #059669 60%, #0d9488 100%);
  border-radius: 24px;
  padding: 30px 40px;
  text-align: center;
  color: #fff;
  box-shadow: 0 20px 60px rgba(5,150,105,0.4);
}
.complete-box .trophy { font-size: 3.5rem; margin-bottom: 8px; }
.complete-box h2 { font-size: 1.4rem; font-weight: 800; }
.complete-box p { font-size: 0.88rem; opacity: 0.85; margin-top: 4px; }

/* MODAL */
#modal-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 100;
  background: rgba(26,58,42,0.5);
  backdrop-filter: blur(4px);
  align-items: flex-end;
}
#modal-overlay.show { display: flex; }
#modal {
  width: 100%; max-height: 85vh;
  background: #fefce8;
  border-radius: 24px 24px 0 0;
  display: flex; flex-direction: column;
  overflow: hidden;
  box-shadow: 0 -8px 40px rgba(5,150,105,0.2);
  animation: slideUp 0.28s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-hdr {
  background: linear-gradient(135deg, #065f46, #059669);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.modal-hdr h2 { color: #fff; font-size: 1rem; font-weight: 800; flex: 1; }
#modal-search {
  flex: 1;
  padding: 7px 12px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.9);
  font-family: var(--jp);
  font-size: 0.82rem;
  color: var(--text);
  outline: none;
}
.close-btn {
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff; border-radius: 8px;
  width: 30px; height: 30px;
  font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.close-btn:hover { background: rgba(255,255,255,0.35); }
#modal-list { overflow-y: auto; padding: 8px 0 16px; }
.modal-cat-title {
  font-size: 0.7rem; font-weight: 800;
  color: var(--jungle);
  padding: 8px 16px 3px;
  text-transform: uppercase; letter-spacing: 0.05em;
  background: rgba(5,150,105,0.05);
}
.modal-row {
  display: flex; gap: 10px; align-items: center;
  padding: 8px 16px;
  cursor: pointer;
  border-bottom: 1px solid rgba(5,150,105,0.08);
  transition: background 0.12s;
}
.modal-row:hover { background: rgba(5,150,105,0.06); }
.modal-row.mastered { opacity: 0.38; }
.modal-row-text { flex: 1; min-width: 0; }
.modal-foreign { font-family: var(--foreign); font-size: 0.84rem; font-weight: 600; color: var(--text); }
.modal-ja { font-size: 0.74rem; color: var(--text-muted); }
.modal-check { color: var(--jungle); font-size: 1rem; flex-shrink: 0; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-left">
      <span class="flag">🇮🇩</span>
      <h1>インドネシア語 フラッシュカード</h1>
    </div>
    <div class="header-btns">
      <button class="hbtn" id="btn-list" title="一覧">📋</button>
      <button class="hbtn" id="btn-reset" title="リセット">🔄</button>
      <button class="hbtn" id="btn-shuffle" title="シャッフル">🔀</button>
      <button class="hbtn" id="btn-mute" title="ミュート">🔊</button>
    </div>
  </header>

  <div class="mode-row">
    <button class="mbtn active" data-mode="ja2id">和 → 印</button>
    <button class="mbtn" data-mode="id2ja">印 → 和</button>
    <button class="mbtn" data-mode="random">🎲 ランダム</button>
  </div>

  <div class="stats-row">
    <span class="stat-item" id="stat-total">全0件</span>
    <span class="stat-item" id="stat-rem">残り0件</span>
    <span class="stat-item" id="stat-done">✓0件</span>
    <div class="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
    <span class="pct" id="stat-pct">0%</span>
  </div>

  <div class="cat-scroll" id="cat-scroll"></div>

  <div class="card-area">
    <div class="card-wrap">
      <div class="card" id="main-card" onclick="toggleReveal()">
        <div class="card-accent"></div>
        <div class="card-meta">
          <span class="cat-label" id="card-cat">カテゴリ</span>
          <span class="card-counter" id="card-counter">0 / 0</span>
        </div>
        <div class="card-body" id="card-body">
          <div class="card-main" id="card-question">読み込み中...</div>
        </div>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-back" onclick="prevCard()">← 戻る</button>
    <button class="btn btn-reveal" id="btn-reveal" onclick="toggleReveal()">▶ 表示</button>
    <button class="btn btn-unreveal" id="btn-unreveal" onclick="toggleReveal()" style="display:none">◀ 戻す</button>
    <button class="btn btn-check" onclick="markMastered()">✓ 覚えた</button>
    <button class="btn btn-next" onclick="nextCard()">次へ →</button>
  </div>

  <div class="kbd-hint">→ 次へ ／ ← 戻る ／ Enter 答えを見る ／ C 覚えた</div>
</div>

<div id="complete-overlay">
  <div class="complete-box">
    <div class="trophy">🏆</div>
    <h2>全カード完了！</h2>
    <p>チェックを解除してリスタートします</p>
  </div>
</div>

<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal">
    <div class="modal-hdr">
      <h2>📋 例文一覧</h2>
      <input type="text" id="modal-search" placeholder="検索（日本語・インドネシア語）" oninput="filterModal()">
      <button class="close-btn" onclick="closeModalDirect()">✕</button>
    </div>
    <div id="modal-list"></div>
  </div>
</div>

// ─────────────── STATE ───────────────
const LS_KEY = 'indonesian_mastered_v1';
let cards = [];
let filtered = [];
let currentIdx = 0;
let revealed = false;
let mode = 'ja2id';
let currentCat = 'すべて';
let mastered = new Set();
let isMuted = false;
let isSpeaking = false;

// ─────────────── UTIL ───────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function loadMastered() {
  try { mastered = new Set(JSON.parse(localStorage.getItem(LS_KEY) || '[]')); } catch(e) { mastered = new Set(); }
}
function saveMastered() {
  try { localStorage.setItem(LS_KEY, JSON.stringify([...mastered])); } catch(e) {}
}

// ─────────────── SPEECH ───────────────
function speakForeign(text, onDone) {
  if (isMuted) { if (onDone) onDone(); return; }
  window.speechSynthesis.cancel();
  function doSpeak(lang) {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = 0.8; u.pitch = 1.0;
    u.onend = () => { isSpeaking = false; setSpeakBtnPulse(false); if (onDone) onDone(); };
    u.onerror = () => { isSpeaking = false; setSpeakBtnPulse(false); if (onDone) onDone(); };
    window.speechSynthesis.speak(u);
  }
  const voices = window.speechSynthesis.getVoices();
  const preferred = ['id-ID','in-ID','id','en-ID','en-US'];
  let chosen = null;
  for (const lang of preferred) {
    const v = voices.find(v => v.lang === lang || v.lang.startsWith('id'));
    if (v) { chosen = v.lang; break; }
  }
  isSpeaking = true; setSpeakBtnPulse(true);
  doSpeak(chosen || 'id-ID');
}
function speakJapanese(text, onDone) {
  if (isMuted) { if (onDone) onDone(); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP'; u.rate = 0.85;
  u.onend = () => { isSpeaking = false; setSpeakBtnPulse(false); if (onDone) onDone(); };
  u.onerror = () => { isSpeaking = false; setSpeakBtnPulse(false); if (onDone) onDone(); };
  isSpeaking = true; setSpeakBtnPulse(true);
  window.speechSynthesis.speak(u);
}
function speakAnswer() {
  const card = filtered[currentIdx];
  if (!card) return;
  const effectiveMode = mode === 'random' ? card._randMode : mode;
  if (effectiveMode === 'ja2id') speakForeign(card.foreign);
  else speakJapanese(card.ja);
}
function setSpeakBtnPulse(v) {
  const btn = document.getElementById('speak-btn');
  if (btn) btn.classList.toggle('pulsing', v);
}

// ─────────────── INIT ───────────────
function init() {
  loadMastered();
  cards = CARDS_RAW.map((d, i) => ({ ...d, _id: d.id || i }));
  buildCatButtons();
  applyFilter();
  updateStats();
  renderCard();
}

// ─────────────── CATEGORIES ───────────────
function buildCatButtons() {
  const cats = ['すべて', ...new Set(cards.map(c => c.cat))];
  const scroll = document.getElementById('cat-scroll');
  scroll.innerHTML = '';
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cpill' + (cat === currentCat ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => selectCat(cat);
    scroll.appendChild(btn);
  });
}
function selectCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cpill').forEach(b => b.classList.toggle('active', b.textContent === cat));
  applyFilter();
  currentIdx = 0;
  revealed = false;
  updateStats();
  renderCard();
}

// ─────────────── FILTER ───────────────
function applyFilter() {
  if (currentCat === 'すべて') filtered = [...cards];
  else filtered = cards.filter(c => c.cat === currentCat);
  skipMastered();
}
function skipMastered() {
  // find first non-mastered from current
  if (filtered.length === 0) return;
  let attempts = 0;
  while (mastered.has(filtered[currentIdx]?._id) && attempts < filtered.length) {
    currentIdx = (currentIdx + 1) % filtered.length;
    attempts++;
  }
}

// ─────────────── STATS ───────────────
function updateStats() {
  const total = filtered.length;
  const done = filtered.filter(c => mastered.has(c._id)).length;
  const rem = total - done;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('stat-total').textContent = `全${total}件`;
  document.getElementById('stat-rem').textContent = `残り${rem}件`;
  document.getElementById('stat-done').textContent = `✓${done}件`;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('stat-pct').textContent = pct + '%';
}

// ─────────────── RENDER ───────────────
function renderCard() {
  revealed = false;
  showRevealBtn();
  const card = filtered[currentIdx];
  if (!card) {
    document.getElementById('card-question').textContent = 'カードがありません';
    document.getElementById('card-cat').textContent = '';
    document.getElementById('card-counter').textContent = '';
    document.getElementById('card-body').innerHTML = '<div class="card-main">カードがありません</div>';
    return;
  }
  const effectiveMode = mode === 'random'
    ? (Math.random() < 0.5 ? 'ja2id' : 'id2ja')
    : mode;
  card._randMode = effectiveMode;

  document.getElementById('card-cat').textContent = card.cat;
  document.getElementById('card-counter').textContent = `${currentIdx + 1} / ${filtered.length}`;

  const body = document.getElementById('card-body');
  if (effectiveMode === 'ja2id') {
    body.innerHTML = `
      <div class="card-main jp">${escHtml(card.ja)}</div>
      <div class="tap-hint">👆 タップして答えを見る</div>
    `;
  } else {
    body.innerHTML = `
      <div class="card-main">${escHtml(card.foreign)}</div>
      <div class="rom">${escHtml(card.rom)}</div>
      <div class="tap-hint">👆 タップして答えを見る</div>
    `;
  }
}

function revealCard() {
  if (!filtered[currentIdx]) return;
  revealed = true;
  showRevealBtn();
  const card = filtered[currentIdx];
  const effectiveMode = card._randMode || mode;
  const body = document.getElementById('card-body');

  if (effectiveMode === 'ja2id') {
    body.innerHTML = `
      <div class="card-main jp">${escHtml(card.ja)}</div>
      <div class="divider"></div>
      <div class="card-main">${escHtml(card.foreign)}</div>
      <div class="rom">${escHtml(card.rom)}</div>
      <button class="speak-btn" id="speak-btn" onclick="event.stopPropagation();speakAnswer()">🔊</button>
    `;
  } else {
    body.innerHTML = `
      <div class="card-main">${escHtml(card.foreign)}</div>
      <div class="divider"></div>
      <div class="card-main jp">${escHtml(card.ja)}</div>
      <button class="speak-btn" id="speak-btn" onclick="event.stopPropagation();speakAnswer()">🔊</button>
    `;
  }
  speakAnswer();
}

function toggleReveal() {
  if (!revealed) revealCard();
  else renderCard();
}

function showRevealBtn() {
  document.getElementById('btn-reveal').style.display = revealed ? 'none' : '';
  document.getElementById('btn-unreveal').style.display = revealed ? '' : 'none';
}

// ─────────────── NAV ───────────────
function nextCard() {
  if (filtered.length === 0) return;
  // check all mastered
  const allDone = filtered.every(c => mastered.has(c._id));
  if (allDone) { showComplete(); return; }
  let next = (currentIdx + 1) % filtered.length;
  let attempts = 0;
  while (mastered.has(filtered[next]._id) && attempts < filtered.length) {
    next = (next + 1) % filtered.length;
    attempts++;
  }
  currentIdx = next;
  renderCard();
  updateStats();
}
function prevCard() {
  if (filtered.length === 0) return;
  let prev = (currentIdx - 1 + filtered.length) % filtered.length;
  currentIdx = prev;
  renderCard();
  updateStats();
}
function markMastered() {
  const card = filtered[currentIdx];
  if (!card) return;
  mastered.add(card._id);
  saveMastered();
  const allDone = filtered.every(c => mastered.has(c._id));
  if (allDone) { updateStats(); showComplete(); return; }
  updateStats();
  nextCard();
}

// ─────────────── COMPLETE ───────────────
function showComplete() {
  const overlay = document.getElementById('complete-overlay');
  overlay.classList.add('show');
  setTimeout(() => {
    overlay.classList.remove('show');
    mastered.clear();
    saveMastered();
    currentIdx = 0;
    updateStats();
    renderCard();
  }, 1800);
}

// ─────────────── MODAL ───────────────
function openModal() {
  document.getElementById('modal-overlay').classList.add('show');
  document.getElementById('modal-search').value = '';
  renderModalList('');
  setTimeout(() => document.getElementById('modal-search').focus(), 200);
}
function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('show');
}
function filterModal() {
  renderModalList(document.getElementById('modal-search').value.toLowerCase());
}
function renderModalList(q) {
  const grouped = {};
  cards.forEach(card => {
    if (q && !card.foreign.toLowerCase().includes(q) && !card.ja.includes(q) && !card.rom.toLowerCase().includes(q)) return;
    if (!grouped[card.cat]) grouped[card.cat] = [];
    grouped[card.cat].push(card);
  });
  const list = document.getElementById('modal-list');
  list.innerHTML = '';
  Object.keys(grouped).forEach(cat => {
    const title = document.createElement('div');
    title.className = 'modal-cat-title';
    title.textContent = cat;
    list.appendChild(title);
    grouped[cat].forEach(card => {
      const row = document.createElement('div');
      row.className = 'modal-row' + (mastered.has(card._id) ? ' mastered' : '');
      row.innerHTML = `<div class="modal-row-text">
        <div class="modal-foreign">${escHtml(card.foreign)}</div>
        <div class="modal-ja">${escHtml(card.ja)}</div>
      </div>${mastered.has(card._id) ? '<span class="modal-check">✓</span>' : ''}`;
      row.onclick = () => jumpToCard(card);
      list.appendChild(row);
    });
  });
}
function jumpToCard(card) {
  closeModalDirect();
  if (card.cat !== currentCat) {
    currentCat = 'すべて';
    document.querySelectorAll('.cpill').forEach(b => b.classList.toggle('active', b.textContent === 'すべて'));
    applyFilter();
  }
  const idx = filtered.findIndex(c => c._id === card._id);
  if (idx !== -1) currentIdx = idx;
  renderCard();
  updateStats();
}

// ─────────────── HEADER BUTTONS ───────────────
document.getElementById('btn-list').onclick = openModal;
document.getElementById('btn-reset').onclick = () => {
  if (mastered.size === 0) return;
  mastered.clear();
  saveMastered();
  currentIdx = 0;
  updateStats();
  renderCard();
  const btn = document.getElementById('btn-reset');
  btn.textContent = '✅';
  setTimeout(() => btn.textContent = '🔄', 800);
};
document.getElementById('btn-shuffle').onclick = () => {
  for (let i = filtered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
  }
  currentIdx = 0;
  renderCard();
  updateStats();
  const btn = document.getElementById('btn-shuffle');
  btn.textContent = '✅';
  setTimeout(() => btn.textContent = '🔀', 800);
};
document.getElementById('btn-mute').onclick = () => {
  isMuted = !isMuted;
  document.getElementById('btn-mute').textContent = isMuted ? '🔇' : '🔊';
  if (isMuted) window.speechSynthesis.cancel();
};

// ─────────────── MODE BUTTONS ───────────────
document.querySelectorAll('.mbtn').forEach(btn => {
  btn.onclick = () => {
    mode = btn.dataset.mode;
    document.querySelectorAll('.mbtn').forEach(b => b.classList.toggle('active', b === btn));
    currentIdx = 0;
    renderCard();
  };
});

// ─────────────── KEYBOARD ───────────────
document.addEventListener('keydown', e => {
  if (document.getElementById('modal-overlay').classList.contains('show')) {
    if (e.key === 'Escape') closeModalDirect();
    return;
  }
  if (e.key === 'ArrowRight') nextCard();
  else if (e.key === 'ArrowLeft') prevCard();
  else if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleReveal(); }
  else if (e.key.toLowerCase() === 'c') markMastered();
  else if (e.key === 'Escape') closeModalDirect();
});

// ─────────────── START ───────────────
window.speechSynthesis.onvoiceschanged = function(){};
init();
</script>
</body>
</html>
