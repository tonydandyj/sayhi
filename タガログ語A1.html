<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇵🇭 タガログ語フラッシュカード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&family=M+PLUS+Rounded+1c:wght@400;500;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
/* =====================================================
   🇵🇭 フィリピン南国リゾート ライトテーマ
   コンセプト: セブ島の浅瀬 — 空・海・白砂浜・ハイビスカス
   ===================================================== */
:root {
  /* ── パレット ── */
  --ocean:      #0891b2;   /* ディープターコイズ（海の深み） */
  --sky:        #38bdf8;   /* スカイブルー */
  --lagoon:     #06b6d4;   /* ラグーン */
  --coral:      #f97316;   /* コーラルオレンジ（ハイビスカス） */
  --sun:        #fbbf24;   /* サンセットイエロー */
  --sand:       #fef9f0;   /* 白砂浜（背景） */
  --foam:       #ffffff;   /* 波の泡（カード） */
  --palm:       #16a34a;   /* パームグリーン（✓覚えた） */

  /* ── テキスト ── */
  --text:       #0c2340;   /* 深海ネイビー（メインテキスト） */
  --text-mid:   #1e5070;   /* 中間ブルーグレー */
  --text-muted: #6ea8c4;   /* ミューテッドスカイ */

  /* ── サーフェス ── */
  --bg:         #e0f7fc;   /* 極淡アクアグラデ起点 */
  --bg2:        #bae6fd;   /* グラデ終点 */
  --glass:      rgba(255,255,255,0.72);
  --glass2:     rgba(255,255,255,0.50);
  --border:     rgba(8,145,178,0.20);
  --border2:    rgba(8,145,178,0.38);

  /* ── フォント ── */
  --jp:         'M PLUS Rounded 1c', 'Nunito', sans-serif;
  --foreign:    'Noto Sans', 'Nunito', sans-serif;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}

body{
  background: linear-gradient(160deg, #c8eefa 0%, #a8dfed 30%, #b3e8f8 60%, #d4f1f9 100%);
  color:var(--text);
  font-family:var(--jp);
  display:flex;flex-direction:column;height:100dvh;
  position:relative;
}

/* 背景の装飾波 */
body::before{
  content:'';
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 40% at 20% 10%,  rgba(56,189,248,.18) 0%, transparent 70%),
    radial-gradient(ellipse 60% 50% at 85% 80%,  rgba(249,115,22,.10) 0%, transparent 70%),
    radial-gradient(ellipse 50% 30% at 50% 50%,  rgba(255,255,255,.25) 0%, transparent 80%);
}
body > *{position:relative;z-index:1}

/* ── ヘッダー ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 16px;
  background: linear-gradient(135deg, var(--ocean) 0%, var(--lagoon) 100%);
  border-bottom: 2px solid rgba(255,255,255,.25);
  position:sticky;top:0;z-index:10;flex-shrink:0;
  box-shadow: 0 3px 16px rgba(8,145,178,.30);
}
.logo{
  font-size:.95rem;font-weight:800;color:#fff;
  display:flex;align-items:center;gap:7px;letter-spacing:.03em;
  text-shadow:0 1px 4px rgba(0,0,0,.20);
}
.hbtns{display:flex;gap:6px}
.hbtn{
  background:rgba(255,255,255,.22);
  border:1px solid rgba(255,255,255,.40);
  color:#fff;
  width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;
  transition:background .18s,transform .12s;
  backdrop-filter:blur(6px);
}
.hbtn:hover{background:rgba(255,255,255,.38);transform:scale(1.08)}
.hbtn:active{transform:scale(.95)}
.hbtn.active-flash{background:var(--palm);border-color:var(--palm);color:#fff}

/* ── モードボタン ── */
.mode-row{display:flex;gap:8px;padding:8px 14px;flex-shrink:0}
.mbtn{
  flex:1;padding:7px 4px;border-radius:22px;
  border:1.5px solid var(--border2);
  background:var(--glass2);
  color:var(--text-mid);
  cursor:pointer;font-family:var(--jp);font-size:.82rem;font-weight:700;
  transition:.2s;backdrop-filter:blur(4px);
}
.mbtn:hover{border-color:var(--ocean);color:var(--ocean);background:rgba(255,255,255,.7)}
.mbtn.active{
  background:linear-gradient(135deg, var(--ocean), var(--sky));
  color:#fff;border-color:var(--ocean);
  box-shadow:0 3px 12px rgba(8,145,178,.35);
}

/* ── 統計バー ── */
.stats{
  display:flex;align-items:center;gap:8px;
  padding:4px 16px;flex-shrink:0;font-size:.74rem;color:var(--text-muted);
}
.stat-num{color:var(--ocean);font-weight:700}
.prog-wrap{flex:1;background:rgba(8,145,178,.15);border-radius:6px;height:6px;overflow:hidden}
.prog-bar{
  height:100%;
  background:linear-gradient(90deg, var(--ocean), var(--sky), var(--sun));
  border-radius:6px;transition:width .5s cubic-bezier(.4,0,.2,1);
}
.stat-pct{color:var(--coral);font-weight:800;min-width:34px;text-align:right}

/* ── カテゴリスクロール ── */
.cat-scroll{
  overflow-x:auto;display:flex;gap:7px;
  padding:5px 14px 10px;flex-shrink:0;
  scrollbar-width:thin;
  scrollbar-color:var(--sky) rgba(8,145,178,.12);
}
.cat-scroll::-webkit-scrollbar{height:5px}
.cat-scroll::-webkit-scrollbar-track{background:rgba(8,145,178,.10);border-radius:4px}
.cat-scroll::-webkit-scrollbar-thumb{background:var(--sky);border-radius:4px}
.cat-scroll::-webkit-scrollbar-thumb:hover{background:var(--ocean)}
.cpill{
  flex-shrink:0;padding:5px 13px;border-radius:22px;
  border:1.5px solid var(--border2);
  background:rgba(255,255,255,.60);
  color:var(--text-mid);
  cursor:pointer;font-size:.74rem;font-family:var(--jp);font-weight:600;
  transition:.18s;backdrop-filter:blur(4px);white-space:nowrap;
}
.cpill:hover{
  border-color:var(--ocean);color:var(--ocean);
  background:rgba(255,255,255,.85);
  box-shadow:0 2px 8px rgba(8,145,178,.18);
}
.cpill.active{
  background:linear-gradient(135deg, var(--ocean), var(--lagoon));
  border-color:var(--ocean);color:#fff;
  box-shadow:0 2px 10px rgba(8,145,178,.35);
}

/* ── カードエリア ── */
.card-area{flex:1;display:flex;align-items:center;justify-content:center;padding:6px 14px;min-height:0}
.card{
  width:100%;max-width:560px;
  background:rgba(255,255,255,.82);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1.5px solid rgba(255,255,255,.90);
  border-radius:24px;
  padding:20px 22px 18px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:transform .18s cubic-bezier(.4,0,.2,1), box-shadow .18s;
  box-shadow:
    0 8px 32px rgba(8,145,178,.16),
    0 2px 8px rgba(0,0,0,.06),
    inset 0 1px 0 rgba(255,255,255,.9);
  display:flex;flex-direction:column;gap:10px;
  min-height:185px;max-height:300px;
  justify-content:center;
}
/* カード上部の装飾ライン */
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg, var(--ocean), var(--sky), var(--coral), var(--sun));
  border-radius:24px 24px 0 0;
}
.card:hover{
  transform:translateY(-3px) scale(1.005);
  box-shadow:
    0 16px 48px rgba(8,145,178,.22),
    0 4px 12px rgba(0,0,0,.08),
    inset 0 1px 0 rgba(255,255,255,.9);
}
.card-meta{display:flex;justify-content:space-between;align-items:center;margin-top:2px}
.cat-label{
  font-size:.71rem;font-weight:700;
  background:linear-gradient(135deg,rgba(8,145,178,.12),rgba(56,189,248,.12));
  color:var(--ocean);
  padding:3px 10px;border-radius:14px;
  border:1px solid rgba(8,145,178,.25);
}
.card-count{font-size:.72rem;color:var(--text-muted);font-weight:600}
.card-body{
  text-align:center;flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
}
.foreign-text{
  font-family:var(--foreign);
  font-size:clamp(1.5rem,5vw,2.4rem);
  font-weight:700;color:var(--text);line-height:1.2;
  letter-spacing:.01em;
}
.jp-text{
  font-family:var(--jp);
  font-size:clamp(1.2rem,4vw,1.8rem);
  font-weight:700;color:var(--text);line-height:1.3;
}
.rom-text{
  font-family:var(--foreign);
  font-size:clamp(.78rem,2.2vw,.95rem);
  color:var(--text-muted);font-style:italic;font-weight:400;
  background:rgba(8,145,178,.07);
  padding:3px 12px;border-radius:10px;
}
.hint-tap{
  font-size:.73rem;color:var(--text-muted);
  display:flex;align-items:center;gap:4px;
  background:rgba(8,145,178,.07);
  padding:4px 12px;border-radius:12px;
}
.speak-btn{
  background:linear-gradient(135deg,rgba(8,145,178,.12),rgba(56,189,248,.12));
  border:1.5px solid rgba(8,145,178,.28);
  color:var(--ocean);
  padding:5px 16px;border-radius:20px;cursor:pointer;
  font-size:.8rem;font-family:var(--jp);font-weight:700;
  transition:.18s;margin-top:4px;
}
.speak-btn:hover{
  background:linear-gradient(135deg, var(--ocean), var(--sky));
  color:#fff;border-color:var(--ocean);
  box-shadow:0 3px 10px rgba(8,145,178,.30);
}
.speak-btn.pulsing{animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ── 操作ボタン行 ── */
.action-row{display:flex;gap:6px;padding:6px 14px;flex-shrink:0}
.abtn{
  flex:1;padding:9px 4px;border-radius:14px;
  border:1.5px solid var(--border2);
  background:rgba(255,255,255,.65);
  color:var(--text-mid);
  cursor:pointer;font-family:var(--jp);font-size:.8rem;font-weight:700;
  transition:.18s;backdrop-filter:blur(4px);
}
.abtn:hover{
  background:rgba(255,255,255,.90);
  border-color:var(--ocean);color:var(--ocean);
  box-shadow:0 2px 8px rgba(8,145,178,.18);
}
.abtn:active{transform:scale(.96)}
/* ▶ 表示ボタン：スカイブルー */
.abtn.primary{
  background:linear-gradient(135deg, var(--ocean) 0%, var(--sky) 100%);
  color:#fff;border-color:var(--ocean);
  box-shadow:0 3px 12px rgba(8,145,178,.35);
}
.abtn.primary:hover{filter:brightness(1.08);box-shadow:0 5px 16px rgba(8,145,178,.42)}
/* 次へ ボタン：コーラル */
.abtn.danger{
  background:linear-gradient(135deg, #f97316 0%, #fb923c 100%);
  color:#fff;border-color:var(--coral);
  box-shadow:0 3px 12px rgba(249,115,22,.30);
}
.abtn.danger:hover{filter:brightness(1.08);box-shadow:0 5px 16px rgba(249,115,22,.38)}
/* ✓ 覚えた：パームグリーン */
.abtn.success{
  background:linear-gradient(135deg, #16a34a 0%, #22c55e 100%);
  color:#fff;border-color:var(--palm);
  box-shadow:0 3px 12px rgba(22,163,74,.28);
}
.abtn.success:hover{filter:brightness(1.08);box-shadow:0 5px 16px rgba(22,163,74,.36)}

/* ── キーボードヒント ── */
.kb-hints{
  padding:3px 14px 8px;text-align:center;
  font-size:.67rem;color:var(--text-muted);opacity:.7;flex-shrink:0;
}

/* ── 完了オーバーレイ ── */
.done-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(200,238,250,.90);
  backdrop-filter:blur(14px);
  z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:14px;
}
.done-overlay.show{display:flex}
.done-trophy{font-size:5rem;animation:bounce 1s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:scale(1) rotate(-3deg)}50%{transform:scale(1.18) rotate(3deg)}}
.done-msg{font-size:1.5rem;font-weight:800;color:var(--ocean);text-shadow:0 2px 8px rgba(8,145,178,.20)}
.done-sub{font-size:.9rem;color:var(--text-muted)}

/* ── モーダル ── */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(8,70,100,.35);
  backdrop-filter:blur(6px);
  z-index:50;overflow-y:auto;padding:20px;
}
.modal-overlay.show{display:flex;align-items:flex-start;justify-content:center}
.modal{
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(16px);
  border:1.5px solid rgba(8,145,178,.20);
  border-radius:20px;width:100%;max-width:580px;overflow:hidden;
  box-shadow:0 20px 60px rgba(8,80,120,.20);
}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;
  background:linear-gradient(135deg, var(--ocean), var(--lagoon));
}
.modal-title{font-weight:800;font-size:1rem;color:#fff}
.modal-close{
  background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.40);
  color:#fff;font-size:1.2rem;cursor:pointer;
  padding:3px 8px;border-radius:8px;transition:.15s;
}
.modal-close:hover{background:rgba(255,255,255,.40)}
.search-input{
  width:100%;background:#f0f9ff;
  border:none;border-bottom:2px solid rgba(8,145,178,.20);
  color:var(--text);
  padding:10px 16px;font-family:var(--jp);font-size:.9rem;outline:none;
}
.search-input:focus{border-bottom-color:var(--ocean);background:#e8f5fd}
.modal-body{max-height:70vh;overflow-y:auto;padding:8px 0}
.cat-group-title{
  padding:8px 18px 4px;font-size:.72rem;
  color:var(--ocean);font-weight:800;letter-spacing:.08em;
  background:rgba(8,145,178,.06);
}
.list-row{
  display:flex;align-items:center;padding:9px 18px;
  cursor:pointer;gap:12px;
  border-bottom:1px solid rgba(8,145,178,.08);transition:.15s;
}
.list-row:hover{background:rgba(8,145,178,.07)}
.list-row.mastered{opacity:.38}
.list-foreign{font-family:var(--foreign);font-size:.9rem;font-weight:700;flex:1;color:var(--text)}
.list-jp{font-family:var(--jp);font-size:.82rem;color:var(--text-muted);flex:1}
</style>
</head>
<body>

<header>
  <div class="logo">🇵🇭 タガログ語 フラッシュカード</div>
  <div class="hbtns">
    <button class="hbtn" id="btnList" title="一覧">📋</button>
    <button class="hbtn" id="btnReset" title="リセット">🔄</button>
    <button class="hbtn" id="btnShuffle" title="シャッフル">🔀</button>
    <button class="hbtn" id="btnMute" title="ミュート">🔊</button>
  </div>
</header>

<div class="mode-row">
  <button class="mbtn active" data-mode="ja2tl">和 → 比</button>
  <button class="mbtn" data-mode="tl2ja">比 → 和</button>
  <button class="mbtn" data-mode="random">🎲 ランダム</button>
</div>

<div class="stats">
  <span>全<span class="stat-num" id="statTotal">0</span>件</span>
  <span>残り<span class="stat-num" id="statLeft">0</span>件</span>
  <span>✓<span class="stat-num" id="statDone">0</span>件</span>
  <div class="prog-wrap"><div class="prog-bar" id="progBar" style="width:0%"></div></div>
  <span class="stat-pct" id="statPct">0%</span>
</div>

<div class="cat-scroll" id="catScroll"></div>

<div class="card-area">
  <div class="card" id="mainCard">
    <div class="card-meta">
      <span class="cat-label" id="cardCat">—</span>
      <span class="card-count" id="cardCount">0 / 0</span>
    </div>
    <div class="card-body" id="cardBody">
      <div class="hint-tap">👆 カードをタップして開始</div>
    </div>
  </div>
</div>

<div class="action-row">
  <button class="abtn" id="btnPrev">← 戻る</button>
  <button class="abtn primary" id="btnReveal">▶ 表示</button>
  <button class="abtn" id="btnUncheck">◀ 戻す</button>
  <button class="abtn success" id="btnMaster">✓ 覚えた</button>
  <button class="abtn danger" id="btnNext">次へ →</button>
</div>

<div class="kb-hints">→ 次へ ／ ← 戻る ／ Enter 答えを見る ／ C 覚えた</div>

<div class="done-overlay" id="doneOverlay">
  <div class="done-trophy">🏆</div>
  <div class="done-msg">全カードチェック完了！</div>
  <div class="done-sub">リセットして最初から始めます…</div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">📋 カード一覧</span>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 日本語・タガログ語で検索…">
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

const LSKEY = 'tagalog_mastered_v1';
let cards = [];
let mastered = new Set();
let filteredIds = [];
let curIdx = 0;
let mode = 'ja2tl';
let curCat = 'すべて';
let revealed = false;
let isMuted = false;
let cardMode = 'ja2tl';

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function loadMastered(){
  try{const d=localStorage.getItem(LSKEY);if(d)mastered=new Set(JSON.parse(d));}catch(e){}
}
function saveMastered(){
  try{localStorage.setItem(LSKEY,JSON.stringify([...mastered]));}catch(e){}
}

function init(){
  loadMastered();
  cards = CARDS_RAW.map((d,i)=>({...d,_id:d.id||i}));
  buildCatButtons();
  applyFilter();
  updateStats();
  renderCard();
}

function buildCatButtons(){
  const el=document.getElementById('catScroll');
  const cats=['すべて',...new Set(cards.map(c=>c.cat))];
  el.innerHTML=cats.map(c=>`<button class="cpill${c===curCat?' active':''}" data-cat="${escHtml(c)}">${escHtml(c)}</button>`).join('');
  el.querySelectorAll('.cpill').forEach(b=>b.addEventListener('click',()=>{
    curCat=b.dataset.cat;
    el.querySelectorAll('.cpill').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    applyFilter();
    curIdx=0;revealed=false;renderCard();
  }));
}

function applyFilter(){
  filteredIds = cards
    .filter(c=>curCat==='すべて'||c.cat===curCat)
    .filter(c=>!mastered.has(c._id))
    .map(c=>c._id);
  updateStats();
}

function updateStats(){
  const total=cards.filter(c=>curCat==='すべて'||c.cat===curCat).length;
  const done=cards.filter(c=>(curCat==='すべて'||c.cat===curCat)&&mastered.has(c._id)).length;
  const left=filteredIds.length;
  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statLeft').textContent=left;
  document.getElementById('statDone').textContent=done;
  document.getElementById('progBar').style.width=pct+'%';
  document.getElementById('statPct').textContent=pct+'%';
}

function getCard(){
  if(filteredIds.length===0)return null;
  const id=filteredIds[curIdx];
  return cards.find(c=>c._id===id)||null;
}

// ★修正2: タガログ語音声エンジン - fil-PH を優先、なければ en-US でフォールバック
function speakForeign(text, onDone){
  if(isMuted){if(onDone)onDone();return;}
  window.speechSynthesis.cancel();

  function doSpeak(lang){
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = 0.8;
    u.pitch = 1.0;
    u.onend = ()=>{ if(onDone)onDone(); };
    u.onerror = ()=>{ if(onDone)onDone(); };
    window.speechSynthesis.speak(u);
  }

  // 利用可能な音声を検索: fil-PH > tl-PH > fil > en-PH > en-US の順で優先
  const voices = window.speechSynthesis.getVoices();
  const preferred = ['fil-PH','tl-PH','fil','en-PH','en-US'];
  let chosen = null;
  for(const lang of preferred){
    const v = voices.find(v => v.lang === lang || v.lang.startsWith(lang.split('-')[0]+'-PH'));
    if(v){ chosen = v.lang; break; }
  }
  doSpeak(chosen || 'fil-PH');
}

function speakJapanese(text, onDone){
  if(isMuted){if(onDone)onDone();return;}
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  u.rate = 0.85;
  u.onend = ()=>{ if(onDone)onDone(); };
  u.onerror = ()=>{ if(onDone)onDone(); };
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

function speakAnswer(btn){
  const card=getCard();if(!card)return;
  const b=btn||document.getElementById('speakBtn');
  if(b)b.classList.add('pulsing');
  const done=()=>{if(b)b.classList.remove('pulsing');};
  if(cardMode==='ja2tl') speakForeign(card.foreign,done);
  else speakJapanese(card.ja,done);
}

function renderCard(){
  const card=getCard();
  const body=document.getElementById('cardBody');
  const catEl=document.getElementById('cardCat');
  const countEl=document.getElementById('cardCount');
  updateStats();

  if(!card){
    catEl.textContent='—';
    countEl.textContent='0 / 0';
    body.innerHTML='<div class="hint-tap">🎉 このカテゴリは全部覚えました！</div>';
    return;
  }

  catEl.textContent=card.cat;
  countEl.textContent=(curIdx+1)+' / '+filteredIds.length;

  if(mode==='random') cardMode=Math.random()<.5?'ja2tl':'tl2ja';
  else cardMode=mode;

  if(!revealed){
    const qText = cardMode==='ja2tl'
      ? `<div class="jp-text">${escHtml(card.ja)}</div>`
      : `<div class="foreign-text">${escHtml(card.foreign)}</div>
         <div class="rom-text">${escHtml(card.rom)}</div>`;
    body.innerHTML=qText+'<div class="hint-tap">👆 タップして答えを見る</div>';
  } else {
    const aText = cardMode==='ja2tl'
      ? `<div class="foreign-text">${escHtml(card.foreign)}</div>
         <div class="rom-text">${escHtml(card.rom)}</div>`
      : `<div class="jp-text">${escHtml(card.ja)}</div>`;
    body.innerHTML=aText+`<button class="speak-btn" id="speakBtn">🔊 読み上げ</button>`;
    document.getElementById('speakBtn').addEventListener('click',e=>{
      e.stopPropagation();speakAnswer(e.currentTarget);
    });
    speakAnswer(null);
  }
}

// Card click
document.getElementById('mainCard').addEventListener('click',()=>{
  if(!getCard())return;
  revealed=!revealed;renderCard();
});

// Buttons
document.getElementById('btnReveal').addEventListener('click',()=>{
  if(!getCard())return;
  if(!revealed){revealed=true;renderCard();}
});
document.getElementById('btnPrev').addEventListener('click',()=>{
  if(filteredIds.length===0)return;
  curIdx=(curIdx-1+filteredIds.length)%filteredIds.length;
  revealed=false;renderCard();
});
document.getElementById('btnNext').addEventListener('click',()=>{
  if(filteredIds.length===0)return;
  curIdx=(curIdx+1)%filteredIds.length;
  revealed=false;renderCard();
});
document.getElementById('btnUncheck').addEventListener('click',()=>{
  if(filteredIds.length===0)return;
  curIdx=(curIdx-1+filteredIds.length)%filteredIds.length;
  revealed=false;renderCard();
});
document.getElementById('btnMaster').addEventListener('click',()=>{
  const card=getCard();if(!card)return;
  mastered.add(card._id);
  saveMastered();
  applyFilter();
  const total=cards.filter(c=>curCat==='すべて'||c.cat===curCat).length;
  const done=cards.filter(c=>(curCat==='すべて'||c.cat===curCat)&&mastered.has(c._id)).length;
  if(done>=total&&total>0){showDone();return;}
  if(curIdx>=filteredIds.length)curIdx=0;
  revealed=false;renderCard();
});

document.querySelectorAll('.mbtn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.mbtn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  mode=b.dataset.mode;
  revealed=false;renderCard();
}));

const btnReset=document.getElementById('btnReset');
btnReset.addEventListener('click',()=>{
  if(mastered.size===0)return;
  mastered.clear();saveMastered();
  applyFilter();curIdx=0;revealed=false;renderCard();
  btnReset.textContent='✅';btnReset.classList.add('active-flash');
  setTimeout(()=>{btnReset.textContent='🔄';btnReset.classList.remove('active-flash');},800);
});

const btnShuffle=document.getElementById('btnShuffle');
btnShuffle.addEventListener('click',()=>{
  for(let i=filteredIds.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [filteredIds[i],filteredIds[j]]=[filteredIds[j],filteredIds[i]];
  }
  curIdx=0;revealed=false;renderCard();
  btnShuffle.textContent='✅';btnShuffle.classList.add('active-flash');
  setTimeout(()=>{btnShuffle.textContent='🔀';btnShuffle.classList.remove('active-flash');},800);
});

document.getElementById('btnMute').addEventListener('click',function(){
  isMuted=!isMuted;
  this.textContent=isMuted?'🔇':'🔊';
  if(isMuted)window.speechSynthesis.cancel();
});

function showDone(){
  const ov=document.getElementById('doneOverlay');
  ov.classList.add('show');
  setTimeout(()=>{
    ov.classList.remove('show');
    mastered.clear();saveMastered();
    applyFilter();curIdx=0;revealed=false;renderCard();
  },1800);
}

// Modal
document.getElementById('btnList').addEventListener('click',openModal);
document.getElementById('modalClose').addEventListener('click',closeModal);
document.getElementById('modalOverlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('modalOverlay'))closeModal();
});
document.getElementById('searchInput').addEventListener('input',renderModal);

function openModal(){
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('searchInput').value='';
  renderModal();
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('show');
}
function renderModal(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const body=document.getElementById('modalBody');
  const cats=[...new Set(cards.map(c=>c.cat))];
  let html='';
  cats.forEach(cat=>{
    const rows=cards.filter(c=>{
      if(c.cat!==cat)return false;
      if(!q)return true;
      return c.foreign.toLowerCase().includes(q)||c.ja.includes(q)||c.rom.toLowerCase().includes(q);
    });
    if(rows.length===0)return;
    html+=`<div class="cat-group-title">${escHtml(cat)}</div>`;
    rows.forEach(c=>{
      const m=mastered.has(c._id)?'mastered':'';
      html+=`<div class="list-row ${m}" data-id="${escHtml(String(c._id))}">
        <span class="list-foreign">${escHtml(c.foreign)}</span>
        <span class="list-jp">${escHtml(c.ja)}</span>
      </div>`;
    });
  });
  body.innerHTML=html||'<div style="padding:20px;color:var(--text-muted);text-align:center">該当なし</div>';
  body.querySelectorAll('.list-row').forEach(row=>{
    row.addEventListener('click',()=>{
      const id=row.dataset.id;
      const target=cards.find(c=>String(c._id)===id);
      if(!target)return;
      if(curCat!==target.cat&&curCat!=='すべて'){
        curCat='すべて';
        document.querySelectorAll('.cpill').forEach(p=>{
          p.classList.toggle('active',p.dataset.cat==='すべて');
        });
        applyFilter();
      }
      let idx=filteredIds.indexOf(target._id);
      if(idx===-1){
        filteredIds=cards.filter(c=>curCat==='すべて'||c.cat===curCat).map(c=>c._id);
        idx=filteredIds.indexOf(target._id);
      }
      if(idx!==-1)curIdx=idx;
      revealed=false;
      closeModal();
      renderCard();
    });
  });
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(document.getElementById('modalOverlay').classList.contains('show')){
    if(e.key==='Escape')closeModal();return;
  }
  if(e.key==='ArrowRight'||e.key==='ArrowLeft'){
    const d=e.key==='ArrowRight'?1:-1;
    if(filteredIds.length===0)return;
    curIdx=(curIdx+d+filteredIds.length)%filteredIds.length;
    revealed=false;renderCard();
  }else if(e.key==='Enter'||e.key===' '){
    e.preventDefault();
    if(!getCard())return;
    revealed=!revealed;renderCard();
  }else if(e.key.toLowerCase()==='c'){
    document.getElementById('btnMaster').click();
  }
});

// 音声ロード後に再初期化
window.speechSynthesis.onvoiceschanged = function(){};

init();
</script>
</body>
</html>
