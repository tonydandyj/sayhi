<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ベトナム語フラッシュカード B1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:linear-gradient(rgba(0,229,160,.03)1px,transparent 1px)0 0/40px 40px,linear-gradient(90deg,rgba(0,229,160,.03)1px,transparent 1px)0 0/40px 40px;pointer-events:none}
.app{max-width:760px;margin:0 auto;padding:20px 16px 48px;position:relative;z-index:1}
h1{text-align:center;font-size:clamp(18px,4vw,26px);font-weight:800;background:linear-gradient(135deg,#00e5a0,#4fc3f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.sub{text-align:center;color:#8b949e;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:22px}
.row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
.mbtn{padding:8px 18px;border-radius:100px;border:1px solid #30363d;background:#161b22;color:#8b949e;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.mbtn.on{border-color:#00e5a0;background:rgba(0,229,160,.15);color:#00e5a0}
.chip{padding:5px 12px;border-radius:100px;border:1px solid #30363d;background:transparent;color:#8b949e;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.chip.on{border-color:#4fc3f7;background:rgba(79,195,247,.1);color:#4fc3f7}
.sbar{display:flex;justify-content:center;gap:28px;margin-bottom:16px}
.sn{font-size:22px;font-weight:700;line-height:1;text-align:center}
.sl{font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;text-align:center}
.pw{background:#30363d;border-radius:100px;height:4px;margin-bottom:22px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,#00e5a0,#4fc3f7);border-radius:100px;transition:width .4s;box-shadow:0 0 8px rgba(0,229,160,.5)}
.ca{perspective:1200px;margin-bottom:16px;cursor:pointer}
.ci{position:relative;width:100%;padding-top:min(52%,380px);transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1)}
.ci.fl{transform:rotateY(180deg)}
.cf{position:absolute;inset:0;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;backface-visibility:hidden;-webkit-backface-visibility:hidden;border:1px solid #30363d}
.cfr{background:linear-gradient(145deg,#1a2332,#0f1923)}
.cbk{background:linear-gradient(145deg,#1a2d1f,#0f1a0f);transform:rotateY(180deg)}
.ctag{position:absolute;top:14px;left:18px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:3px 9px;border-radius:100px}
.tjp{background:rgba(255,107,107,.15);color:#ff6b6b;border:1px solid rgba(255,107,107,.3)}
.tvn{background:rgba(0,229,160,.15);color:#00e5a0;border:1px solid rgba(0,229,160,.3)}
.cnum{position:absolute;top:14px;right:18px;font-size:11px;color:#8b949e}
.csec{font-size:10px;color:#8b949e;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;text-align:center}
.cm{font-size:clamp(17px,3.2vw,26px);font-weight:700;text-align:center;line-height:1.3;margin-bottom:8px}
.cs{font-size:clamp(12px,1.8vw,15px);color:#8b949e;text-align:center;font-weight:300;line-height:1.5}
.chint{position:absolute;bottom:12px;font-size:11px;color:#8b949e;opacity:.5}
.az{display:flex;align-items:center;gap:10px;margin-top:12px;padding:7px 14px;background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.2);border-radius:100px;cursor:pointer}
.pb{width:32px;height:32px;border-radius:50%;background:#00e5a0;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
.pb.spk{background:#4fc3f7}
.aw{display:flex;gap:3px;align-items:center;height:18px}
.aw span{display:block;width:3px;background:#00e5a0;border-radius:2px;height:4px}
.aw.on span{animation:wb .8s ease-in-out infinite}
.aw.on span:nth-child(2){animation-delay:.1s}
.aw.on span:nth-child(3){animation-delay:.2s}
.aw.on span:nth-child(4){animation-delay:.3s}
.aw.on span:nth-child(5){animation-delay:.15s}
@keyframes wb{0%,100%{height:4px}50%{height:16px}}
.al{font-size:11px;color:#00e5a0;font-weight:600}
.acts{display:flex;gap:10px;justify-content:center;margin-bottom:14px}
.ab{flex:1;max-width:160px;padding:12px 16px;border-radius:14px;border:1px solid #30363d;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.bw{background:rgba(255,107,107,.1);color:#ff6b6b;border-color:rgba(255,107,107,.3)}
.bc{background:rgba(0,229,160,.1);color:#00e5a0;border-color:rgba(0,229,160,.3)}
.bf{background:rgba(79,195,247,.1);color:#4fc3f7;border-color:rgba(79,195,247,.3);max-width:200px}
.nr{display:flex;gap:8px;justify-content:center}
.nb{padding:8px 16px;border-radius:10px;border:1px solid #30363d;background:#161b22;color:#8b949e;font-size:13px;cursor:pointer;font-family:inherit}
.nb.sh{border-color:rgba(255,215,0,.3);background:rgba(255,215,0,.05);color:#ffd700}
.rf{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:80px;pointer-events:none;z-index:100;opacity:0}
.rf.show{animation:fs .6s ease-out forwards}
@keyframes fs{0%{opacity:1;transform:scale(.5)}50%{opacity:1;transform:scale(1.3)}100%{opacity:0;transform:scale(1.5)}}
.done{text-align:center;padding:40px 20px}
.done h2{font-size:26px;font-weight:800;background:linear-gradient(135deg,#ffd700,#00e5a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.scd{display:flex;justify-content:center;gap:28px;margin-bottom:28px}
.scb{font-size:44px;font-weight:800;line-height:1}
.scl{font-size:11px;color:#8b949e;margin-top:4px;text-transform:uppercase;letter-spacing:1.5px}
.rbtn{padding:13px 32px;border-radius:100px;border:none;background:linear-gradient(135deg,#00e5a0,#4fc3f7);color:#000;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}
.hide{display:none}
@media(max-width:480px){.acts{flex-wrap:wrap}.ab{max-width:100%}}
</style>
</head>
<body>
<div class="rf" id="rf"></div>
<div class="app">
  <h1>&#x1F1FB;&#x1F1F3; ベトナム語フラッシュカード &#x1F1EF;&#x1F1F5;</h1>
  <p class="sub">B1 Level &middot; Idioms &amp; Set Phrases</p>
  <div class="row" id="modeRow">
    <button class="mbtn on" onclick="setMode('jp2vn')">&#x1F1EF;&#x1F1F5;&rarr;&#x1F1FB;&#x1F1F3; 日本語&rarr;ベトナム語</button>
    <button class="mbtn" onclick="setMode('vn2jp')">&#x1F1FB;&#x1F1F3;&rarr;&#x1F1EF;&#x1F1F5; ベトナム語&rarr;日本語</button>
  </div>
  <div class="row" id="filtRow">
    <button class="chip on" onclick="setF('all',this)">すべて</button>
    <button class="chip" onclick="setF(0,this)">動詞＋前置詞</button>
    <button class="chip" onclick="setF(1,this)">形容詞＋前置詞</button>
    <button class="chip" onclick="setF(2,this)">慣用表現</button>
  </div>
  <div class="sbar">
    <div><div class="sn" style="color:#00e5a0" id="sc">0</div><div class="sl">正解 ✓</div></div>
    <div><div class="sn" style="color:#ff6b6b" id="sw">0</div><div class="sl">不正解 ✗</div></div>
    <div><div class="sn" style="color:#4fc3f7" id="sr">0</div><div class="sl">残り</div></div>
  </div>
  <div class="pw"><div class="pf" id="pf" style="width:0%"></div></div>

  <div id="cardArea">
    <div class="ca" id="ca" onclick="flip()">
      <div class="ci" id="ci">
        <div class="cf cfr">
          <span class="ctag tjp" id="ftag">日本語</span>
          <span class="cnum" id="cnum">1/1</span>
          <div class="csec" id="fsec"></div>
          <div class="cm" style="color:#e6edf3" id="fm"></div>
          <div class="cs" id="fs"></div>
          <div class="chint">タップして裏返す</div>
        </div>
        <div class="cf cbk">
          <span class="ctag tvn" id="btag">ベトナム語</span>
          <div class="csec" id="bsec"></div>
          <div class="cm" style="color:#00e5a0" id="bm"></div>
          <div class="cs" id="bs"></div>
          <div class="az" id="az" onclick="event.stopPropagation();spk()">
            <button class="pb" id="pb">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="#000"><polygon points="5,3 19,12 5,21"/></svg>
            </button>
            <div class="aw" id="aw">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
            <span class="al" id="al">フレーズ＋例文を聴く</span>
          </div>
        </div>
      </div>
    </div>
    <div class="acts hide" id="ar">
      <button class="ab bw" onclick="ans(false)">✗ もう少し</button>
      <button class="ab bc" onclick="ans(true)">✓ わかった！</button>
    </div>
    <div class="acts" id="fr">
      <button class="ab bf" onclick="flip()">&#x1F504; 答えを見る</button>
    </div>
    <div class="nr">
      <button class="nb" onclick="prev()">&larr; 前へ</button>
      <button class="nb sh" onclick="doShuffle()">&#x1F500; シャッフル</button>
      <button class="nb" onclick="next()">次へ &rarr;</button>
    </div>
  </div>

  <div class="done hide" id="doneArea">
    <div style="font-size:72px;margin-bottom:12px">&#x1F3C6;</div>
    <h2>コンプリート！</h2>
    <p style="color:#8b949e;margin-bottom:28px;font-size:14px">すべてのカードを学習しました！</p>
    <div class="scd">
      <div><div class="scb" style="color:#00e5a0" id="fc">0</div><div class="scl">正解</div></div>
      <div><div class="scb" style="color:#ff6b6b" id="fw">0</div><div class="scl">不正解</div></div>
    </div>
    <button class="rbtn" onclick="restart()">もう一度 &#x1F501;</button>
  </div>
</div>

<script>
const D=[[0,"tham gia vào","〜に参加する","Tôi muốn tham gia vào câu lạc bộ tiếng Nhật.","私は日本語クラブに参加したい。"],[0,"phụ thuộc vào","〜に依存する","Thành công phụ thuộc vào sự cố gắng của bạn.","成功はあなたの努力にかかっている。"],[0,"đồng ý với","〜に同意する","Tôi hoàn toàn đồng ý với ý kiến của anh.","私はあなたの意見に完全に同意します。"],[0,"không đồng ý với","〜に反対する","Cô ấy không đồng ý với kế hoạch đó.","彼女はその計画に反対した。"],[0,"quyết định + V","〜することを決める","Anh ấy quyết định học tiếng Việt.","彼はベトナム語を学ぶことを決めた。"],[0,"cố gắng + V","〜しようと努力する","Cô ấy cố gắng hoàn thành bài tập đúng hạn.","彼女は期限通りに課題を終えようと頑張った。"],[0,"tiếp tục + V","〜し続ける","Chúng tôi tiếp tục thảo luận đến tối.","私たちは夜まで議論し続けた。"],[0,"bắt đầu + V","〜し始める","Trời bắt đầu mưa lúc 3 giờ chiều.","午後3時から雨が降り始めた。"],[0,"ngừng + V","〜するのをやめる","Anh ấy ngừng hút thuốc từ năm ngoái.","彼は去年からタバコをやめた。"],[0,"quên + V","〜するのを忘れる","Tôi quên mang ô khi ra ngoài.","外出するとき傘を持っていくのを忘れた。"],[0,"nhớ + V","〜するのを覚えている","Nhớ gọi điện cho mẹ nhé!","お母さんに電話することを忘れずに！"],[0,"học cách + V","〜する方法を学ぶ","Tôi đang học cách nấu phở.","私はフォーの作り方を学んでいる。"],[0,"có khả năng + V","〜する能力がある","Chị ấy có khả năng nói năm thứ tiếng.","彼女は5か国語を話す能力がある。"],[0,"có cơ hội + V","〜する機会がある","Tôi có cơ hội đi du lịch Nhật Bản.","私は日本へ旅行する機会がある。"],[0,"có thói quen + V","〜する習慣がある","Anh ấy có thói quen dậy sớm mỗi sáng.","彼は毎朝早起きする習慣がある。"],[0,"mất thời gian + V","〜するのに時間がかかる","Việc này mất thời gian để hoàn thành.","この作業を完成させるのに時間がかかる。"],[0,"dành thời gian + V","〜するために時間を使う","Cô ấy dành thời gian đọc sách mỗi ngày.","彼女は毎日読書のために時間を使う。"],[0,"dành thời gian cho","〜のために時間を割く","Anh nên dành thời gian cho gia đình.","家族のために時間を割くべきです。"],[0,"tốn tiền vào","〜にお金を使う","Anh ấy tốn nhiều tiền vào việc mua sách.","彼は本の購入にたくさんのお金を使う。"],[0,"tiết kiệm tiền cho","〜のためにお金を貯める","Tôi đang tiết kiệm tiền cho chuyến du lịch.","旅行のためにお金を貯めている。"],[0,"chú ý đến","〜に注意を払う","Hãy chú ý đến cách phát âm của từng từ.","一つ一つの単語の発音に注意を払ってください。"],[0,"quan tâm đến","〜に関心を持つ・気にかける","Anh ấy luôn quan tâm đến sức khỏe của bố mẹ.","彼はいつも両親の健康を気にかけている。"], const SN=["動詞＋前置詞型","形容詞＋前置詞型","慣用表現・複合動詞型"];

// Microsoft An (vi-VN) on Windows Chrome/Edge drops the first WORD of each utterance.
// Fix: prepend "ừ, " as a sacrifice word inside the same utterance text.
// Comma creates a natural pause so the sacrifice is phonetically isolated.
// Other environments (iPhone, Android, Mac): pass text unchanged.
const isWC = /Windows/.test(navigator.userAgent) && /Chrome|Edg/.test(navigator.userAgent);
const sw = (t) => isWC ? "ừ, " + t : t;

let mode='jp2vn', filt='all', deck=[], idx=0, cor=0, wrg=0, flipped=false, spoken=false;

function stopTTS(){
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  document.getElementById('aw').classList.remove('on');
  document.getElementById('pb').classList.remove('spk');
  document.getElementById('al').textContent='フレーズ＋例文を聴く';
}

function spkTexts(arr, step){
  if(step>=arr.length){stopTTS();return;}
  const labels=['① フレーズ読み上げ中…','② 例文読み上げ中…'];
  document.getElementById('al').textContent = labels[step]||'';
  document.getElementById('aw').classList.add('on');
  document.getElementById('pb').classList.add('spk');
  const u = new SpeechSynthesisUtterance(sw(arr[step].t));
  u.lang='vi-VN'; u.rate=arr[step].r||0.82; u.pitch=1.0;
  u.onend = () => setTimeout(()=>spkTexts(arr, step+1), step<arr.length-1?550:0);
  u.onerror = () => stopTTS();
  window.speechSynthesis.speak(u);
}

function spk(){
  const c=deck[idx];
  const ph=c[1].replace(/[～〜]/g,'').replace(/\+\s*[VN]/g,'').trim();
  window.speechSynthesis.cancel();
  setTimeout(()=>spkTexts([{t:ph,r:0.80},{t:c[3],r:0.82}],0), 50);
}

function setMode(m){
  mode=m;
  document.querySelectorAll('#modeRow .mbtn').forEach((b,i)=>b.classList.toggle('on',(i===0&&m==='jp2vn')||(i===1&&m==='vn2jp')));
  restart();
}
function setF(f,el){
  filt=f;
  document.querySelectorAll('#filtRow .chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  restart();
}
function buildDeck(){return filt==='all'?[...D]:D.filter(c=>c[0]===filt);}
function doShuffle(){
  stopTTS();
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  idx=0;cor=0;wrg=0;showCard();upd();flash('🔀');
}
function restart(){
  stopTTS();deck=buildDeck();idx=0;cor=0;wrg=0;flipped=false;
  document.getElementById('doneArea').classList.add('hide');
  document.getElementById('cardArea').classList.remove('hide');
  showCard();upd();
}
function showCard(){
  if(idx>=deck.length){finish();return;}
  const c=deck[idx]; flipped=false; spoken=false; stopTTS();
  document.getElementById('ci').classList.remove('fl');
  const j2v=mode==='jp2vn';
  document.getElementById('ftag').textContent=j2v?'日本語':'ベトナム語';
  document.getElementById('ftag').className='ctag '+(j2v?'tjp':'tvn');
  document.getElementById('fsec').textContent=SN[c[0]];
  document.getElementById('fm').textContent=j2v?c[2]:c[1];
  document.getElementById('fs').textContent=j2v?c[4]:c[3];
  document.getElementById('btag').textContent=j2v?'ベトナム語':'日本語';
  document.getElementById('btag').className='ctag '+(j2v?'tvn':'tjp');
  document.getElementById('bsec').textContent=SN[c[0]];
  document.getElementById('bm').textContent=j2v?c[1]:c[2];
  document.getElementById('bs').textContent=j2v?c[3]:c[4];
  document.getElementById('az').style.display=j2v?'flex':'none';
  document.getElementById('cnum').textContent=(idx+1)+'/'+deck.length;
  document.getElementById('ar').classList.add('hide');
  document.getElementById('fr').classList.remove('hide');
  upd();
}
function flip(){
  if(flipped){
    stopTTS();flipped=false;
    document.getElementById('ci').classList.remove('fl');
    document.getElementById('ar').classList.add('hide');
    document.getElementById('fr').classList.remove('hide');
    return;
  }
  flipped=true;
  document.getElementById('ci').classList.add('fl');
  document.getElementById('ar').classList.remove('hide');
  document.getElementById('fr').classList.add('hide');
  if(mode==='jp2vn'&&!spoken){spoken=true;setTimeout(spk,400);}
}
function ans(ok){
  stopTTS();
  if(ok){cor++;flash('✅');}
  else{
    wrg++;flash('❌');
    const r=deck.length-idx-1;
    if(r>0){const p=idx+1+Math.floor(Math.random()*r);deck.splice(p,0,deck.splice(idx,1)[0]);}
  }
  upd();setTimeout(()=>{idx++;showCard();},300);
}
function prev(){if(idx>0){stopTTS();idx--;showCard();}}
function next(){if(idx<deck.length-1){stopTTS();idx++;showCard();}}
function upd(){
  document.getElementById('sc').textContent=cor;
  document.getElementById('sw').textContent=wrg;
  document.getElementById('sr').textContent=Math.max(0,deck.length-idx);
  document.getElementById('pf').style.width=(deck.length>0?(idx/deck.length)*100:0)+'%';
}
function finish(){
  stopTTS();
  document.getElementById('cardArea').classList.add('hide');
  document.getElementById('doneArea').classList.remove('hide');
  document.getElementById('fc').textContent=cor;
  document.getElementById('fw').textContent=wrg;
  document.getElementById('pf').style.width='100%';
  upd();
}
function flash(e){
  const el=document.getElementById('rf');
  el.textContent=e;el.classList.remove('show');
  void el.offsetWidth;el.classList.add('show');
}
document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='Enter'){e.preventDefault();flip();}
  else if(e.key==='ArrowRight'||e.key==='l'){if(flipped)ans(true);}
  else if(e.key==='ArrowLeft'||e.key==='h'){if(flipped)ans(false);}
  else if(e.key==='r'||e.key==='R'){if(flipped&&mode==='jp2vn')spk();}
});
restart();
</script>
</body>
</html>
