<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1週間でA2ベトナム語例文総点検</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Bebas+Neue&family=Saira+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --accent: #ff6b35;
    --accent2: #ffd166;
    --green: #06d6a0;
    --blue: #118ab2;
    --text: #f0f4ff;
    --muted: #7b8ab8;
    --card-bg: #151e30;
    --border: rgba(255,255,255,0.08);
    --shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG noise texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(10,14,26,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-stats {
    display: flex;
    gap: 20px;
    align-items: center;
    font-size: 13px;
    color: var(--muted);
  }

  .stat-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-pill span { color: var(--accent2); font-weight: 700; }

  .mute-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .mute-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .mute-btn.muted {
    background: rgba(235,87,87,0.12);
    border-color: rgba(235,87,87,0.4);
    color: #eb5757;
  }

  /* Main layout */
  main {
    padding-top: 80px;
    min-height: 100vh;
  }

  /* === SCREENS === */
  .screen { display: none; }
  .screen.active { display: block; }

  /* === MENU SCREEN === */
  #menuScreen {
    padding: 40px 24px 80px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .hero {
    text-align: center;
    padding: 40px 0 50px;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,107,53,0.15);
    border: 1px solid rgba(255,107,53,0.4);
    border-radius: 30px;
    padding: 6px 18px;
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .hero h1 {
    font-family: 'Saira Condensed', sans-serif;
    font-size: clamp(38px, 7vw, 72px);
    font-weight: 900;
    line-height: 1;
    margin-bottom: 16px;
    letter-spacing: -1px;
  }

  .hero h1 em {
    font-style: normal;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero p {
    color: var(--muted);
    font-size: 16px;
    max-width: 520px;
    margin: 0 auto 32px;
    line-height: 1.7;
  }

  /* Week progress */
  .week-bar {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 50px;
    flex-wrap: wrap;
  }

  .day-dot {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--surface2);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
  }

  .day-dot.done {
    background: linear-gradient(135deg, var(--green), #04b98a);
    border-color: var(--green);
    color: #0a1a14;
  }

  .day-dot:hover { transform: scale(1.1); }

  /* Mode selector */
  .mode-select-label {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 16px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .mode-tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }

  .mode-tab {
    padding: 10px 22px;
    border-radius: 30px;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
  }

  .mode-tab:hover { border-color: var(--accent); color: var(--accent); }
  .mode-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* Categories grid */
  .section-title {
    font-family: 'Saira Condensed', sans-serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 20px;
    letter-spacing: 0.5px;
  }

  .section-title small {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
    display: block;
    margin-top: 2px;
  }

  .categories-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }

  .cat-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .cat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px;
    height: 100%;
    background: var(--cat-color, var(--accent));
    border-radius: 4px 0 0 4px;
  }

  .cat-card:hover {
    border-color: rgba(255,255,255,0.2);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }

  .cat-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .cat-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    background: rgba(255,255,255,0.06);
    flex-shrink: 0;
  }

  .cat-name {
    font-weight: 700;
    font-size: 15px;
    line-height: 1.3;
  }

  .cat-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .cat-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
  }

  .cat-count {
    font-size: 12px;
    color: var(--muted);
  }

  .cat-progress-bar {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    margin: 0 10px;
    overflow: hidden;
  }

  .cat-progress-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--cat-color, var(--accent));
    transition: width 0.5s;
  }

  .cat-pct {
    font-size: 12px;
    font-weight: 700;
    color: var(--cat-color, var(--accent));
  }

  /* All cards button */
  .btn-all {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, rgba(255,107,53,0.15), rgba(255,209,102,0.1));
    border: 2px solid rgba(255,107,53,0.4);
    border-radius: 16px;
    color: var(--accent);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s;
    margin-bottom: 16px;
  }

  .btn-all:hover {
    background: linear-gradient(135deg, rgba(255,107,53,0.25), rgba(255,209,102,0.15));
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  /* === STUDY SCREEN === */
  #studyScreen {
    padding: 20px 24px 100px;
    max-width: 720px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .study-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
  }

  .btn-back {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .btn-back:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

  .study-title {
    flex: 1;
  }

  .study-title h2 {
    font-size: 18px;
    font-weight: 700;
  }

  .study-title small {
    font-size: 12px;
    color: var(--muted);
  }

  /* Progress bar */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--surface2);
    border-radius: 6px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 6px;
    transition: width 0.4s ease;
  }

  .progress-txt {
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
    min-width: 60px;
    text-align: right;
  }

  /* Flash card */
  .card-scene {
    perspective: 1200px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card-3d {
    position: relative;
    width: 100%;
    min-height: 320px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-3d.flipped { transform: rotateY(180deg); }

  .card-front, .card-back {
    position: absolute;
    inset: 0;
    min-height: 320px;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 36px;
    text-align: center;
    overflow: hidden;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  /* spacer so .card-3d has height */
  .card-3d::after {
    content: '';
    display: block;
    min-height: 320px;
    visibility: hidden;
  }

  .card-front {
    background: var(--card-bg);
    border: 2px solid var(--border);
  }

  .card-back {
    background: linear-gradient(145deg, #1a2a1e, #0f2218);
    border: 2px solid rgba(6,214,160,0.3);
    transform: rotateY(180deg);
  }

  .card-front::after {
    content: '';
    position: absolute;
    top: -60px;
    right: -60px;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,107,53,0.08), transparent 70%);
  }

  .card-back::after {
    content: '';
    position: absolute;
    bottom: -60px;
    left: -60px;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(6,214,160,0.08), transparent 70%);
  }

  .card-lang-badge {
    position: absolute;
    top: 16px;
    left: 20px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid;
  }

  .card-front .card-lang-badge {
    color: var(--accent);
    border-color: rgba(255,107,53,0.4);
    background: rgba(255,107,53,0.1);
  }

  .card-back .card-lang-badge {
    color: var(--green);
    border-color: rgba(6,214,160,0.4);
    background: rgba(6,214,160,0.1);
  }

  .card-flip-hint {
    position: absolute;
    bottom: 16px;
    right: 20px;
    font-size: 11px;
    color: var(--muted);
    opacity: 0.6;
  }

  .card-main-text {
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 700;
    line-height: 1.4;
    position: relative;
    z-index: 1;
  }

  .card-front .card-main-text { color: var(--text); }
  .card-back .card-main-text { color: var(--green); }

  .card-category-tag {
    position: absolute;
    top: 16px;
    right: 20px;
    font-size: 10px;
    color: var(--muted);
    background: var(--surface);
    padding: 3px 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .card-note {
    font-size: 13px;
    color: var(--muted);
    margin-top: 12px;
    position: relative;
    z-index: 1;
    line-height: 1.5;
  }

  /* Audio button */
  .audio-btn {
    margin-top: 20px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(6,214,160,0.15);
    border: 2px solid rgba(6,214,160,0.4);
    color: var(--green);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    position: relative;
    z-index: 1;
  }

  .audio-btn:hover {
    background: rgba(6,214,160,0.25);
    transform: scale(1.1);
  }

  .audio-btn.playing {
    animation: pulse-audio 0.8s ease-in-out infinite alternate;
  }

  @keyframes pulse-audio {
    from { box-shadow: 0 0 0 0 rgba(6,214,160,0.4); }
    to { box-shadow: 0 0 0 12px rgba(6,214,160,0); }
  }

  /* Action buttons */
  .action-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .btn-action {
    padding: 14px 10px;
    border-radius: 14px;
    border: 2px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    text-align: center;
  }

  .btn-action .icon { font-size: 18px; }

  .btn-action:hover { border-color: rgba(255,255,255,0.25); transform: translateY(-1px); }

  .btn-action.btn-show {
    border-color: rgba(255,107,53,0.5);
    color: var(--accent);
    background: rgba(255,107,53,0.08);
  }
  .btn-action.btn-show:hover { background: rgba(255,107,53,0.15); }

  .btn-action.btn-know {
    border-color: rgba(6,214,160,0.5);
    color: var(--green);
    background: rgba(6,214,160,0.08);
  }
  .btn-action.btn-know:hover { background: rgba(6,214,160,0.18); }

  .btn-action.btn-next {
    border-color: rgba(255,209,102,0.5);
    color: var(--accent2);
    background: rgba(255,209,102,0.08);
  }
  .btn-action.btn-next:hover { background: rgba(255,209,102,0.15); }

  .btn-action.btn-prev {
    color: var(--muted);
  }

  /* Counters row */
  .counters-row {
    display: flex;
    justify-content: center;
    gap: 20px;
  }

  .counter-item {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }

  .counter-item strong {
    display: block;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 2px;
  }

  .counter-item.known strong { color: var(--green); }
  .counter-item.remaining strong { color: var(--accent2); }

  /* === RESULTS SCREEN === */
  #resultsScreen {
    padding: 60px 24px;
    max-width: 600px;
    margin: 0 auto;
    text-align: center;
  }

  .results-emoji { font-size: 80px; margin-bottom: 24px; }

  .results-title {
    font-family: 'Saira Condensed', sans-serif;
    font-size: 48px;
    font-weight: 900;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .results-sub {
    color: var(--muted);
    font-size: 16px;
    margin-bottom: 40px;
  }

  .results-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 40px;
  }

  .result-stat {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }

  .result-stat .val {
    font-size: 36px;
    font-weight: 900;
    color: var(--accent2);
  }

  .result-stat .lbl {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  .btn-restart {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 16px 36px;
    background: linear-gradient(135deg, var(--accent), #ff9f1c);
    border: none;
    border-radius: 50px;
    color: white;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s;
    margin: 8px;
  }

  .btn-restart:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(255,107,53,0.4); }

  .btn-clear {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 28px;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 50px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin: 8px;
  }

  .btn-clear:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 600;
    z-index: 1000;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.green { border-color: rgba(6,214,160,0.4); color: var(--green); }

  /* Category filter pills */
  .filter-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 8px;
    margin-bottom: 24px;
    scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }

  .filter-pill {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-pill.active {
    background: rgba(255,107,53,0.15);
    border-color: rgba(255,107,53,0.5);
    color: var(--accent);
  }

  /* Flip animation keyframe */
  @keyframes cardPop {
    0% { transform: scale(0.95); opacity: 0.7; }
    100% { transform: scale(1); opacity: 1; }
  }

  .card-pop { animation: cardPop 0.25s ease-out; }

  /* Mobile responsive */
  @media (max-width: 540px) {
    .action-row { grid-template-columns: 1fr 1fr; }
    .results-stats { grid-template-columns: repeat(3, 1fr); }
    .categories-grid { grid-template-columns: 1fr; }
    .hero h1 { font-size: 36px; }
  }

  /* Shuffle animation */
  .shuffle-hint {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    opacity: 0.7;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 80px 24px;
    color: var(--muted);
  }

  .empty-state h3 { font-size: 24px; margin-bottom: 8px; color: var(--green); }

  /* Notification when known */
  .known-flash {
    position: fixed;
    top: 50%;
    left: 50%;

// ============================
// STATE
// ============================
let currentMode = 'ja-vi'; // 'ja-vi', 'vi-ja', 'random'
let currentCards = [];
let currentIndex = 0;
let knownSet = new Set();
let isFlipped = false;
let currentCatId = 'all';
let historyStack = [];
let sessionStart = Date.now();
let studyMode = 'ja-vi';

// Load known from localStorage
function loadKnown() {
  try {
    const saved = localStorage.getItem('viet_a2_known');
    if (saved) knownSet = new Set(JSON.parse(saved));
  } catch(e) { knownSet = new Set(); }
}

let isMuted = false;

function toggleMute() {
  isMuted = !isMuted;
  const btn = document.getElementById('muteBtn');
  if (isMuted) {
    btn.textContent = '🔇 音声OFF';
    btn.classList.add('muted');
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    // also reset the audio button state
    const ab = document.getElementById('audioBtn');
    if (ab) { ab.classList.remove('playing'); ab.textContent = '🔊'; }
  } else {
    btn.textContent = '🔊 音声ON';
    btn.classList.remove('muted');
  }
  try { localStorage.setItem('viet_a2_muted', isMuted ? '1' : '0'); } catch(e) {}
}

function saveKnown() {
  try {
    localStorage.setItem('viet_a2_known', JSON.stringify([...knownSet]));
  } catch(e) {}
}

// ============================
// INIT
// ============================
function init() {
  loadKnown();
  // restore mute state
  try {
    if (localStorage.getItem('viet_a2_muted') === '1') {
      isMuted = true;
      const btn = document.getElementById('muteBtn');
      btn.textContent = '🔇 音声OFF';
      btn.classList.add('muted');
    }
  } catch(e) {}
  renderWeekBar();
  renderCategories();
  updateHeaderStats();
  document.getElementById('totalCount').textContent = CATEGORIES.reduce((a,c) => a + c.cards.length, 0);
}

function renderWeekBar() {
  const bar = document.getElementById('weekBar');
  const days = ['月','火','水','木','金','土','日'];
  const today = new Date().getDay();
  const dayMap = [6,0,1,2,3,4,5]; // 0=Sun...6=Sat -> Mon=0
  const todayIdx = dayMap[today];

  bar.innerHTML = days.map((d,i) => {
    const done = i <= todayIdx;
    return `<div class="day-dot ${done ? 'done' : ''}" title="Day ${i+1}: ${d}曜日">
      <span>${d}</span>
    </div>`;
  }).join('');
}

function renderCategories() {
  const grid = document.getElementById('categoriesGrid');
  grid.innerHTML = CATEGORIES.map(cat => {
    const total = cat.cards.length;
    const known = cat.cards.filter(c => knownSet.has(getCId(cat.id, c))).length;
    const pct = total > 0 ? Math.round(known / total * 100) : 0;
    return `
      <div class="cat-card" style="--cat-color:${cat.color}" onclick="startStudy('${cat.id}')">
        <div class="cat-header">
          <div class="cat-icon">${cat.icon}</div>
          <div>
            <div class="cat-name">${cat.name}</div>
            <div class="cat-sub">${cat.grammar}</div>
          </div>
        </div>
        <div class="cat-meta">
          <div class="cat-count">${known}/${total}</div>
          <div class="cat-progress-bar">
            <div class="cat-progress-fill" style="width:${pct}%;background:${cat.color}"></div>
          </div>
          <div class="cat-pct" style="color:${cat.color}">${pct}%</div>
        </div>
      </div>`;
  }).join('');
}

function getCId(catId, card) {
  return `${catId}::${card.vi}`;
}

function updateHeaderStats() {
  const total = CATEGORIES.reduce((a,c) => a + c.cards.length, 0);
  const known = knownSet.size;
  document.getElementById('headerKnown').textContent = known;
  document.getElementById('headerRemaining').textContent = total - known;
}

// ============================
// MODE
// ============================
function setMode(mode, el) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

// ============================
// STUDY
// ============================
function startStudy(catId) {
  currentCatId = catId;
  historyStack = [];

  let allCards = [];
  if (catId === 'all') {
    CATEGORIES.forEach(cat => {
      cat.cards.forEach(c => allCards.push({...c, catId: cat.id, catName: cat.name, catIcon: cat.icon}));
    });
  } else {
    const cat = CATEGORIES.find(c => c.id === catId);
    if (!cat) return;
    cat.cards.forEach(c => allCards.push({...c, catId: cat.id, catName: cat.name, catIcon: cat.icon}));
  }

  // Filter out known
  currentCards = allCards.filter(c => !knownSet.has(getCId(c.catId, c)));
  shuffle(currentCards);

  if (currentCards.length === 0) {
    showResults(allCards.length);
    return;
  }

  currentIndex = 0;
  studyMode = currentMode === 'random' ? (Math.random() < 0.5 ? 'ja-vi' : 'vi-ja') : currentMode;

  showScreen('studyScreen');
  const cat = CATEGORIES.find(c => c.id === catId);
  document.getElementById('studyCatName').textContent = catId === 'all' ? '全カテゴリー' : (cat?.icon + ' ' + cat?.name);
  document.getElementById('studyCatSub').textContent = `${currentCards.length}問 残り`;

  renderCard();
  updateProgress();
  updateCounters();
}

function restartStudy() {
  startStudy(currentCatId);
}

function renderCard() {
  isFlipped = false;
  const card3d = document.getElementById('card3d');
  card3d.classList.remove('flipped');

  const card = currentCards[currentIndex];
  if (!card) { showResults(currentCards.length + knownSet.size); return; }

  // Determine display mode for this card
  if (currentMode === 'random') {
    studyMode = Math.random() < 0.5 ? 'ja-vi' : 'vi-ja';
  } else {
    studyMode = currentMode;
  }

  const question = studyMode === 'ja-vi' ? card.ja : card.vi;
  const answer = studyMode === 'ja-vi' ? card.vi : card.ja;
  const qLang = studyMode === 'ja-vi' ? '🇯🇵 日本語' : '🇻🇳 Tiếng Việt';
  const aLang = studyMode === 'ja-vi' ? '🇻🇳 Tiếng Việt' : '🇯🇵 日本語';

  document.getElementById('questionText').textContent = question;
  document.getElementById('answerText').textContent = answer;
  document.getElementById('noteText').textContent = card.note || '';
  document.getElementById('frontLang').textContent = qLang;
  document.getElementById('backLang').textContent = aLang;
  document.getElementById('cardCatTag').textContent = card.catIcon + ' ' + card.catName;

  card3d.classList.add('card-pop');
  setTimeout(() => card3d.classList.remove('card-pop'), 300);
}

function flipCard() {
  const card3d = document.getElementById('card3d');
  if (!isFlipped) {
    card3d.classList.add('flipped');
    isFlipped = true;
    // Auto speak
    setTimeout(() => speakAnswer(), 400);
  }
}

function showAnswer() {
  flipCard();
}

function nextCard() {
  if (currentIndex < currentCards.length - 1) {
    historyStack.push(currentIndex);
    currentIndex++;
    renderCard();
    updateProgress();
    updateCounters();
  } else {
    showResults(currentCards.length);
  }
}

function prevCard() {
  if (historyStack.length > 0) {
    currentIndex = historyStack.pop();
    renderCard();
    updateProgress();
    updateCounters();
  } else {
    showToast('最初のカードです', false);
  }
}

function markKnown() {
  const card = currentCards[currentIndex];
  if (!card) return;
  const cid = getCId(card.catId, card);
  knownSet.add(cid);
  saveKnown();

  // Flash
  const flash = document.getElementById('knownFlash');
  flash.classList.add('show');
  setTimeout(() => flash.classList.remove('show'), 600);

  // Remove from current deck
  currentCards.splice(currentIndex, 1);

  updateHeaderStats();
  updateCounters();

  if (currentCards.length === 0) {
    showResults(currentCards.length + knownSet.size);
    return;
  }

  if (currentIndex >= currentCards.length) currentIndex = currentCards.length - 1;
  renderCard();
  updateProgress();
}

function updateProgress() {
  const total = currentCards.length;
  const done = currentIndex;
  const pct = total > 0 ? Math.round(done / total * 100) : 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressTxt').textContent = `${currentIndex + 1} / ${total}`;
}

function updateCounters() {
  document.getElementById('knownCount').textContent = knownSet.size;
  document.getElementById('remainCount').textContent = currentCards.length;
}

// ============================
// SPEECH
// ============================
function speakAnswer() {
  if (isMuted) return;
  const card = currentCards[currentIndex];
  if (!card) return;

  const answer = studyMode === 'ja-vi' ? card.vi : card.ja;
  const lang = studyMode === 'ja-vi' ? 'vi-VN' : 'ja-JP';

  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();

  const btn = document.getElementById('audioBtn');
  btn.classList.add('playing');
  btn.textContent = '⏸';

  const utter = new SpeechSynthesisUtterance(answer);
  utter.lang = lang;
  utter.rate = 0.85;
  utter.pitch = 1;

  // Try to find a native voice
  const voices = window.speechSynthesis.getVoices();
  const nativeVoice = voices.find(v => v.lang.startsWith(lang.split('-')[0]) && !v.localService === false)
    || voices.find(v => v.lang.startsWith(lang.split('-')[0]));
  if (nativeVoice) utter.voice = nativeVoice;

  utter.onend = () => {
    btn.classList.remove('playing');
    btn.textContent = '🔊';
  };
  utter.onerror = () => {
    btn.classList.remove('playing');
    btn.textContent = '🔊';
  };

  window.speechSynthesis.speak(utter);
}

// ============================
// RESULTS
// ============================
function showResults(total) {
  const known = knownSet.size;
  const pct = total > 0 ? Math.round(known / total * 100) : 0;
  document.getElementById('resTotalCards').textContent = total;
  document.getElementById('resKnown').textContent = known;
  document.getElementById('resPct').textContent = pct + '%';

  let msg = 'このセッションの例文をすべて見ました！';
  if (pct >= 80) msg = '素晴らしい！A2レベル習得まであと一歩！';
  else if (pct >= 50) msg = '順調です！毎日続けてA2をマスターしましょう！';
  document.getElementById('resultsMsg').textContent = msg;

  showScreen('resultsScreen');
}

function clearKnown() {
  if (confirm('「覚えた」の記録をすべてクリアしますか？')) {
    knownSet = new Set();
    saveKnown();
    updateHeaderStats();
    renderCategories();
    showToast('チェックをクリアしました', true);
    goToMenu();
  }
}

// ============================
// NAVIGATION
// ============================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function goToMenu() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  showScreen('menuScreen');
  renderCategories();
  updateHeaderStats();
}

// ============================
// UTILS
// ============================
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function showToast(msg, green = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (green ? ' green' : '');
  setTimeout(() => t.className = 'toast', 2500);
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  const study = document.getElementById('studyScreen');
  if (!study.classList.contains('active')) return;

  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  if (e.key === 'ArrowRight') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'k' || e.key === 'K') markKnown();
  if (e.key === 'r' || e.key === 'R') speakAnswer();
});

// Init voices
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => {};
}

init();
</script>
