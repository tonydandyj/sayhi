<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ベトナム語フラッシュカード</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card-front: #1a2332;
    --card-back: #1a2d1f;
    --accent-vn: #00e5a0;
    --accent-jp: #ff6b6b;
    --accent-blue: #4fc3f7;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --border: #30363d;
    --gold: #ffd700;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Sora', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb1 { width: 400px; height: 400px; background: rgba(0,229,160,0.07); top: -100px; left: -100px; }
  .orb2 { width: 300px; height: 300px; background: rgba(255,107,107,0.07); bottom: -50px; right: -50px; animation-delay: -6s; }
  .orb3 { width: 250px; height: 250px; background: rgba(79,195,247,0.05); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -3s; }

  @keyframes drift {
    from { transform: translate(0,0) scale(1); }
    to { transform: translate(30px, 20px) scale(1.1); }
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 800px;
    margin: 0 auto;
    padding: 24px 20px 48px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .logo-flag {
    font-size: 28px;
    animation: wave 2s ease-in-out infinite;
  }

  @keyframes wave {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-10deg); }
    75% { transform: rotate(10deg); }
  }

  h1 {
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent-vn), var(--accent-blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }

  .subtitle {
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Mode selector */
  .mode-bar {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 24px;
  }

  .mode-btn {
    padding: 10px 24px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 0.5px;
  }

  .mode-btn:hover { border-color: var(--accent-vn); color: var(--text); }
  .mode-btn.active {
    background: linear-gradient(135deg, rgba(0,229,160,0.2), rgba(79,195,247,0.2));
    border-color: var(--accent-vn);
    color: var(--accent-vn);
    box-shadow: 0 0 20px rgba(0,229,160,0.15);
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 28px;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-size: 24px;
    font-weight: 700;
    line-height: 1;
  }
  .stat-num.correct { color: var(--accent-vn); }
  .stat-num.wrong { color: var(--accent-jp); }
  .stat-num.total { color: var(--accent-blue); }

  .stat-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 2px;
  }

  /* Progress bar */
  .progress-wrap {
    background: var(--border);
    border-radius: 100px;
    height: 4px;
    margin-bottom: 32px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-vn), var(--accent-blue));
    border-radius: 100px;
    transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 0 8px rgba(0,229,160,0.5);
  }

  /* Card area */
  .card-area {
    perspective: 1200px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    padding-top: min(56%, 420px);
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border: 1px solid var(--border);
    transition: box-shadow 0.3s;
  }

  .card-face:hover { box-shadow: 0 0 40px rgba(0,229,160,0.1); }

  .card-front {
    background: linear-gradient(145deg, var(--card-front), #0f1923);
  }

  .card-back {
    background: linear-gradient(145deg, var(--card-back), #0f1a0f);
    transform: rotateY(180deg);
  }

  .card-tag {
    position: absolute;
    top: 16px;
    left: 20px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 100px;
  }

  .tag-jp {
    background: rgba(255,107,107,0.15);
    color: var(--accent-jp);
    border: 1px solid rgba(255,107,107,0.3);
  }

  .tag-vn {
    background: rgba(0,229,160,0.15);
    color: var(--accent-vn);
    border: 1px solid rgba(0,229,160,0.3);
  }

  .card-number {
    position: absolute;
    top: 16px;
    right: 20px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .card-section {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 16px;
    text-align: center;
  }

  .card-main {
    font-size: clamp(20px, 4vw, 32px);
    font-weight: 700;
    text-align: center;
    line-height: 1.3;
    margin-bottom: 12px;
  }

  .card-front .card-main { color: var(--text); }
  .card-back .card-main { color: var(--accent-vn); }

  .card-sub {
    font-size: clamp(14px, 2.5vw, 18px);
    color: var(--text-dim);
    text-align: center;
    font-weight: 300;
    line-height: 1.5;
  }

  .card-hint {
    position: absolute;
    bottom: 18px;
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0.6;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-hint svg { width: 14px; height: 14px; }

  /* Audio controls on back */
  .audio-zone {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
    padding: 10px 20px;
    background: rgba(0,229,160,0.08);
    border: 1px solid rgba(0,229,160,0.2);
    border-radius: 100px;
  }

  .play-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--accent-vn);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .play-btn:hover { transform: scale(1.15); box-shadow: 0 0 16px rgba(0,229,160,0.5); }
  .play-btn:active { transform: scale(0.95); }

  .play-btn svg { width: 16px; height: 16px; fill: #000; margin-left: 2px; }
  .play-btn.playing svg { margin-left: 0; }

  .audio-wave {
    display: flex;
    gap: 3px;
    align-items: center;
    height: 20px;
  }

  .audio-wave span {
    display: block;
    width: 3px;
    background: var(--accent-vn);
    border-radius: 2px;
    animation: none;
    height: 4px;
    transition: height 0.2s;
  }

  .audio-wave.active span {
    animation: bar 0.8s ease-in-out infinite;
  }

  .audio-wave span:nth-child(2) { animation-delay: 0.1s; }
  .audio-wave span:nth-child(3) { animation-delay: 0.2s; }
  .audio-wave span:nth-child(4) { animation-delay: 0.3s; }
  .audio-wave span:nth-child(5) { animation-delay: 0.15s; }

  @keyframes bar {
    0%, 100% { height: 4px; }
    50% { height: 18px; }
  }

  .audio-label {
    font-size: 12px;
    color: var(--accent-vn);
    font-weight: 600;
  }

  /* Action buttons */
  .actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 20px;
  }

  .action-btn {
    flex: 1;
    max-width: 160px;
    padding: 14px 20px;
    border-radius: 16px;
    border: 1px solid var(--border);
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-wrong {
    background: rgba(255,107,107,0.1);
    color: var(--accent-jp);
    border-color: rgba(255,107,107,0.3);
  }

  .btn-wrong:hover {
    background: rgba(255,107,107,0.2);
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 8px 24px rgba(255,107,107,0.2);
  }

  .btn-correct {
    background: rgba(0,229,160,0.1);
    color: var(--accent-vn);
    border-color: rgba(0,229,160,0.3);
  }

  .btn-correct:hover {
    background: rgba(0,229,160,0.2);
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 8px 24px rgba(0,229,160,0.2);
  }

  .btn-flip {
    background: rgba(79,195,247,0.1);
    color: var(--accent-blue);
    border-color: rgba(79,195,247,0.3);
    max-width: 200px;
  }

  .btn-flip:hover {
    background: rgba(79,195,247,0.2);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(79,195,247,0.2);
  }

  /* Nav buttons */
  .nav-row {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .nav-btn {
    padding: 10px 20px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .nav-btn:hover { color: var(--text); border-color: var(--text-dim); }

  .nav-btn.shuffle {
    color: var(--gold);
    border-color: rgba(255,215,0,0.3);
    background: rgba(255,215,0,0.05);
  }

  .nav-btn.shuffle:hover { background: rgba(255,215,0,0.1); }

  /* Result overlay */
  .result-flash {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
    pointer-events: none;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.1s;
  }

  .result-flash.show {
    opacity: 1;
    animation: flash-anim 0.6s ease-out forwards;
  }

  @keyframes flash-anim {
    0% { opacity: 1; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1.3); }
    100% { opacity: 0; transform: scale(1.5); }
  }

  /* Completion screen */
  .completion {
    display: none;
    text-align: center;
    padding: 48px 24px;
  }

  .completion.show { display: block; }
  .card-area.hide, .actions.hide, .nav-row.hide { display: none; }

  .trophy { font-size: 80px; margin-bottom: 16px; animation: bounce 1s ease infinite; }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .completion h2 {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--gold), var(--accent-vn));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .completion p { color: var(--text-dim); margin-bottom: 32px; font-size: 15px; }

  .score-display {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 32px;
  }

  .score-item { text-align: center; }
  .score-big { font-size: 48px; font-weight: 800; line-height: 1; }
  .score-big.c { color: var(--accent-vn); }
  .score-big.w { color: var(--accent-jp); }
  .score-lbl { font-size: 12px; color: var(--text-dim); margin-top: 4px; text-transform: uppercase; letter-spacing: 1.5px; }

  .restart-btn {
    padding: 16px 40px;
    border-radius: 100px;
    border: none;
    background: linear-gradient(135deg, var(--accent-vn), var(--accent-blue));
    color: #000;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 0.5px;
  }

  .restart-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,229,160,0.3); }

  /* Filter chips */
  .filter-bar {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .filter-chip {
    padding: 6px 14px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .filter-chip.active {
    border-color: var(--accent-blue);
    color: var(--accent-blue);
    background: rgba(79,195,247,0.1);
  }

  .filter-chip:hover { border-color: var(--text-dim); color: var(--text); }

  @media (max-width: 480px) {
    .actions { flex-wrap: wrap; }
    .action-btn { max-width: 100%; }
  }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="result-flash" id="resultFlash"></div>

<div class="app">
  <header>
    <div class="logo">
      <span class="logo-flag">🇻🇳</span>
      <h1>ベトナム語フラッシュカード</h1>
      <span class="logo-flag">🇯🇵</span>
    </div>
    <p class="subtitle">B1 Level Idioms &amp; Set Phrases</p>
  </header>

  <!-- Mode -->
  <div class="mode-bar">
    <button class="mode-btn active" onclick="setMode('jp2vn')">🇯🇵 → 🇻🇳 日本語→ベトナム語</button>
    <button class="mode-btn" onclick="setMode('vn2jp')">🇻🇳 → 🇯🇵 ベトナム語→日本語</button>
  </div>

  <!-- Filter -->
  <div class="filter-bar">
    <button class="filter-chip active" data-section="all" onclick="setFilter('all', this)">すべて</button>
    <button class="filter-chip" data-section="0" onclick="setFilter(0, this)">動詞＋前置詞</button>
    <button class="filter-chip" data-section="1" onclick="setFilter(1, this)">形容詞＋前置詞</button>
    <button class="filter-chip" data-section="2" onclick="setFilter(2, this)">慣用表現</button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-num correct" id="statCorrect">0</div>
      <div class="stat-label">正解 ✓</div>
    </div>
    <div class="stat">
      <div class="stat-num wrong" id="statWrong">0</div>
      <div class="stat-label">不正解 ✗</div>
    </div>
    <div class="stat">
      <div class="stat-num total" id="statRemain">0</div>
      <div class="stat-label">残り</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>

  <!-- Card -->
  <div class="card-area" id="cardArea" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front" id="cardFront">
        <span class="card-tag tag-jp" id="frontTag">日本語</span>
        <span class="card-number" id="cardNum">1 / 1</span>
        <div class="card-section" id="frontSection"></div>
        <div class="card-main" id="frontMain"></div>
        <div class="card-sub" id="frontSub"></div>
        <div class="card-hint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="3"/><path d="M8 12h8M12 8v8"/></svg>
          クリックして裏返す
        </div>
      </div>
      <div class="card-face card-back" id="cardBack">
        <span class="card-tag tag-vn" id="backTag">ベトナム語</span>
        <div class="card-section" id="backSection"></div>
        <div class="card-main" id="backMain"></div>
        <div class="card-sub" id="backSub"></div>
        <div class="audio-zone" id="audioZone" onclick="event.stopPropagation()">
          <button class="play-btn" id="playBtn" onclick="speakVN()">
            <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
          </button>
          <div class="audio-wave" id="audioWave">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <span class="audio-label" id="audioLabel">フレーズ＋例文を聴く</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Actions (shown after flip) -->
  <div class="actions" id="actionsRow" style="display:none">
    <button class="action-btn btn-wrong" onclick="answer(false)">
      <span>✗</span> もう少し
    </button>
    <button class="action-btn btn-correct" onclick="answer(true)">
      <span>✓</span> わかった！
    </button>
  </div>

  <!-- Flip button (shown before flip) -->
  <div class="actions" id="flipRow">
    <button class="action-btn btn-flip" onclick="flipCard()">
      🔄 答えを見る
    </button>
  </div>

  <!-- Nav -->
  <div class="nav-row" id="navRow">
    <button class="nav-btn" onclick="prevCard()">← 前へ</button>
    <button class="nav-btn shuffle" onclick="shuffleCards()">🔀 シャッフル</button>
    <button class="nav-btn" onclick="nextCard()">次へ →</button>
  </div>

  <!-- Completion -->
  <div class="completion" id="completion">
    <div class="trophy">🏆</div>
    <h2>コンプリート！</h2>
    <p>すべてのカードを学習しました！</p>
    <div class="score-display">
      <div class="score-item">
        <div class="score-big c" id="finalCorrect">0</div>
        <div class="score-lbl">正解</div>
      </div>
      <div class="score-item">
        <div class="score-big w" id="finalWrong">0</div>
        <div class="score-lbl">不正解</div>
      </div>
    </div>
    <button class="restart-btn" onclick="restart()">もう一度挑戦する 🔁</button>
  </div>
</div>

<script>
const ALL_CARDS = [
  // Section 0: 動詞＋前置詞
  {s:0, vn:"tham gia vào ～", jp:"〜に参加する", ex_vn:"Tôi muốn tham gia vào câu lạc bộ tiếng Nhật.", ex_jp:"私は日本語クラブに参加したい。"},
  {s:0, vn:"phụ thuộc vào ～", jp:"〜に依存する", ex_vn:"Thành công phụ thuộc vào sự cố gắng của bạn.", ex_jp:"成功はあなたの努力にかかっている。"},
  {s:0, vn:"đồng ý với ～", jp:"〜に同意する", ex_vn:"Tôi hoàn toàn đồng ý với ý kiến của anh.", ex_jp:"私はあなたの意見に完全に同意します。"},
  {s:0, vn:"không đồng ý với ～", jp:"〜に反対する", ex_vn:"Cô ấy không đồng ý với kế hoạch đó.", ex_jp:"彼女はその計画に反対した。"},

  {s:2, vn:"liên quan đến ～", jp:"〜に関係している", ex_vn:"Vấn đề này liên quan đến nhiều phòng ban.", ex_jp:"この問題は複数の部門に関係している。"},
  {s:2, vn:"ảnh hưởng đến ～", jp:"〜に影響を与える", ex_vn:"Thời tiết xấu ảnh hưởng đến tâm trạng của tôi.", ex_jp:"悪天候は私の気分に影響を与える。"},
  {s:2, vn:"bị ảnh hưởng bởi ～", jp:"〜の影響を受ける", ex_vn:"Mùa màng bị ảnh hưởng bởi hạn hán năm nay.", ex_jp:"今年の農作物は干ばつの影響を受けた。"},
  {s:2, vn:"được làm từ / bằng ～", jp:"〜から作られている", ex_vn:"Chiếc túi này được làm từ da thật.", ex_jp:"このバッグは本革で作られている。"},
  {s:2, vn:"được biết đến như ～", jp:"〜として知られている", ex_vn:"Hội An được biết đến như phố cổ đẹp nhất.", ex_jp:"ホイアンは最も美しい古い街として知られている。"},
  {s:2, vn:"được coi là ～", jp:"〜とみなされている", ex_vn:"Anh ấy được coi là chuyên gia trong lĩnh vực này.", ex_jp:"彼はこの分野の専門家とみなされている。"},
  {s:2, vn:"được gọi là ～", jp:"〜と呼ばれている", ex_vn:"Con đường này được gọi là phố ẩm thực.", ex_jp:"この通りはグルメストリートと呼ばれている。"},
];

const SECTION_NAMES = ["動詞＋前置詞型", "形容詞＋前置詞型", "慣用表現・複合動詞型"];

let mode = 'jp2vn';
let currentFilter = 'all';
let deck = [];
let idx = 0;
let correct = 0;
let wrong = 0;
let isFlipped = false;
let autoSpoken = false;

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0 && m==='jp2vn') || (i===1 && m==='vn2jp'));
  });
  restart();
}

function setFilter(section, el) {
  currentFilter = section;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  restart();
}

function buildDeck() {
  let cards = currentFilter === 'all' ? [...ALL_CARDS] : ALL_CARDS.filter(c => c.s === currentFilter);
  deck = cards;
}

function shuffleCards() {
  for (let i = deck.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0;
  correct = 0;
  wrong = 0;
  showCard();
  updateStats();
  showFlash('🔀');
}

function restart() {
  buildDeck();
  idx = 0;
  correct = 0;
  wrong = 0;
  document.getElementById('completion').classList.remove('show');
  document.getElementById('cardArea').classList.remove('hide');
  document.getElementById('actionsRow').style.display = 'none';
  document.getElementById('flipRow').style.display = '';
  document.getElementById('navRow').classList.remove('hide');
  showCard();
  updateStats();
}

function showCard() {
  if (idx >= deck.length) {
    showCompletion();
    return;
  }
  const card = deck[idx];
  isFlipped = false;
  autoSpoken = false;
  const ci = document.getElementById('cardInner');
  ci.classList.remove('flipped');

  // Front: question side
  const isJP2VN = mode === 'jp2vn';
  const frontText = isJP2VN ? card.jp : card.vn;
  const frontSub = isJP2VN ? card.ex_jp : card.ex_vn;
  const backText = isJP2VN ? card.vn : card.jp;
  const backSub = isJP2VN ? card.ex_vn : card.ex_jp;

  document.getElementById('frontTag').textContent = isJP2VN ? '日本語' : 'ベトナム語';
  document.getElementById('frontTag').className = 'card-tag ' + (isJP2VN ? 'tag-jp' : 'tag-vn');
  document.getElementById('frontSection').textContent = SECTION_NAMES[card.s];
  document.getElementById('frontMain').textContent = frontText;
  document.getElementById('frontSub').textContent = frontSub;

  document.getElementById('backTag').textContent = isJP2VN ? 'ベトナム語' : '日本語';
  document.getElementById('backTag').className = 'card-tag ' + (isJP2VN ? 'tag-vn' : 'tag-jp');
  document.getElementById('backSection').textContent = SECTION_NAMES[card.s];
  document.getElementById('backMain').textContent = backText;
  document.getElementById('backSub').textContent = backSub;

  // Show/hide audio zone based on whether back is Vietnamese
  const backIsVN = isJP2VN; // jp2vn → back is VN; vn2jp → back is JP
  document.getElementById('audioZone').style.display = backIsVN ? 'flex' : 'none';

  document.getElementById('cardNum').textContent = `${idx+1} / ${deck.length}`;
  document.getElementById('actionsRow').style.display = 'none';
  document.getElementById('flipRow').style.display = '';
  updateProgress();
}

function flipCard() {
  if (isFlipped) {
    // Flip back to front
    isFlipped = false;
    window.speechSynthesis && window.speechSynthesis.cancel();
    document.getElementById('cardInner').classList.remove('flipped');
    document.getElementById('actionsRow').style.display = 'none';
    document.getElementById('flipRow').style.display = '';
    const wave = document.getElementById('audioWave');
    const btn = document.getElementById('playBtn');
    const label = document.getElementById('audioLabel');
    wave.classList.remove('active');
    btn.classList.remove('playing');
    label.textContent = 'フレーズ＋例文を聴く';
    return;
  }
  isFlipped = true;
  document.getElementById('cardInner').classList.add('flipped');
  document.getElementById('actionsRow').style.display = 'flex';
  document.getElementById('flipRow').style.display = 'none';

  // Auto-speak if back is Vietnamese
  const backIsVN = mode === 'jp2vn';
  if (backIsVN && !autoSpoken) {
    autoSpoken = true;
    setTimeout(() => speakVN(), 400);
  }
}

function speakVN() {
  const card = deck[idx];
  // Determine which text to speak
  // Always speak: VN phrase → pause → VN example sentence
  const vnPhrase = card.vn.replace(/～/g, '').replace(/\+ V|\+ N/g, '').trim();
  const vnExample = card.ex_vn;

  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();

  const wave = document.getElementById('audioWave');
  const btn = document.getElementById('playBtn');
  const label = document.getElementById('audioLabel');
  wave.classList.add('active');
  btn.classList.add('playing');

  // Step 1: speak the phrase
  const u1 = new SpeechSynthesisUtterance(vnPhrase);
  u1.lang = 'vi-VN';
  u1.rate = 0.80;
  u1.pitch = 1.0;

  // Step 2: speak the example sentence
  const u2 = new SpeechSynthesisUtterance(vnExample);
  u2.lang = 'vi-VN';
  u2.rate = 0.82;
  u2.pitch = 1.0;

  label.textContent = '① フレーズを読み上げ中…';

  u1.onend = () => {
    label.textContent = '② 例文を読み上げ中…';
    // Short pause before example
    setTimeout(() => window.speechSynthesis.speak(u2), 600);
  };

  u2.onend = () => {
    wave.classList.remove('active');
    btn.classList.remove('playing');
    label.textContent = 'フレーズ＋例文を聴く';
  };

  const onErr = () => {
    wave.classList.remove('active');
    btn.classList.remove('playing');
    label.textContent = 'フレーズ＋例文を聴く';
  };
  u1.onerror = onErr;
  u2.onerror = onErr;

  window.speechSynthesis.speak(u1);
}

function answer(isCorrect) {
  if (isCorrect) {
    correct++;
    showFlash('✅');
  } else {
    wrong++;
    showFlash('❌');
    // Put the card back at a random later position
    const remaining = deck.length - idx - 1;
    if (remaining > 0) {
      const insertAt = idx + 1 + Math.floor(Math.random() * remaining);
      const card = deck.splice(idx, 1)[0];
      deck.splice(insertAt, 0, card);
    }
  }
  updateStats();
  setTimeout(() => {
    idx++;
    showCard();
  }, 300);
}

function prevCard() {
  if (idx > 0) { idx--; showCard(); }
}

function nextCard() {
  if (idx < deck.length - 1) { idx++; showCard(); }
}

function updateStats() {
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statRemain').textContent = Math.max(0, deck.length - idx);
}

function updateProgress() {
  const pct = deck.length > 0 ? (idx / deck.length) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

function showCompletion() {
  document.getElementById('cardArea').classList.add('hide');
  document.getElementById('actionsRow').style.display = 'none';
  document.getElementById('flipRow').style.display = 'none';
  document.getElementById('navRow').classList.add('hide');
  document.getElementById('finalCorrect').textContent = correct;
  document.getElementById('finalWrong').textContent = wrong;
  document.getElementById('completion').classList.add('show');
  document.getElementById('progressFill').style.width = '100%';
  updateStats();
}

function showFlash(emoji) {
  const el = document.getElementById('resultFlash');
  el.textContent = emoji;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); if (!isFlipped) flipCard(); }
  if (e.key === 'ArrowRight' || e.key === 'l') { if (isFlipped) answer(true); else nextCard(); }
  if (e.key === 'ArrowLeft' || e.key === 'h') { if (isFlipped) answer(false); else prevCard(); }
  if (e.key === 'r' || e.key === 'R') speakVN();
});

// Init
restart();
</script>
