<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2週間でB1ベトナム語例文総点検</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Be+Vietnam+Pro:wght@300;400;600;700;800&display=swap');

:root {
  --red: #D62828;
  --gold: #F7B731;
  --dark: #0A0A0F;
  --dark2: #13131F;
  --card-bg: #1A1A2E;
  --card-front: #16213E;
  --card-back: #0F3460;
  --text: #F0EAD6;
  --text-dim: #9A8F7E;
  --green: #2ECC71;
  --green-dark: #27AE60;
  --accent: #E94560;
  --gold-light: #FFD700;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--dark);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Background decoration */
body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: 
    radial-gradient(ellipse at 20% 20%, rgba(214,40,40,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(247,183,49,0.06) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* === HEADER === */
header {
  position: relative;
  z-index: 10;
  padding: 16px 24px;
  background: rgba(10,10,15,0.95);
  border-bottom: 1px solid rgba(214,40,40,0.3);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-flag {
  font-size: 28px;
}

.logo-text h1 {
  font-family: 'Be Vietnam Pro', sans-serif;
  font-size: 14px;
  font-weight: 800;
  color: var(--red);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.logo-text p {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
}

.header-stats {
  display: flex;
  gap: 16px;
  align-items: center;
}

.stat-pill {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 12px;
  color: var(--text-dim);
}

.stat-pill span {
  color: var(--gold);
  font-weight: 700;
}

/* === MAIN === */
main {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  padding: 24px 16px;
}

/* === PROGRESS BAR === */
.progress-section {
  margin-bottom: 24px;
}

.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.day-badge {
  background: linear-gradient(135deg, var(--red), #FF6B6B);
  color: white;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
  letter-spacing: 0.05em;
}

.progress-text {
  font-size: 12px;
  color: var(--text-dim);
}

.progress-bar-wrap {
  height: 6px;
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--red), var(--gold));
  border-radius: 3px;
  transition: width 0.5s ease;
}

/* === CONTROLS === */
.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  align-items: center;
}

.mode-toggle {
  display: flex;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  overflow: hidden;
}

.mode-btn {
  padding: 8px 16px;
  font-size: 12px;
  font-weight: 600;
  background: transparent;
  color: var(--text-dim);
  border: none;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}

.mode-btn.active {
  background: var(--red);
  color: white;
}

.cat-select {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  color: var(--text);
  padding: 8px 12px;
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  flex: 1;
  min-width: 140px;
}

.cat-select option {
  background: var(--dark2);
  color: var(--text);
}

.icon-btn {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  color: var(--text-dim);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
}

.icon-btn:hover {
  background: rgba(255,255,255,0.1);
  color: var(--text);
}

.icon-btn.active {
  background: rgba(214,40,40,0.2);
  border-color: var(--red);
  color: var(--red);
}

/* === CARD AREA === */
.card-area {
  perspective: 1200px;
  margin-bottom: 20px;
}

.card-outer {
  position: relative;
  width: 100%;
  height: 300px;
  cursor: pointer;
}

.card-3d {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.card-3d.flipped {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px;
  overflow: hidden;
}

.card-front {
  background: linear-gradient(145deg, #1E2A4A, #162035);
  border: 1px solid rgba(247,183,49,0.2);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
}

.card-back {
  background: linear-gradient(145deg, #1A3A5C, #0F2A45);
  border: 1px solid rgba(214,40,40,0.3);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
  transform: rotateY(180deg);
}

/* Card decorations */
.card-face::before {
  content: '';
  position: absolute;
  top: -30px;
  right: -30px;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(247,183,49,0.08), transparent 70%);
  pointer-events: none;
}

.card-face::after {
  content: '';
  position: absolute;
  bottom: -20px;
  left: -20px;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(214,40,40,0.06), transparent 70%);
  pointer-events: none;
}

.card-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 16px;
  background: rgba(255,255,255,0.05);
  padding: 4px 12px;
  border-radius: 20px;
}

.card-text {
  font-family: 'Be Vietnam Pro', sans-serif;
  font-size: clamp(18px, 3.5vw, 26px);
  font-weight: 700;
  text-align: center;
  line-height: 1.4;
  color: var(--text);
  position: relative;
  z-index: 1;
}

.card-text.japanese {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: clamp(16px, 3vw, 22px);
}

.card-tap-hint {
  position: absolute;
  bottom: 16px;
  font-size: 10px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 0.1em;
  display: flex;
  align-items: center;
  gap: 6px;
}

.card-cat-badge {
  position: absolute;
  top: 16px;
  left: 20px;
  font-size: 10px;
  padding: 3px 10px;
  border-radius: 20px;
  background: rgba(214,40,40,0.15);
  color: #FF8A8A;
  border: 1px solid rgba(214,40,40,0.3);
}

/* Card number */
.card-num {
  position: absolute;
  top: 16px;
  right: 20px;
  font-size: 10px;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
}

/* Audio button on back */
.audio-btn-card {
  margin-top: 20px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 50px;
  color: var(--gold);
  padding: 8px 20px;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s;
  font-family: inherit;
  position: relative;
  z-index: 1;
}

.audio-btn-card:hover {
  background: rgba(247,183,49,0.15);
  border-color: var(--gold);
}

/* === ACTION BUTTONS === */
.action-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}

.action-btn {
  padding: 12px 8px;
  border-radius: 12px;
  border: none;
  font-family: inherit;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  letter-spacing: 0.03em;
}

.action-btn .icon { font-size: 18px; }

.btn-show {
  background: linear-gradient(135deg, #1E3A5F, #2A4F7C);
  color: #7EC8E3;
  border: 1px solid rgba(126,200,227,0.3);
}

.btn-show:hover { background: linear-gradient(135deg, #2A4F7C, #3A6FA0); }

.btn-remember {
  background: linear-gradient(135deg, #1A4A2E, #2A6B42);
  color: #5FD98C;
  border: 1px solid rgba(95,217,140,0.3);
}

.btn-remember:hover { background: linear-gradient(135deg, #2A6B42, #3A8A55); }

.btn-next {
  background: linear-gradient(135deg, var(--red), #B71C1C);
  color: white;
  border: 1px solid rgba(255,100,100,0.3);
}

.btn-next:hover { background: linear-gradient(135deg, #E03030, var(--red)); transform: translateY(-1px); }

.btn-back {
  background: rgba(255,255,255,0.05);
  color: var(--text-dim);
  border: 1px solid rgba(255,255,255,0.1);
}

.btn-back:hover { background: rgba(255,255,255,0.1); color: var(--text); }

/* === CATEGORY GRID === */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
  margin-bottom: 24px;
}

.cat-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 14px;
  cursor: pointer;
  transition: all 0.2s;
}

.cat-card:hover {
  background: rgba(214,40,40,0.1);
  border-color: rgba(214,40,40,0.4);
  transform: translateY(-2px);
}

.cat-card-name {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 4px;
}

.cat-card-count {
  font-size: 11px;
  color: var(--text-dim);
}

.cat-card-progress {
  margin-top: 8px;
  height: 3px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  overflow: hidden;
}

.cat-card-progress-fill {
  height: 100%;
  background: var(--green);
  border-radius: 2px;
  transition: width 0.5s;
}

/* === WEEK CALENDAR === */
.week-section {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
}

.week-section h3 {
  font-size: 13px;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 14px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.week-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
}

.day-cell {
  aspect-ratio: 1;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  cursor: pointer;
  transition: all 0.2s;
  gap: 2px;
  padding: 6px 2px;
}

.day-cell:hover {
  background: rgba(214,40,40,0.1);
  border-color: rgba(214,40,40,0.3);
}

.day-cell.today {
  background: rgba(214,40,40,0.15);
  border-color: var(--red);
  color: #FF8A8A;
}

.day-cell.completed {
  background: rgba(46,204,113,0.1);
  border-color: rgba(46,204,113,0.3);
  color: var(--green);
}

.day-num { font-size: 14px; }
.day-label { font-size: 8px; color: var(--text-dim); }

/* === TOAST === */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(20,20,30,0.95);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50px;
  padding: 12px 24px;
  font-size: 13px;
  font-weight: 600;
  z-index: 1000;
  transition: transform 0.3s ease;
  white-space: nowrap;
  backdrop-filter: blur(10px);
}

.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { border-color: rgba(46,204,113,0.4); color: var(--green); }
.toast.info { border-color: rgba(247,183,49,0.4); color: var(--gold); }

/* === CONGRATS === */
.congrats-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 100;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
}

.congrats-overlay.show { display: flex; }

.congrats-emoji { font-size: 80px; margin-bottom: 20px; animation: bounce 1s infinite; }

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

.congrats-title {
  font-size: 32px;
  font-weight: 900;
  margin-bottom: 10px;
  background: linear-gradient(135deg, var(--gold), var(--red));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.congrats-sub {
  font-size: 16px;
  color: var(--text-dim);
  margin-bottom: 30px;
}

/* === STREAK/GAMIFICATION === */
.game-bar {
  display: flex;
  gap: 12px;
  align-items: center;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 20px;
}

.game-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
}

.game-icon { font-size: 18px; }
.game-val { font-weight: 700; color: var(--gold); }
.game-label { color: var(--text-dim); font-size: 10px; }

/* Animations */
@keyframes slideIn {
  from { opacity: 0; transform: translateX(30px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.card-area { animation: fadeIn 0.3s ease; }

/* === RESPONSIVE === */
@media (max-width: 500px) {
  .action-row { grid-template-columns: 1fr 1fr; }
  .cat-grid { grid-template-columns: 1fr 1fr; }
  .week-grid { grid-template-columns: repeat(7, 1fr); }
  .day-cell { font-size: 8px; }
  .controls { gap: 8px; }
}

/* === BOTTOM NAV === */
.bottom-nav {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 10px;
  flex-wrap: wrap;
}

.small-btn {
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: var(--text-dim);
  font-family: inherit;
  transition: all 0.2s;
}

.small-btn:hover {
  background: rgba(255,255,255,0.1);
  color: var(--text);
}

.small-btn.danger {
  border-color: rgba(214,40,40,0.3);
  color: #FF8A8A;
}

.small-btn.danger:hover {
  background: rgba(214,40,40,0.1);
}

/* Loading indicator */
.loading {
  text-align: center;
  padding: 60px;
  color: var(--text-dim);
  font-size: 14px;
}

.card-flip-icon {
  font-size: 24px;
  margin-bottom: 12px;
  opacity: 0.5;
}

/* Mute indicator */
.mute-status {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  color: var(--text-dim);
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-flag">🇻🇳</span>
    <div class="logo-text">
      <h1>2週間でB1ベトナム語</h1>
      <p>例文総点検 FLASHCARD</p>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat-pill">残り <span id="remainCount">—</span>文</div>
    <div class="stat-pill">覚えた <span id="learnedCount">0</span>文</div>
  </div>
</header>

<main>
  <!-- Game Bar -->
  <div class="game-bar">
    <div class="game-item">
      <span class="game-icon">🔥</span>
      <div>
        <div class="game-val" id="streakVal">0</div>
        <div class="game-label">連続正解</div>
      </div>
    </div>
    <div style="flex:1"></div>
    <div class="game-item">
      <span class="game-icon">📅</span>
      <div>
        <div class="game-val" id="dayVal">1</div>
        <div class="game-label">日目</div>
      </div>
    </div>
    <div class="game-item">
      <span class="game-icon">⚡</span>
      <div>
        <div class="game-val" id="sessionVal">0</div>
        <div class="game-label">今回</div>
      </div>
    </div>
    <div class="game-item">
      <span class="game-icon">🏆</span>
      <div>
        <div class="game-val" id="totalVal">0</div>
        <div class="game-label">累計</div>
      </div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-header">
      <span class="day-badge" id="dayBadge">Day 1</span>
      <span class="progress-text" id="progressText">0 / 0</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="mode-toggle">
      <button class="mode-btn active" id="modeJpVi" onclick="setMode('jp-vi')">🇯🇵→🇻🇳</button>
      <button class="mode-btn" id="modeViJp" onclick="setMode('vi-jp')">🇻🇳→🇯🇵</button>
      <button class="mode-btn" id="modeRandom" onclick="setMode('random')">🔀</button>
    </div>
    <select class="cat-select" id="catSelect" onchange="changeCategory()">
      <option value="all">📚 すべてのカテゴリー</option>
    </select>
    <button class="icon-btn" id="shuffleBtn" onclick="shuffleCards()" title="シャッフル">🔀</button>
    <button class="icon-btn" id="muteBtn" onclick="toggleMute()" title="ミュート">🔊</button>
  </div>

  <!-- Flashcard -->
  <div class="card-area" id="cardArea">
    <div class="loading">読み込み中...</div>
  </div>

  <!-- Action Buttons -->
  <div class="action-row" id="actionRow" style="display:none">
    <button class="action-btn btn-back" onclick="prevCard()">
      <span class="icon">⬅️</span>戻る
    </button>
    <button class="action-btn btn-show" onclick="showAnswer()" id="showBtn">
      <span class="icon">👁️</span>表示
    </button>
    <button class="action-btn btn-remember" onclick="markRemembered()">
      <span class="icon">✅</span>覚えた
    </button>
    <button class="action-btn btn-next" onclick="nextCard()">
      <span class="icon">➡️</span>次へ
    </button>
  </div>

  <!-- Bottom actions -->
  <div class="bottom-nav" id="bottomNav" style="display:none">
    <button class="small-btn danger" onclick="clearLearned()">🔄 チェック解除</button>
    <button class="small-btn" onclick="showCategoryView()">📂 カテゴリー</button>
    <button class="small-btn" onclick="showAll()">📋 全件表示</button>
  </div>

  <!-- Category Grid (hidden by default) -->
  <div id="catView" style="display:none">
    <h2 style="font-size:16px; margin-bottom:16px; color:var(--gold)">📂 カテゴリー選択</h2>
    <div class="cat-grid" id="catGrid"></div>
    <button class="small-btn" style="margin-top:10px" onclick="hideCategoryView()">← 戻る</button>
  </div>
</main>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Congrats overlay -->
<div class="congrats-overlay" id="congratsOverlay">
  <div class="congrats-emoji">🎉</div>
  <div class="congrats-title">完璧！</div>

説明していただけますか？","category":"学習・言語"},{"vi":"Xin lỗi, tôi không nghe rõ.","jp":"すみません、聞き取れませんでした。","category":"学習・言語"},{"vi":"Nói chậm hơn được không?","jp":"もっとゆっくり話していただけますか？","category":"学習・言語"},{"vi":"Tôi hiểu đúng chưa?","jp":"私の理解は正しいですか？","category":"学習・言語"},{"vi":"Để tôi xác nhận lại...","jp":"確認させてください...","category":"学習・言語"},{"vi":"Vậy nghĩa là...?","jp":"つまり...ということですか？","category":"学習・言語"},{"vi":"Tôi muốn chắc chắn rằng...","jp":"...ということを確認したいのですが。","category":"学習・言語"},{"vi":"Có nghĩa gì?","jp":"どういう意味ですか？","category":"学習・言語"},{"vi":"Ơ, bạn đến rồi à? Tôi đang chờ nè.","jp":"おっ、来たんだ？待ってたよ。","category":"挨拶・日常会話"},{"vi":"Trời ơi, mệt quá! Hôm nay bận lắm.","jp":"あー疲れた！今日は忙しかったよ。","category":"挨拶・日常会話"},{"vi":"Cũng được, không tệ lắm.","jp":"まあまあだね、悪くないよ。","category":"挨拶・日常会話"},{"vi":"Thôi đi, đừng có lo.","jp":"いいよ、心配しないで。","category":"挨拶・日常会話"},{"vi":"Vậy hả? Tôi không biết.","jp":"そうなの？知らなかった。","category":"挨拶・日常会話"},{"vi":"Thật sao? Không tin nổi!","jp":"本当？信じられない！","category":"挨拶・日常会話"},{"vi":"Được thôi, không vấn đề gì.","jp":"いいよ、問題ないよ。","category":"挨拶・日常会話"},{"vi":"Để tôi nghĩ đã nhé.","jp":"ちょっと考えさせてね。","category":"挨拶・日常会話"},{"vi":"Nói thiệt, tôi không thích lắm.","jp":"正直、あまり好きじゃない。","category":"挨拶・日常会話"},{"vi":"Ồ, tuyệt vời quá!","jp":"わあ、すごい！","category":"感嘆・強調"}];

// =====================
// STATE
// =====================
let allCards = [...FLASHCARD_DATA];
let filteredCards = [];
let currentQueue = [];
let currentIdx = 0;
let learnedSet = new Set();
let mode = 'jp-vi'; // jp-vi or vi-jp or random
let currentCategory = 'all';
let isFlipped = false;
let isMuted = false;
let streak = 0;
let sessionCount = 0;
let totalLearned = 0;
let history = []; // for back button

// Load from localStorage
function loadState() {
  try {
    const saved = localStorage.getItem('vn_b1_learned');
    if (saved) learnedSet = new Set(JSON.parse(saved));
    const savedTotal = localStorage.getItem('vn_b1_total');
    if (savedTotal) totalLearned = parseInt(savedTotal);
    const savedStreak = localStorage.getItem('vn_b1_streak');
    if (savedStreak) streak = parseInt(savedStreak);
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem('vn_b1_learned', JSON.stringify([...learnedSet]));
    localStorage.setItem('vn_b1_total', totalLearned);
    localStorage.setItem('vn_b1_streak', streak);
  } catch(e) {}
}

// =====================
// INIT
// =====================
function init() {
  loadState();
  buildCategorySelect();
  buildCategoryGrid();
  filterCards();
  renderCard();
  updateStats();
  document.getElementById('actionRow').style.display = 'grid';
  document.getElementById('bottomNav').style.display = 'flex';
}

function buildCategorySelect() {
  const sel = document.getElementById('catSelect');
  const cats = [...new Set(allCards.map(c => c.category))].sort();
  cats.forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat;
    opt.textContent = `📁 ${cat}`;
    sel.appendChild(opt);
  });
}

function buildCategoryGrid() {
  const grid = document.getElementById('catGrid');
  const cats = [...new Set(allCards.map(c => c.category))].sort();
  grid.innerHTML = '';
  cats.forEach(cat => {
    const total = allCards.filter(c => c.category === cat).length;
    const learned = allCards.filter(c => c.category === cat && learnedSet.has(c.vi)).length;
    const pct = total > 0 ? Math.round(learned/total*100) : 0;
    const div = document.createElement('div');
    div.className = 'cat-card';
    div.innerHTML = `
      <div class="cat-card-name">${cat}</div>
      <div class="cat-card-count">${learned}/${total}文 (${pct}%)</div>
      <div class="cat-card-progress"><div class="cat-card-progress-fill" style="width:${pct}%"></div></div>
    `;
    div.onclick = () => { 
      document.getElementById('catSelect').value = cat;
      changeCategory();
      hideCategoryView();
    };
    grid.appendChild(div);
  });
}

function filterCards() {
  if (currentCategory === 'all') {
    filteredCards = allCards.filter(c => !learnedSet.has(c.vi));
  } else {
    filteredCards = allCards.filter(c => c.category === currentCategory && !learnedSet.has(c.vi));
  }
  currentQueue = [...filteredCards];
  shuffleArray(currentQueue);
  currentIdx = 0;
  history = [];
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// =====================
// RENDER
// =====================
function renderCard() {
  const area = document.getElementById('cardArea');
  
  if (currentQueue.length === 0) {
    if (learnedSet.size > 0 && filteredCards.length === 0) {
      document.getElementById('congratsOverlay').classList.add('show');
    } else {
      area.innerHTML = `<div class="loading">🎉 このカテゴリーの例文をすべてクリア！<br><small style="color:var(--text-dim);margin-top:8px;display:block">チェック解除で再挑戦できます</small></div>`;
    }
    return;
  }

  const card = currentQueue[currentIdx];
  if (!card) return;

  const currentMode = mode === 'random' 
    ? (Math.random() > 0.5 ? 'jp-vi' : 'vi-jp') 
    : mode;
  card._currentMode = currentMode;

  const frontText = currentMode === 'jp-vi' ? card.jp : card.vi;
  const backText = currentMode === 'jp-vi' ? card.vi : card.jp;
  const frontLang = currentMode === 'jp-vi' ? '🇯🇵 日本語' : '🇻🇳 Tiếng Việt';
  const backLang = currentMode === 'jp-vi' ? '🇻🇳 Tiếng Việt' : '🇯🇵 日本語';
  const frontClass = currentMode === 'jp-vi' ? 'japanese' : '';
  const backClass = currentMode === 'jp-vi' ? '' : 'japanese';

  isFlipped = false;

  area.innerHTML = `
    <div class="card-outer" onclick="flipCard()">
      <div class="card-3d" id="card3d">
        <div class="card-face card-front">
          <span class="card-cat-badge">${card.category}</span>
          <span class="card-num">${currentIdx+1} / ${currentQueue.length}</span>
          <div class="card-label">${frontLang}</div>
          <div class="card-text ${frontClass}">${frontText}</div>
          <div class="card-tap-hint">↩ タップして答えを見る</div>
        </div>
        <div class="card-face card-back">
          <span class="card-cat-badge">${card.category}</span>
          <span class="card-num">${currentIdx+1} / ${currentQueue.length}</span>
          <div class="card-label">${backLang}</div>
          <div class="card-text ${backClass}">${backText}</div>
          <button class="audio-btn-card" onclick="event.stopPropagation();speakAnswer('${escapeAttr(backText)}','${currentMode === 'jp-vi' ? 'vi-VN' : 'ja-JP'}')">
            🔊 音声を再生
          </button>
        </div>
      </div>
    </div>
  `;

  updateStats();

  // Auto-speak when flipped (handled in flipCard)
}

function escapeAttr(str) {
  return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function flipCard() {
  const card3d = document.getElementById('card3d');
  if (!card3d) return;
  isFlipped = !isFlipped;
  card3d.classList.toggle('flipped', isFlipped);
  if (isFlipped) {
    const card = currentQueue[currentIdx];
    const currentMode = card._currentMode || mode;
    const backText = currentMode === 'jp-vi' ? card.vi : card.jp;
    const lang = currentMode === 'jp-vi' ? 'vi-VN' : 'ja-JP';
    setTimeout(() => speak(backText, lang), 400);
  }
}

function showAnswer() {
  if (!isFlipped) flipCard();
}

// =====================
// NAVIGATION
// =====================
function nextCard() {
  if (currentQueue.length === 0) return;
  history.push(currentIdx);
  currentIdx = (currentIdx + 1) % currentQueue.length;
  renderCard();
}

function prevCard() {
  if (history.length > 0) {
    currentIdx = history.pop();
  } else {
    currentIdx = Math.max(0, currentIdx - 1);
  }
  renderCard();
}

function markRemembered() {
  if (currentQueue.length === 0) return;
  const card = currentQueue[currentIdx];
  learnedSet.add(card.vi);
  streak++;
  sessionCount++;
  totalLearned++;
  saveState();
  showToast(`✅ 覚えた！ 🔥 ${streak}連続`, 'success');
  
  // Remove from queue
  currentQueue.splice(currentIdx, 1);
  if (currentIdx >= currentQueue.length) currentIdx = 0;
  
  updateStats();
  renderCard();
}

// =====================
// CONTROLS
// =====================
function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  if (m === 'jp-vi') document.getElementById('modeJpVi').classList.add('active');
  else if (m === 'vi-jp') document.getElementById('modeViJp').classList.add('active');
  else document.getElementById('modeRandom').classList.add('active');
  renderCard();
}

function changeCategory() {
  currentCategory = document.getElementById('catSelect').value;
  filterCards();
  renderCard();
}

function shuffleCards() {
  shuffleArray(currentQueue);
  currentIdx = 0;
  renderCard();
  showToast('🔀 シャッフルしました', 'info');
}

function toggleMute() {
  isMuted = !isMuted;
  const btn = document.getElementById('muteBtn');
  btn.textContent = isMuted ? '🔇' : '🔊';
  btn.classList.toggle('active', isMuted);
  showToast(isMuted ? '🔇 ミュートON' : '🔊 ミュートOFF', 'info');
}

function clearLearned() {
  if (!confirm('覚えたリストをリセットしますか？')) return;
  learnedSet.clear();
  streak = 0;
  sessionCount = 0;
  saveState();
  filterCards();
  renderCard();
  showToast('🔄 チェックを解除しました', 'info');
  buildCategoryGrid();
}

function showAll() {
  currentCategory = 'all';
  document.getElementById('catSelect').value = 'all';
  learnedSet.clear();
  filterCards();
  renderCard();
}

function showCategoryView() {
  buildCategoryGrid();
  document.getElementById('cardArea').style.display = 'none';
  document.getElementById('actionRow').style.display = 'none';
  document.getElementById('bottomNav').style.display = 'none';
  document.getElementById('catView').style.display = 'block';
}

function hideCategoryView() {
  document.getElementById('catView').style.display = 'none';
  document.getElementById('cardArea').style.display = 'block';
  document.getElementById('actionRow').style.display = 'grid';
  document.getElementById('bottomNav').style.display = 'flex';
}

function resetForReview() {
  document.getElementById('congratsOverlay').classList.remove('show');
  learnedSet.clear();
  saveState();
  filterCards();
  renderCard();
}

// =====================
// SPEECH
// =====================
function speak(text, lang) {
  if (isMuted) return;
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = lang;
  utt.rate = 0.9;
  window.speechSynthesis.speak(utt);
}

function speakAnswer(text, lang) {
  speak(text, lang);
}

// =====================
// STATS UPDATE
// =====================
function updateStats() {
  const total = currentCategory === 'all' ? allCards.length : allCards.filter(c => c.category === currentCategory).length;
  const learned = currentCategory === 'all' ? learnedSet.size : allCards.filter(c => c.category === currentCategory && learnedSet.has(c.vi)).length;
  const remain = total - learned;
  const pct = total > 0 ? (learned / total * 100) : 0;

  document.getElementById('remainCount').textContent = currentQueue.length;
  document.getElementById('learnedCount').textContent = learnedSet.size;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${learned} / ${total}`;
  document.getElementById('streakVal').textContent = streak;
  document.getElementById('sessionVal').textContent = sessionCount;
  document.getElementById('totalVal').textContent = totalLearned;

  // Day calculation (rough: ~65 cards/day for 14 days)
  const cardsPerDay = Math.ceil(allCards.length / 14);
  const day = Math.min(14, Math.floor(totalLearned / cardsPerDay) + 1);
  document.getElementById('dayVal').textContent = day;
  document.getElementById('dayBadge').textContent = `Day ${day}`;
}

// =====================
// TOAST
// =====================
let toastTimer;
function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// =====================
// START
// =====================
window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
