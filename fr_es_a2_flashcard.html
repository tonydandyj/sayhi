<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仏語・西語 A2フラッシュカード</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --fr: #0055a4;
  --fr2: #002f7a;
  --es: #c60b1e;
  --es2: #8b0012;
  --gold: #f0c060;
  --bg: #0e0f16;
  --surface: #171924;
  --surface2: #1e2130;
  --surface3: #252840;
  --text: #eef0ff;
  --text-muted: #7880aa;
  --border-fr: rgba(0,85,164,0.35);
  --border-es: rgba(198,11,30,0.35);
  --radius: 18px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ===== HEADER ===== */
.header {
  width: 100%;
  background: linear-gradient(120deg, #001a4a 0%, #0a0c18 40%, #3a000a 100%);
  border-bottom: 2px solid rgba(240,192,96,0.3);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}
.header-left { display: flex; align-items: center; gap: 12px; }
.flags { display: flex; gap: 4px; align-items: center; }
.flag { width: 26px; height: 18px; border-radius: 3px; overflow: hidden; display: flex; flex-direction: column; }
.flag-fr { width: 26px; height: 18px; background: linear-gradient(90deg, #002395 33.3%, #fff 33.3%, #fff 66.6%, #ed2939 66.6%); }
.flag-es { width: 26px; height: 18px; background: linear-gradient(180deg, #c60b1e 25%, #f1bf00 25%, #f1bf00 75%, #c60b1e 75%); }
.flag-sep { color: var(--text-muted); font-size: 1rem; }
.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(0.9rem, 2.8vw, 1.2rem);
  font-weight: 700;
  letter-spacing: 0.04em;
}
.header h1 .fr { color: #5b9fff; }
.header h1 .sep { color: var(--text-muted); margin: 0 4px; }
.header h1 .es { color: #ff6b7a; }
.header h1 .jp { color: var(--text-muted); font-size: 0.8em; }
.header-right { display: flex; gap: 8px; align-items: center; }
.icon-btn {
  background: var(--surface2);
  border: 1.5px solid var(--surface3);
  color: var(--text-muted);
  border-radius: 10px;
  padding: 6px 10px;
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.2s;
}
.icon-btn:hover { border-color: var(--gold); color: var(--text); }
.icon-btn.muted { color: var(--text-muted); opacity: 0.5; }

/* ===== MODE SELECTOR ===== */
.mode-bar {
  width: 100%;
  max-width: 720px;
  padding: 10px 16px;
  display: flex;
  gap: 6px;
  justify-content: center;
  flex-wrap: wrap;
}
.mode-btn {
  font-family: 'Noto Sans JP', sans-serif;
  padding: 7px 16px;
  border-radius: 20px;
  border: 1.5px solid var(--surface3);
  background: var(--surface);
  color: var(--text-muted);
  cursor: pointer;
  font-size: 0.78rem;
  font-weight: 500;
  transition: all 0.2s;
  white-space: nowrap;
}
.mode-btn:hover { border-color: var(--gold); color: var(--text); }
.mode-btn.active {
  background: linear-gradient(135deg, #1a2a60, #4a0010);
  border-color: var(--gold);
  color: var(--gold);
  font-weight: 700;
}

/* ===== STATS BAR ===== */
.stats-bar {
  width: calc(100% - 32px);
  max-width: 688px;
  margin: 2px 16px 0;
  background: var(--surface);
  border-radius: 10px;
  padding: 7px 14px;
  display: flex;
  gap: 14px;
  align-items: center;
  font-size: 0.75rem;
  color: var(--text-muted);
}
.stats-bar span b { color: var(--text); }
.stats-bar .prog-wrap {
  flex: 1;
  height: 5px;
  background: var(--surface3);
  border-radius: 3px;
  overflow: hidden;
  min-width: 30px;
}
.stats-bar .prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--fr), var(--es));
  border-radius: 3px;
  transition: width 0.4s;
}

/* ===== CATEGORY ===== */
.cat-scroll {
  width: 100%;
  max-width: 720px;
  padding: 6px 16px;
  overflow-x: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--fr) var(--surface);
}
.cat-scroll::-webkit-scrollbar { height: 4px; }
.cat-scroll::-webkit-scrollbar-track { background: var(--surface); }
.cat-scroll::-webkit-scrollbar-thumb { background: var(--fr); border-radius: 2px; }
.cat-inner { display: flex; gap: 6px; width: max-content; }
.cat-btn {
  font-family: 'Noto Sans JP', sans-serif;
  padding: 5px 12px;
  border-radius: 14px;
  border: 1.5px solid var(--surface3);
  background: var(--surface);
  color: var(--text-muted);
  cursor: pointer;
  font-size: 0.7rem;
  transition: all 0.2s;
  white-space: nowrap;
}
.cat-btn:hover { border-color: var(--fr); color: var(--text); }
.cat-btn.active {
  background: var(--fr2);
  border-color: var(--fr);
  color: #fff;
  font-weight: 700;
}

/* ===== CARD AREA ===== */
.card-area {
  width: 100%;
  max-width: 720px;
  padding: 14px 16px;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

/* ===== FLASHCARD 3D FLIP ===== */
.flashcard-wrapper {
  width: 100%;
  min-height: 260px;
  perspective: 1200px;
  cursor: pointer;
  /* Height is set dynamically by JS after render */
}
.flashcard {
  width: 100%;
  min-height: 260px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.55s cubic-bezier(0.45, 0.05, 0.55, 0.95), box-shadow 0.25s;
  border-radius: var(--radius);
  box-shadow: 0 8px 32px rgba(0,0,0,0.45);
}
.flashcard-wrapper:hover .flashcard {
  box-shadow: 0 10px 44px rgba(240,192,96,0.12);
}
.flashcard.revealed {
  transform: rotateY(180deg);
}
.card-face {
  position: absolute;
  width: 100%;
  min-height: 260px;
  border-radius: var(--radius);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 24px 26px;
}
.card-front {
  background: var(--surface);
  border: 1.5px solid var(--surface3);
}
.card-back {
  background: var(--surface2);
  border: 1.5px solid rgba(240,192,96,0.25);
  transform: rotateY(180deg);
}
.card-meta {
  position: absolute; top: 12px; left: 16px;
  display: flex; gap: 6px; align-items: center;
  z-index: 1;
}
.card-cat {
  font-size: 0.68rem;
  color: var(--text-muted);
  background: var(--surface3);
  padding: 2px 8px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.06);
}
.card-mode-badge {
  font-size: 0.65rem;
  padding: 2px 7px;
  border-radius: 8px;
  font-weight: 700;
  letter-spacing: 0.03em;
}
.badge-jp { background: rgba(200,200,255,0.1); color: #a0aaff; border: 1px solid rgba(160,170,255,0.2); }
.badge-fr { background: rgba(0,85,164,0.15); color: #7ab0ff; border: 1px solid rgba(0,85,164,0.3); }
.badge-es { background: rgba(198,11,30,0.15); color: #ff8a94; border: 1px solid rgba(198,11,30,0.3); }
.card-counter {
  position: absolute; top: 12px; right: 16px;
  font-size: 0.7rem; color: var(--text-muted);
  z-index: 1;
}
.flip-hint {
  position: absolute; bottom: 10px; right: 14px;
  font-size: 0.62rem; color: var(--text-muted); opacity: 0.45;
  pointer-events: none;
}
.card-question { text-align: center; width: 100%; }
.card-answer { text-align: center; width: 100%; }

/* Text sizes */
.jp-text { font-size: clamp(1.3rem,4.5vw,1.8rem); font-weight: 700; color: var(--text); line-height: 1.4; }
.fr-text {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.1rem,3.8vw,1.6rem); font-weight: 500;
  color: #7ab0ff; line-height: 1.4; margin-bottom: 6px;
}
.es-text {
  font-size: clamp(1rem,3.4vw,1.45rem); font-weight: 600;
  color: #ff8a94; line-height: 1.4; margin-bottom: 6px;
}
.lang-label {
  font-size: 0.62rem; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 1px 6px; border-radius: 5px; margin-right: 4px;
}
.label-fr { background: rgba(0,85,164,0.25); color: #7ab0ff; }
.label-es { background: rgba(198,11,30,0.25); color: #ff8a94; }
.hint-text { font-size: 0.72rem; color: var(--text-muted); margin-top: 14px; opacity: 0.6; }

/* Answer dual block */
.answer-block { display: flex; flex-direction: column; gap: 16px; width: 100%; }
.lang-block {
  border-radius: 12px;
  padding: 14px 18px;
  text-align: center;
}
.lang-block-fr { background: rgba(0,55,130,0.18); border: 1px solid rgba(0,85,164,0.3); }
.lang-block-es { background: rgba(140,0,20,0.18); border: 1px solid rgba(198,11,30,0.3); }
.lang-block-jp { background: rgba(80,80,120,0.15); border: 1px solid rgba(120,130,200,0.2); }

/* Speak button */
.speak-btn {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 10px; padding: 6px 16px;
  border-radius: 16px;
  border: 1.5px solid rgba(100,200,100,0.35);
  background: rgba(100,200,100,0.08);
  color: #6dc87a;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.78rem; font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.speak-btn:hover { background: rgba(100,200,100,0.15); }
.speak-btn.playing { color: #a0ffa0; border-color: #a0ffa0; animation: pulse 0.8s infinite; }
.speak-btn.muted-state { color: var(--text-muted); border-color: rgba(120,130,160,0.3); background: transparent; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

/* ===== CONTROLS ===== */
.card-controls {
  display: flex;
  gap: 8px;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
  width: 100%;
  max-width: 720px;
}
.ctrl-btn {
  font-family: 'Noto Sans JP', sans-serif;
  padding: 9px 20px;
  border-radius: 14px;
  border: 1.5px solid var(--surface3);
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
  font-size: 0.82rem;
  font-weight: 500;
  transition: all 0.2s;
  white-space: nowrap;
}
.ctrl-btn:hover { background: var(--surface3); border-color: rgba(240,192,96,0.4); }
.ctrl-btn.primary {
  background: linear-gradient(135deg, var(--fr2), var(--es2));
  border-color: var(--gold);
  color: var(--gold);
  font-weight: 700;
}
.ctrl-btn.primary:hover { opacity: 0.9; transform: translateY(-1px); }
.ctrl-btn.mastered { background: rgba(34,150,60,0.12); border-color: rgba(34,150,60,0.4); color: #4ec96e; font-weight: 700; }
.ctrl-btn.mastered.done { background: rgba(34,150,60,0.25); color: #80ffaa; }

/* ===== COMPLETE SCREEN ===== */
.complete-screen {
  display: none;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; padding: 40px 24px;
  text-align: center;
  width: 100%;
  background: var(--surface);
  border-radius: var(--radius);
  border: 1.5px solid var(--gold);
  box-shadow: 0 0 40px rgba(240,192,96,0.1);
}
.complete-screen.show { display: flex; }
.complete-screen .big-emoji { font-size: 3rem; }
.complete-screen h2 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--gold); }
.complete-screen p { color: var(--text-muted); font-size: 0.9rem; }

footer {
  padding: 16px;
  font-size: 0.7rem;
  color: var(--text-muted);
  text-align: center;
  opacity: 0.5;
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <div class="flags">
      <div class="flag flag-fr" title="フランス語"></div>
      <span class="flag-sep">＋</span>
      <div class="flag flag-es" title="スペイン語"></div>
    </div>
    <h1><span class="fr">Français</span><span class="sep">・</span><span class="es">Español</span> <span class="jp">A2フラッシュカード</span></h1>
  </div>
  <div class="header-right">
    <button class="icon-btn" id="shuffleBtn" title="シャッフル">🔀</button>
    <button class="icon-btn" id="muteBtn" title="ミュート">🔊</button>
    <button class="icon-btn" id="resetBtn" title="覚えた記録をクリア">↺ リセット</button>
  </div>
</header>

<!-- MODE -->
<div class="mode-bar">
  <button class="mode-btn active" data-mode="jp2fr_es">🇯🇵 → 🇫🇷＆🇪🇸</button>
  <button class="mode-btn" data-mode="fr2jp_es">🇫🇷 → 🇯🇵＆🇪🇸</button>
  <button class="mode-btn" data-mode="es2jp_fr">🇪🇸 → 🇯🇵＆🇫🇷</button>
  <button class="mode-btn" data-mode="random">🎲 ランダム</button>
</div>

<!-- STATS -->
<div class="stats-bar">
  <span>全 <b id="totalCount">0</b></span>
  <span>残 <b id="remainCount">0</b></span>
  <span>✓ <b id="masteredCount">0</b></span>
  <div class="prog-wrap"><div class="prog-fill" id="progressBar" style="width:0%"></div></div>
  <span><b id="percentCount">0</b>%</span>
</div>

<!-- CATEGORY -->
<div class="cat-scroll">
  <div class="cat-inner" id="catInner"></div>
</div>

<!-- CARD AREA -->
<div class="card-area">
  <div class="flashcard-wrapper" onclick="handleCardClick()">
    <div class="flashcard" id="flashcard">
      <!-- FRONT -->
      <div class="card-face card-front">
        <div class="card-meta">
          <span class="card-cat" id="cardCat">—</span>
          <span class="card-mode-badge badge-jp" id="cardModeBadge">JP</span>
        </div>
        <span class="card-counter" id="cardCounter">1 / 1</span>
        <div class="card-question" id="cardQuestion"></div>
        <div class="flip-hint">👆 タップで答えを見る</div>
      </div>
      <!-- BACK -->
      <div class="card-face card-back">
        <div class="card-meta">
          <span class="card-cat" id="cardCatBack">—</span>
        </div>
        <span class="card-counter" id="cardCounterBack"></span>
        <div class="card-answer" id="cardAnswer"></div>
        <div class="flip-hint">👆 タップで問題に戻る</div>
      </div>
    </div>
  </div>

  <div class="complete-screen" id="completeScreen">
    <div class="big-emoji">🎉</div>
    <h2>このカテゴリー制覇！</h2>
    <p>すべてのカードを覚えました。<br>リセットしてもう一度挑戦しましょう。</p>
    <button class="ctrl-btn primary" onclick="resetAll()">↺ もう一度</button>
  </div>

  <div class="card-controls" id="cardControls">
    <button class="ctrl-btn" onclick="prevCard()">◀ 戻る</button>
    <button class="ctrl-btn" id="showBtn" onclick="revealCard()">▶ 答えを見る</button>
    <button class="ctrl-btn" id="hideBtn" onclick="unrevealCard()" style="display:none">◀ 問題に戻す</button>
    <button class="ctrl-btn mastered" id="masteredBtn" onclick="toggleMastered()">✓ 覚えた</button>
    <button class="ctrl-btn primary" onclick="nextCard()">次へ ▶</button>
  </div>
</div>

<footer>フランス語・スペイン語 A2レベル 約800例文 | CEFR A2完全カバー</footer>

// ============================================================
// STATE
// ============================================================
let cards = [];
let filteredCards = [];
let currentIndex = 0;
let masteredSet = new Set();
let mode = 'jp2fr_es';
let currentCat = 'すべて';
let isMuted = false;

// ============================================================
// AUDIO
// ============================================================
function speakText(text, lang, onDone) {
  if (isMuted) { if (onDone) onDone(); return; }
  if (!window.speechSynthesis) { if (onDone) onDone(); return; }
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = lang;
  utt.rate = 0.88;
  utt.onend = () => { if (onDone) onDone(); };
  utt.onerror = () => { if (onDone) onDone(); };
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utt);
}

function speakFR(text, onDone) { speakText(text, 'fr-FR', onDone); }
function speakES(text, onDone) { speakText(text, 'es-ES', onDone); }

function handleSpeakFR(evt) {
  evt.stopPropagation();
  const card = filteredCards[currentIndex];
  if (!card) return;
  const btn = evt.currentTarget;
  if (isMuted) { btn.textContent = '🔇 ミュート中'; return; }
  btn.classList.add('playing');
  speakFR(card.fr, () => { btn.classList.remove('playing'); btn.textContent = '🔊 FR'; });
}
function handleSpeakES(evt) {
  evt.stopPropagation();
  const card = filteredCards[currentIndex];
  if (!card) return;
  const btn = evt.currentTarget;
  if (isMuted) { btn.textContent = '🔇 ミュート中'; return; }
  btn.classList.add('playing');
  speakES(card.es, () => { btn.classList.remove('playing'); btn.textContent = '🔊 ES'; });
}

// ============================================================
// INIT
// ============================================================
function init() {
  cards = RAW_DATA.map((d, i) => ({...d, id: i}));
  buildCatButtons();
  applyFilter();
}

function buildCatButtons() {
  const cats = ['すべて', ...new Set(cards.map(c => c.cat))];
  const inner = document.getElementById('catInner');
  inner.innerHTML = '';
  cats.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (c === currentCat ? ' active' : '');
    btn.textContent = c;
    btn.onclick = () => { currentCat = c; buildCatButtons(); applyFilter(); };
    inner.appendChild(btn);
  });
}

function applyFilter() {
  filteredCards = currentCat === 'すべて' ? [...cards] : cards.filter(c => c.cat === currentCat);
  currentIndex = 0;
  renderCard();
  updateStats();
}

// ============================================================
// RENDER
// ============================================================
function getEffectiveMode() {
  if (mode === 'random') {
    const r = Math.random();
    if (r < 0.33) return 'jp2fr_es';
    if (r < 0.66) return 'fr2jp_es';
    return 'es2jp_fr';
  }
  return mode;
}

function renderCard() {
  const fc = document.getElementById('flashcard');
  const cs = document.getElementById('completeScreen');
  const cc = document.getElementById('cardControls');
  const remaining = filteredCards.filter(c => !masteredSet.has(c.id));

  if (remaining.length === 0) {
    fc.style.display = 'none';
    cc.style.display = 'none';
    cs.classList.add('show');
    return;
  }
  cs.classList.remove('show');
  fc.style.display = '';
  cc.style.display = '';

  let attempts = 0;
  while (attempts < filteredCards.length && masteredSet.has(filteredCards[currentIndex]?.id)) {
    currentIndex = (currentIndex + 1) % filteredCards.length;
    attempts++;
  }

  const card = filteredCards[currentIndex];
  if (!card) return;

  fc.classList.remove('revealed');
  setButtonsQuestion();

  const em = getEffectiveMode();
  fc.dataset.mode = em;

  const visIdx = remaining.indexOf(card) + 1;
  document.getElementById('cardCounter').textContent = `${visIdx} / ${remaining.length}`;
  document.getElementById('cardCounterBack').textContent = `${visIdx} / ${remaining.length}`;
  document.getElementById('cardCat').textContent = card.cat;
  document.getElementById('cardCatBack').textContent = card.cat;

  const badge = document.getElementById('cardModeBadge');
  if (em === 'jp2fr_es') { badge.textContent = 'JP→FR＆ES'; badge.className = 'card-mode-badge badge-jp'; }
  else if (em === 'fr2jp_es') { badge.textContent = 'FR→JP＆ES'; badge.className = 'card-mode-badge badge-fr'; }
  else { badge.textContent = 'ES→JP＆FR'; badge.className = 'card-mode-badge badge-es'; }

  const q = document.getElementById('cardQuestion');
  const a = document.getElementById('cardAnswer');

  const muted = isMuted;
  const muteClass = muted ? ' muted-state' : '';

  if (em === 'jp2fr_es') {
    q.innerHTML = `<div class="jp-text">${card.jp}</div><div class="hint-text">👆 タップして答えを見る</div>`;
    a.innerHTML = `
      <div class="answer-block">
        <div class="lang-block lang-block-fr">
          <span class="lang-label label-fr">FR</span>
          <span class="fr-text">${card.fr}</span><br>
          <button class="speak-btn${muteClass}" id="speakFrBtn" onclick="handleSpeakFR(event)">🔊 FR</button>
        </div>
        <div class="lang-block lang-block-es">
          <span class="lang-label label-es">ES</span>
          <span class="es-text">${card.es}</span><br>
          <button class="speak-btn${muteClass}" id="speakEsBtn" onclick="handleSpeakES(event)">🔊 ES</button>
        </div>
      </div>`;
  } else if (em === 'fr2jp_es') {
    q.innerHTML = `
      <div class="lang-block lang-block-fr" style="border:none;background:transparent">
        <span class="lang-label label-fr">FR</span>
        <span class="fr-text">${card.fr}</span>
      </div>
      <div class="hint-text">👆 タップして答えを見る</div>`;
    a.innerHTML = `
      <div class="answer-block">
        <div class="lang-block lang-block-jp">
          <span class="lang-label" style="background:rgba(200,200,255,0.1);color:#a0aaff;border:1px solid rgba(160,170,255,0.2)">JP</span>
          <span class="jp-text">${card.jp}</span>
        </div>
        <div class="lang-block lang-block-es">
          <span class="lang-label label-es">ES</span>
          <span class="es-text">${card.es}</span><br>
          <button class="speak-btn${muteClass}" id="speakEsBtn" onclick="handleSpeakES(event)">🔊 ES</button>
        </div>
      </div>`;
  } else {
    q.innerHTML = `
      <div class="lang-block lang-block-es" style="border:none;background:transparent">
        <span class="lang-label label-es">ES</span>
        <span class="es-text">${card.es}</span>
      </div>
      <div class="hint-text">👆 タップして答えを見る</div>`;
    a.innerHTML = `
      <div class="answer-block">
        <div class="lang-block lang-block-jp">
          <span class="lang-label" style="background:rgba(200,200,255,0.1);color:#a0aaff;border:1px solid rgba(160,170,255,0.2)">JP</span>
          <span class="jp-text">${card.jp}</span>
        </div>
        <div class="lang-block lang-block-fr">
          <span class="lang-label label-fr">FR</span>
          <span class="fr-text">${card.fr}</span><br>
          <button class="speak-btn${muteClass}" id="speakFrBtn" onclick="handleSpeakFR(event)">🔊 FR</button>
        </div>
      </div>`;
  }
  // Sync wrapper height to taller face after a short delay
  setTimeout(() => {
    const front = document.querySelector('.card-front');
    const back  = document.querySelector('.card-back');
    const wrapper = document.querySelector('.flashcard-wrapper');
    if (front && back && wrapper) {
      const h = Math.max(front.scrollHeight, back.scrollHeight, 260);
      wrapper.style.height = h + 'px';
      document.getElementById('flashcard').style.minHeight = h + 'px';
      front.style.minHeight = h + 'px';
      back.style.minHeight  = h + 'px';
    }
  }, 20);
}

// ============================================================
// CARD ACTIONS
// ============================================================
function handleCardClick() {
  const fc = document.getElementById('flashcard');
  if (!fc.classList.contains('revealed')) revealCard();
  else unrevealCard();
}

function revealCard() {
  const fc = document.getElementById('flashcard');
  if (fc.classList.contains('revealed')) return;
  fc.classList.add('revealed');
  setButtonsAnswer();
  // Auto-play answer
  const em = fc.dataset.mode;
  const card = filteredCards[currentIndex];
  if (!card || isMuted) return;
  if (em === 'jp2fr_es') {
    speakFR(card.fr, () => setTimeout(() => speakES(card.es), 400));
  } else if (em === 'fr2jp_es') {
    speakES(card.es, null);
  } else {
    speakFR(card.fr, null);
  }
}

function unrevealCard() {
  const fc = document.getElementById('flashcard');
  if (!fc.classList.contains('revealed')) return;
  fc.classList.remove('revealed');
  setButtonsQuestion();
}

function setButtonsQuestion() {
  document.getElementById('showBtn').style.display = '';
  document.getElementById('hideBtn').style.display = 'none';
  updateMasteredBtn();
}
function setButtonsAnswer() {
  document.getElementById('showBtn').style.display = 'none';
  document.getElementById('hideBtn').style.display = '';
  updateMasteredBtn();
}
function updateMasteredBtn() {
  const card = filteredCards[currentIndex];
  const btn = document.getElementById('masteredBtn');
  if (card && masteredSet.has(card.id)) {
    btn.classList.add('done');
    btn.textContent = '✓ 覚えた済';
  } else {
    btn.classList.remove('done');
    btn.textContent = '✓ 覚えた';
  }
}

function nextCard() {
  if (filteredCards.filter(c => !masteredSet.has(c.id)).length === 0) return;
  currentIndex = (currentIndex + 1) % filteredCards.length;
  let a = 0;
  while (masteredSet.has(filteredCards[currentIndex]?.id) && a < filteredCards.length) {
    currentIndex = (currentIndex + 1) % filteredCards.length; a++;
  }
  renderCard();
}

function prevCard() {
  if (filteredCards.filter(c => !masteredSet.has(c.id)).length === 0) return;
  currentIndex = (currentIndex - 1 + filteredCards.length) % filteredCards.length;
  let a = 0;
  while (masteredSet.has(filteredCards[currentIndex]?.id) && a < filteredCards.length) {
    currentIndex = (currentIndex - 1 + filteredCards.length) % filteredCards.length; a++;
  }
  renderCard();
}

function toggleMastered() {
  const card = filteredCards[currentIndex];
  if (!card) return;
  if (masteredSet.has(card.id)) masteredSet.delete(card.id);
  else masteredSet.add(card.id);
  updateStats();
  updateMasteredBtn();
  setTimeout(() => nextCard(), 300);
}

function resetAll() {
  masteredSet.clear();
  currentIndex = 0;
  renderCard();
  updateStats();
}

function updateStats() {
  const total = filteredCards.length;
  const mastered = filteredCards.filter(c => masteredSet.has(c.id)).length;
  const remain = total - mastered;
  const pct = total > 0 ? Math.round(mastered / total * 100) : 0;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('remainCount').textContent = remain;
  document.getElementById('masteredCount').textContent = mastered;
  document.getElementById('percentCount').textContent = pct;
  document.getElementById('progressBar').style.width = pct + '%';
}

// ============================================================
// CONTROLS
// ============================================================
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    renderCard();
  });
});

document.getElementById('shuffleBtn').addEventListener('click', () => {
  filteredCards.sort(() => Math.random() - 0.5);
  currentIndex = 0;
  renderCard();
  const b = document.getElementById('shuffleBtn');
  b.textContent = '✅';
  setTimeout(() => b.textContent = '🔀', 800);
});

document.getElementById('muteBtn').addEventListener('click', () => {
  isMuted = !isMuted;
  document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊';
  document.getElementById('muteBtn').classList.toggle('muted', isMuted);
  if (isMuted && window.speechSynthesis) window.speechSynthesis.cancel();
  // update speak buttons
  document.querySelectorAll('.speak-btn').forEach(b => {
    b.classList.toggle('muted-state', isMuted);
    b.classList.remove('playing');
    if (isMuted) b.textContent = '🔇 ミュート中';
    else if (b.id === 'speakFrBtn') b.textContent = '🔊 FR';
    else b.textContent = '🔊 ES';
  });
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('覚えた記録をすべてクリアしますか？')) resetAll();
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextCard();
  else if (e.key === 'ArrowLeft') prevCard();
  else if (e.key === 'Enter') revealCard();
  else if (e.key === 'c' || e.key === 'C') toggleMastered();
});

init();
</script>
</body>
</html>
