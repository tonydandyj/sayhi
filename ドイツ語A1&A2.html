<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🇩🇪 ドイツ語 フラッシュカード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&family=M+PLUS+Rounded+1c:wght@400;500;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --black:     #1a1a1a;
  --red:       #cc0000;
  --gold:      #ffcc00;
  --cream:     #fffdf0;
  --forest:    #2d5016;
  --text:      #1a1a2e;
  --text-mid:  #3d3d5c;
  --text-muted:#7a7a9a;
  --glass:     rgba(255,255,255,0.84);
  --glass2:    rgba(255,255,255,0.55);
  --border:    rgba(204,0,0,0.18);
  --border2:   rgba(204,0,0,0.35);
  --jp:        'M PLUS Rounded 1c', 'Nunito', sans-serif;
  --foreign:   'Noto Sans', 'Nunito', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--jp);
  background: linear-gradient(145deg,#fffbe8 0%,#fff3cd 40%,#ffe8a0 100%);
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* ===== HEADER ===== */
header{
  width:100%;
  background:linear-gradient(135deg,#1a1a1a 0%,#2d2d2d 60%,#1a0a0a 100%);
  padding:8px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
  box-shadow:0 3px 16px rgba(0,0,0,0.35);
  z-index:10;
}
.header-title{
  font-family:var(--foreign);
  font-weight:800;
  font-size:clamp(0.9rem,2.8vw,1.15rem);
  color:#ffcc00;
  letter-spacing:0.03em;
  display:flex;align-items:center;gap:6px;
}
.header-title span{color:#fff;font-weight:600;font-size:0.9em;}
.header-btns{display:flex;gap:6px;}
.hbtn{
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,204,0,0.25);
  border-radius:8px;
  color:#ffcc00;
  font-size:1rem;
  width:34px;height:34px;
  cursor:pointer;
  transition:all .18s;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);
}
.hbtn:hover{background:rgba(255,204,0,0.18);transform:scale(1.08);}
.hbtn:active{transform:scale(.92);}

/* ===== MODE SELECTOR ===== */
.mode-bar{
  display:flex;gap:7px;padding:7px 16px 5px;flex-shrink:0;
  width:100%;max-width:700px;
}
.mode-btn{
  flex:1;padding:6px 0;border-radius:50px;border:none;cursor:pointer;
  font-family:var(--jp);font-size:0.8rem;font-weight:700;
  background:var(--glass);color:var(--text-mid);
  border:1.5px solid var(--border);
  transition:all .2s;backdrop-filter:blur(8px);
  box-shadow:0 2px 8px rgba(0,0,0,0.07);
}
.mode-btn.active{
  background:linear-gradient(135deg,#1a1a1a 0%,#cc0000 100%);
  color:#ffcc00;border-color:transparent;
  box-shadow:0 3px 12px rgba(204,0,0,0.3);
}
.mode-btn:hover:not(.active){background:rgba(255,204,0,0.2);transform:translateY(-1px);}

/* ===== STATS ===== */
.stats-bar{
  display:flex;align-items:center;gap:8px;
  padding:4px 16px;flex-shrink:0;
  font-size:0.72rem;color:var(--text-mid);font-weight:600;
  width:100%;max-width:700px;
}
.stats-bar span{white-space:nowrap;}
.progress-wrap{flex:1;background:rgba(204,0,0,0.1);border-radius:4px;height:6px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#cc0000,#ffcc00);border-radius:4px;transition:width .4s ease;}
.pct{color:var(--red);font-weight:700;}

/* ===== CATEGORY SCROLL ===== */
.cat-scroll{
  overflow-x:auto;display:flex;gap:7px;
  padding:5px 16px 10px;flex-shrink:0;
  width:100%;max-width:700px;
  scrollbar-width:thin;
  scrollbar-color:var(--gold) rgba(204,0,0,.12);
}
.cat-scroll::-webkit-scrollbar{height:5px;}
.cat-scroll::-webkit-scrollbar-track{background:rgba(204,0,0,.10);border-radius:4px;}
.cat-scroll::-webkit-scrollbar-thumb{background:var(--gold);border-radius:4px;}
.cat-scroll::-webkit-scrollbar-thumb:hover{background:var(--red);}
.cat-pill{
  white-space:nowrap;padding:4px 12px;border-radius:50px;
  font-size:0.72rem;font-weight:700;border:none;cursor:pointer;
  background:var(--glass);color:var(--text-mid);
  border:1.5px solid var(--border);
  transition:all .18s;backdrop-filter:blur(6px);
  box-shadow:0 2px 6px rgba(0,0,0,0.06);
}
.cat-pill.active{
  background:linear-gradient(135deg,#1a1a1a 0%,#a00000 100%);
  color:#ffcc00;border-color:transparent;
  box-shadow:0 3px 10px rgba(204,0,0,0.28);
}
.cat-pill:hover:not(.active){background:rgba(255,204,0,0.2);transform:translateY(-1px);}

/* ===== CARD AREA ===== */
.card-area{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:0 16px;min-height:0;overflow:hidden;
  width:100%;max-width:700px;
}
.card{
  background:var(--glass);
  backdrop-filter:blur(18px);
  border-radius:20px;
  border:1px solid var(--border2);
  box-shadow:0 8px 32px rgba(204,0,0,0.12),0 2px 8px rgba(0,0,0,0.08);
  width:100%;max-width:680px;
  overflow:hidden;
  cursor:pointer;
  transition:transform .2s,box-shadow .2s;
  position:relative;
}
.card:hover{transform:translateY(-3px) scale(1.005);box-shadow:0 14px 40px rgba(204,0,0,0.18);}
.card:active{transform:scale(.98);}
.card-accent{
  height:4px;
  background:linear-gradient(90deg,#1a1a1a 33.3%,#cc0000 33.3% 66.6%,#ffcc00 66.6%);
}
.card-top{
  display:flex;justify-content:space-between;align-items:center;
  padding:9px 14px 4px;
}
.card-cat-label{
  font-size:0.68rem;font-weight:700;
  background:linear-gradient(135deg,rgba(26,26,26,0.1),rgba(204,0,0,0.1));
  color:var(--text-mid);padding:2px 9px;border-radius:50px;
  border:1px solid var(--border);
}
.card-counter{font-size:0.72rem;color:var(--text-muted);font-weight:600;}
.card-body{
  padding:12px 20px 16px;
  display:flex;flex-direction:column;align-items:center;text-align:center;
  min-height:130px;justify-content:center;
}
.card-question{
  font-family:var(--foreign);
  font-size:clamp(1.4rem,5vw,2.2rem);
  font-weight:700;color:var(--text);
  line-height:1.3;margin-bottom:8px;
}
.card-question.jp{
  font-family:var(--jp);
  font-size:clamp(1.1rem,4vw,1.7rem);
}
.card-hint{font-size:0.75rem;color:var(--text-muted);margin-top:4px;}
.card-answer{
  font-family:var(--foreign);
  font-size:clamp(1.3rem,4.5vw,2rem);
  font-weight:700;color:var(--red);
  line-height:1.3;margin-bottom:8px;
}
.card-answer.jp{
  font-family:var(--jp);
  font-size:clamp(1.1rem,3.5vw,1.6rem);
}
.card-divider{width:60px;height:2px;background:linear-gradient(90deg,#cc0000,#ffcc00);border-radius:2px;margin:8px auto;}
.speak-btn{
  background:linear-gradient(135deg,rgba(204,0,0,0.12),rgba(255,204,0,0.12));
  border:1.5px solid var(--border2);
  border-radius:50px;padding:5px 14px;
  font-size:0.82rem;cursor:pointer;color:var(--text-mid);
  transition:all .18s;margin-top:4px;
  display:flex;align-items:center;gap:5px;
  backdrop-filter:blur(6px);
}
.speak-btn:hover{background:rgba(255,204,0,0.25);transform:translateY(-1px);}
.speak-btn.playing{animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(204,0,0,0.3);}50%{box-shadow:0 0 0 7px rgba(204,0,0,0);}}

/* ===== CONTROLS ===== */
.controls{
  display:flex;gap:6px;padding:6px 16px 8px;flex-shrink:0;
  width:100%;max-width:700px;
}
.ctrl-btn{
  flex:1;padding:8px 4px;border-radius:12px;border:none;cursor:pointer;
  font-family:var(--jp);font-size:0.75rem;font-weight:700;
  transition:all .18s;backdrop-filter:blur(8px);
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}
.ctrl-btn:active{transform:scale(.93);}
.btn-prev,.btn-revert{background:var(--glass);color:var(--text-mid);border:1.5px solid var(--border);}
.btn-prev:hover,.btn-revert:hover{background:rgba(255,204,0,0.2);}
.btn-reveal{
  background:linear-gradient(135deg,#a00000 0%,#cc0000 100%);
  color:#fff;border:none;
  box-shadow:0 3px 12px rgba(204,0,0,0.3);
}
.btn-reveal:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(204,0,0,0.4);}
.btn-check{
  background:linear-gradient(135deg,#2d5016 0%,#3d7020 100%);
  color:#fff;border:none;
  box-shadow:0 3px 12px rgba(45,80,22,0.3);
}
.btn-check:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(45,80,22,0.4);}
.btn-check.checked{background:linear-gradient(135deg,#555,#777);box-shadow:none;}
.btn-next{
  background:linear-gradient(135deg,#cc9900 0%,#ffcc00 100%);
  color:#1a1a1a;border:none;
  box-shadow:0 3px 12px rgba(255,204,0,0.3);
}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(255,204,0,0.4);}

/* ===== KEYBOARD HINT ===== */
.kb-hint{
  text-align:center;font-size:0.62rem;color:var(--text-muted);
  padding:2px 16px 6px;flex-shrink:0;
  width:100%;max-width:700px;
}

/* ===== MODAL ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(26,26,26,0.65);
  backdrop-filter:blur(4px);z-index:100;
  display:none;align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--cream);
  border-radius:18px;
  width:min(94vw,620px);
  max-height:88vh;
  display:flex;flex-direction:column;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
.modal-header{
  background:linear-gradient(135deg,#1a1a1a 0%,#cc0000 100%);
  padding:14px 16px;
  display:flex;align-items:center;gap:10px;
}
.modal-title{font-family:var(--foreign);font-weight:800;color:#ffcc00;font-size:1rem;}
.modal-search{
  flex:1;padding:6px 12px;border-radius:50px;border:none;
  font-family:var(--jp);font-size:0.82rem;
  background:rgba(255,255,255,0.18);color:#fff;
  outline:none;
}
.modal-search::placeholder{color:rgba(255,255,255,0.5);}
.modal-close{
  background:rgba(255,255,255,0.15);border:none;border-radius:50%;
  width:30px;height:30px;cursor:pointer;color:#fff;font-size:1rem;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.modal-close:hover{background:rgba(255,255,255,0.3);}
.modal-body{overflow-y:auto;padding:0 0 10px;}
.modal-cat-header{
  font-weight:700;font-size:0.72rem;color:var(--red);
  padding:10px 14px 4px;text-transform:uppercase;letter-spacing:0.08em;
  border-bottom:1px solid var(--border);
}
.modal-row{
  display:flex;gap:8px;padding:7px 14px;
  cursor:pointer;transition:background .15s;align-items:flex-start;
  border-bottom:1px solid rgba(204,0,0,0.06);
}
.modal-row:hover{background:rgba(255,204,0,0.12);}
.modal-row.mastered{opacity:0.38;}
.modal-de{font-family:var(--foreign);font-weight:600;font-size:0.84rem;color:var(--text);flex:1;}
.modal-ja{font-size:0.78rem;color:var(--text-mid);flex:1;}

/* ===== COMPLETE OVERLAY ===== */
.complete-overlay{
  position:fixed;inset:0;
  background:rgba(255,252,220,0.88);
  backdrop-filter:blur(12px);
  z-index:200;
  display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:10px;
}
.complete-overlay.show{display:flex;}
.complete-icon{font-size:3.5rem;}
.complete-text{font-size:1.3rem;font-weight:800;color:var(--red);}
.complete-sub{font-size:0.85rem;color:var(--text-mid);}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-title">🇩🇪 <span>ドイツ語</span> フラッシュカード</div>
  <div class="header-btns">
    <button class="hbtn" id="btnList" title="一覧">📋</button>
    <button class="hbtn" id="btnReset" title="リセット">🔄</button>
    <button class="hbtn" id="btnShuffle" title="シャッフル">🔀</button>
    <button class="hbtn" id="btnMute" title="ミュート">🔊</button>
  </div>
</header>

<!-- MODE -->
<div class="mode-bar">
  <button class="mode-btn active" data-mode="ja2de">和 → 独</button>
  <button class="mode-btn" data-mode="de2ja">独 → 和</button>
  <button class="mode-btn" data-mode="random">🎲 ランダム</button>
</div>

<!-- STATS -->
<div class="stats-bar">
  <span id="statTotal">全0件</span>
  <span id="statRem">残り0件</span>
  <span id="statDone">✓0件</span>
  <div class="progress-wrap"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <span class="pct" id="statPct">0%</span>
</div>

<!-- CATEGORY SCROLL -->
<div class="cat-scroll" id="catScroll"></div>

<!-- CARD -->
<div class="card-area">
  <div class="card" id="mainCard">
    <div class="card-accent"></div>
    <div class="card-top">
      <span class="card-cat-label" id="cardCat">–</span>
      <span class="card-counter" id="cardCounter">0 / 0</span>
    </div>
    <div class="card-body" id="cardBody">
      <div class="card-question" id="cardQ"></div>
      <div class="card-hint" id="cardHint">👆 タップして答えを見る</div>
    </div>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <button class="ctrl-btn btn-prev" id="btnPrev">← 戻る</button>
  <button class="ctrl-btn btn-reveal" id="btnReveal">▶ 表示</button>
  <button class="ctrl-btn btn-revert" id="btnRevert">◀ 戻す</button>
  <button class="ctrl-btn btn-check" id="btnCheck">✓ 覚えた</button>
  <button class="ctrl-btn btn-next" id="btnNext">次へ →</button>
</div>

<!-- KB HINT -->
<div class="kb-hint">→ 次へ ／ ← 戻る ／ Enter 答えを見る ／ C 覚えた</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">📋 例文一覧</span>
      <input class="modal-search" id="modalSearch" placeholder="検索…" autocomplete="off">
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- COMPLETE OVERLAY -->
<div class="complete-overlay" id="completeOverlay">
  <div class="complete-icon">🏆</div>
  <div class="complete-text">全カード完了！</div>
  <div class="complete-sub">チェックを解除してもう一度挑戦しましょう</div>
</div>

// ===== APP STATE =====
const LS_KEY = 'german_mastered_v1';
let cards = [];
let filtered = [];
let currentIdx = 0;
let currentCat = 'すべて';
let currentMode = 'ja2de';
let revealed = false;
let mastered = new Set();
let isMuted = false;
let isSpeaking = false;

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function loadMastered() {
  try {
    const d = localStorage.getItem(LS_KEY);
    if (d) mastered = new Set(JSON.parse(d));
  } catch(e) { mastered = new Set(); }
}
function saveMastered() {
  try { localStorage.setItem(LS_KEY, JSON.stringify([...mastered])); } catch(e){}
}

function init() {
  loadMastered();
  cards = CARDS_RAW.map((d, i) => ({ ...d, _id: d.id || i }));
  buildCatButtons();
  applyFilter();
  updateStats();
  renderCard();
}

function buildCatButtons() {
  const cats = ['すべて', ...new Set(cards.map(c => c.cat))];
  const scroll = document.getElementById('catScroll');
  scroll.innerHTML = '';
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-pill' + (cat === currentCat ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => selectCat(cat);
    scroll.appendChild(btn);
  });
}

function selectCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-pill').forEach(b => {
    b.classList.toggle('active', b.textContent === cat);
  });
  applyFilter();
  currentIdx = 0;
  revealed = false;
  renderCard();
  updateStats();
}

function applyFilter() {
  if (currentCat === 'すべて') {
    filtered = [...cards];
  } else {
    filtered = cards.filter(c => c.cat === currentCat);
  }
}

function updateStats() {
  const total = filtered.length;
  const done = filtered.filter(c => mastered.has(c._id)).length;
  const rem = total - done;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('statTotal').textContent = `全${total}件`;
  document.getElementById('statRem').textContent = `残り${rem}件`;
  document.getElementById('statDone').textContent = `✓${done}件`;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('statPct').textContent = pct + '%';
}

function getCard() {
  return filtered[currentIdx] || null;
}

function getEffectiveMode(card) {
  if (currentMode === 'random') return Math.random() < 0.5 ? 'ja2de' : 'de2ja';
  return currentMode;
}

function renderCard() {
  const card = getCard();
  const body = document.getElementById('cardBody');
  const qEl = document.getElementById('cardQ');
  const catLbl = document.getElementById('cardCat');
  const counter = document.getElementById('cardCounter');

  if (!card) {
    catLbl.textContent = '–';
    counter.textContent = '0 / 0';
    body.innerHTML = '<div class="card-question">カードがありません</div>';
    return;
  }

  catLbl.textContent = card.cat;
  counter.textContent = `${currentIdx + 1} / ${filtered.length}`;

  const isMastered = mastered.has(card._id);
  document.getElementById('btnCheck').classList.toggle('checked', isMastered);

  if (!revealed) {
    const mode = getEffectiveMode(card);
    const qText = mode === 'ja2de' ? card.ja : card.foreign;
    const isJp = mode === 'ja2de';
    body.innerHTML = `
      <div class="card-question${isJp ? ' jp' : ''}" id="cardQ">${escHtml(qText)}</div>
      <div class="card-hint">👆 タップして答えを見る</div>
    `;
  } else {
    const mode = getEffectiveMode(card);
    const qText = mode === 'ja2de' ? card.ja : card.foreign;
    const aText = mode === 'ja2de' ? card.foreign : card.ja;
    const qIsJp = mode === 'ja2de';
    const aIsJp = mode === 'de2ja';
    body.innerHTML = `
      <div class="card-question${qIsJp ? ' jp' : ''}">${escHtml(qText)}</div>
      <div class="card-divider"></div>
      <div class="card-answer${aIsJp ? ' jp' : ''}" id="cardA">${escHtml(aText)}</div>
      <button class="speak-btn" id="speakBtn" onclick="event.stopPropagation();speakAnswer()">🔊 読み上げ</button>
    `;
  }
}

function revealCard() {
  if (revealed) {
    revealed = false;
    renderCard();
    return;
  }
  revealed = true;
  renderCard();
  speakAnswer();
}

function speakAnswer() {
  const card = getCard();
  if (!card) return;
  const mode = getEffectiveMode(card);
  const btn = document.getElementById('speakBtn');
  if (btn) { btn.classList.add('playing'); }
  const onDone = () => {
    if (btn) btn.classList.remove('playing');
  };
  if (mode === 'ja2de') {
    speakForeign(card.foreign, onDone);
  } else {
    speakJapanese(card.ja, onDone);
  }
}

function speakForeign(text, onDone) {
  if (isMuted) { if (onDone) onDone(); return; }
  window.speechSynthesis.cancel();
  function doSpeak(lang) {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = 0.8;
    u.pitch = 1.0;
    u.onend = () => { if (onDone) onDone(); };
    u.onerror = () => { if (onDone) onDone(); };
    window.speechSynthesis.speak(u);
  }
  const voices = window.speechSynthesis.getVoices();
  const preferred = ['de-DE', 'de', 'en-US'];
  let chosen = null;
  for (const lang of preferred) {
    const v = voices.find(v => v.lang === lang || v.lang.startsWith('de'));
    if (v) { chosen = v.lang; break; }
  }
  doSpeak(chosen || 'de-DE');
}

function speakJapanese(text, onDone) {
  if (isMuted) { if (onDone) onDone(); return; }
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  u.rate = 0.85;
  u.onend = () => { if (onDone) onDone(); };
  u.onerror = () => { if (onDone) onDone(); };
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

function nextCard() {
  window.speechSynthesis.cancel();
  let next = currentIdx + 1;
  let count = 0;
  while (next < filtered.length) {
    if (!mastered.has(filtered[next]._id)) break;
    next++;
    count++;
    if (count > filtered.length) break;
  }
  if (next >= filtered.length) {
    // check if all mastered
    const allDone = filtered.every(c => mastered.has(c._id));
    if (allDone) {
      showComplete();
      return;
    }
    next = 0;
    while (next < filtered.length && mastered.has(filtered[next]._id)) next++;
  }
  currentIdx = next;
  revealed = false;
  renderCard();
}

function prevCard() {
  window.speechSynthesis.cancel();
  let prev = currentIdx - 1;
  if (prev < 0) prev = filtered.length - 1;
  currentIdx = prev;
  revealed = false;
  renderCard();
}

function checkCard() {
  const card = getCard();
  if (!card) return;
  if (mastered.has(card._id)) return;
  mastered.add(card._id);
  saveMastered();
  updateStats();
  document.getElementById('btnCheck').classList.add('checked');
  setTimeout(() => nextCard(), 300);
}

function showComplete() {
  const ov = document.getElementById('completeOverlay');
  ov.classList.add('show');
  setTimeout(() => {
    mastered.clear();
    saveMastered();
    updateStats();
    currentIdx = 0;
    revealed = false;
    renderCard();
    ov.classList.remove('show');
  }, 1800);
}

// Header buttons
document.getElementById('btnList').onclick = openModal;
document.getElementById('btnReset').onclick = () => {
  if (mastered.size === 0) return;
  mastered.clear();
  saveMastered();
  currentIdx = 0;
  revealed = false;
  updateStats();
  renderCard();
  const btn = document.getElementById('btnReset');
  btn.textContent = '✅';
  setTimeout(() => btn.textContent = '🔄', 800);
};
document.getElementById('btnShuffle').onclick = () => {
  for (let i = filtered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
  }
  currentIdx = 0;
  revealed = false;
  renderCard();
  const btn = document.getElementById('btnShuffle');
  btn.textContent = '✅';
  setTimeout(() => btn.textContent = '🔀', 800);
};
document.getElementById('btnMute').onclick = () => {
  isMuted = !isMuted;
  document.getElementById('btnMute').textContent = isMuted ? '🔇' : '🔊';
  if (isMuted) window.speechSynthesis.cancel();
};

// Mode buttons
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.onclick = () => {
    currentMode = btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    revealed = false;
    renderCard();
  };
});

// Controls
document.getElementById('mainCard').onclick = revealCard;
document.getElementById('btnReveal').onclick = (e) => { e.stopPropagation(); if(!revealed){revealed=true;renderCard();speakAnswer();} };
document.getElementById('btnRevert').onclick = (e) => { e.stopPropagation(); revealed=false; renderCard(); };
document.getElementById('btnPrev').onclick = (e) => { e.stopPropagation(); prevCard(); };
document.getElementById('btnNext').onclick = (e) => { e.stopPropagation(); nextCard(); };
document.getElementById('btnCheck').onclick = (e) => { e.stopPropagation(); checkCard(); };

// Keyboard
document.addEventListener('keydown', e => {
  if (document.getElementById('modalOverlay').classList.contains('open')) {
    if (e.key === 'Escape') closeModal();
    return;
  }
  if (e.key === 'ArrowRight') nextCard();
  else if (e.key === 'ArrowLeft') prevCard();
  else if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); revealCard(); }
  else if (e.key === 'c' || e.key === 'C') checkCard();
});

// Modal
function openModal() {
  buildModal('');
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('modalSearch').value = '';
  document.getElementById('modalSearch').focus();
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
document.getElementById('modalClose').onclick = closeModal;
document.getElementById('modalOverlay').onclick = (e) => { if(e.target===document.getElementById('modalOverlay')) closeModal(); };
document.getElementById('modalSearch').oninput = (e) => buildModal(e.target.value);

function buildModal(query) {
  const q = query.trim().toLowerCase();
  const body = document.getElementById('modalBody');
  const cats = [...new Set(cards.map(c => c.cat))];
  let html = '';
  cats.forEach(cat => {
    const items = cards.filter(c => c.cat === cat && (
      !q || c.foreign.toLowerCase().includes(q) || c.ja.includes(q)
    ));
    if (items.length === 0) return;
    html += `<div class="modal-cat-header">${escHtml(cat)}</div>`;
    items.forEach(c => {
      const isMast = mastered.has(c._id);
      html += `<div class="modal-row${isMast?' mastered':''}" data-id="${escHtml(c._id)}">
        <span class="modal-de">${escHtml(c.foreign)}</span>
        <span class="modal-ja">${escHtml(c.ja)}</span>
      </div>`;
    });
  });
  body.innerHTML = html;
  body.querySelectorAll('.modal-row').forEach(row => {
    row.onclick = () => {
      const id = row.dataset.id;
      const cardIdx = cards.findIndex(c => String(c._id) === String(id));
      if (cardIdx < 0) return;
      const targetCat = cards[cardIdx].cat;
      if (currentCat !== targetCat && currentCat !== 'すべて') {
        selectCat('すべて');
      }
      const filtIdx = filtered.findIndex(c => String(c._id) === String(id));
      if (filtIdx >= 0) {
        currentIdx = filtIdx;
        revealed = false;
        renderCard();
      }
      closeModal();
    };
  });
}

init();
window.speechSynthesis.onvoiceschanged = function(){};
</script>
