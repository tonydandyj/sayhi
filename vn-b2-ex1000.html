<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇻🇳 ベトナム語B2レベル重要頻出語彙 1000例文集</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&family=M+PLUS+Rounded+1c:wght@400;500;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
/* =====================================================
   🇻🇳 ベトナム語 B1 — ホイアンのランタン祭りテーマ
   コンセプト: 旧市街の石畳・シルクランタンの暖光・
               古い瓦屋根越しに見える満月
   ===================================================== */
:root {
  /* ── パレット ── */
  --teal:       #00b4aa;   /* ホイアン水路ティール */
  --lantern:    #ff9a3c;   /* ランタンオレンジ */
  --amber:      #ffd166;   /* 月光アンバー */
  --silk:       #e85d9a;   /* シルクピンク（✓覚えた） */
  --jade:       #06d6a0;   /* ジェードグリーン（✓完了） */

  /* ── テキスト ── */
  --text:       #f5f0e8;   /* 暖かいオフホワイト */
  --text-mid:   #c8bfaa;   /* 旧紙色ミッド */
  --text-muted: #7a7060;   /* くすんだセピア */

  /* ── サーフェス ── */
  --bg:         #0d0c0a;   /* 深夜の石畳 */
  --surface:    #161310;   /* 暗い木材色 */
  --surface2:   #1f1b15;   /* カード背景 */
  --glass:      rgba(31,27,21,0.90);
  --glass2:     rgba(31,27,21,0.65);
  --border:     rgba(255,154,60,0.18);
  --border2:    rgba(255,154,60,0.32);

  /* ── フォント ── */
  --jp:         'M PLUS Rounded 1c', 'Nunito', sans-serif;
  --foreign:    'Noto Sans', 'Nunito', sans-serif;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}

body{
  background: linear-gradient(160deg, #0d0c0a 0%, #12100d 35%, #161310 70%, #0d0c0a 100%);
  color:var(--text);
  font-family:var(--jp);
  display:flex;flex-direction:column;height:100dvh;
  position:relative;
  align-items:center;
}

/* 背景装飾（ランタングロー） */
body::before{
  content:'';
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 65% 40% at 20% 15%,  rgba(255,154,60,.10) 0%, transparent 70%),
    radial-gradient(ellipse 50% 45% at 80% 80%,  rgba(0,180,170,.08) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 55% 50%,  rgba(232,93,154,.05) 0%, transparent 80%);
}
body > *{position:relative;z-index:1}

/* ── アプリラッパー ── */
#app{
  width:100%;max-width:640px;
  display:flex;flex-direction:column;
  height:100dvh;overflow:hidden;
  flex-shrink:0;
}

/* ── ヘッダー ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 16px;
  background: linear-gradient(135deg, #1a1005 0%, #241808 50%, #1a1205 100%);
  border-bottom: 2px solid rgba(255,154,60,.35);
  position:sticky;top:0;z-index:10;flex-shrink:0;
  width:100%;
  box-shadow: 0 3px 20px rgba(255,154,60,.18), 0 1px 0 rgba(255,209,102,.15);
}
.logo{
  font-size:.95rem;font-weight:800;color:var(--lantern);
  display:flex;align-items:center;gap:7px;letter-spacing:.03em;
  text-shadow:0 0 14px rgba(255,154,60,.55);
}
.hbtns{display:flex;gap:6px}
.hbtn{
  background:rgba(255,154,60,.14);
  border:1px solid rgba(255,154,60,.32);
  color:var(--lantern);
  width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;
  transition:background .18s,transform .12s;
  backdrop-filter:blur(6px);
}
.hbtn:hover{background:rgba(255,154,60,.28);transform:scale(1.08)}
.hbtn:active{transform:scale(.95)}
.hbtn.active-flash{background:var(--jade);border-color:var(--jade);color:#0a1a14}
.hbtn.auto-on{
  background:linear-gradient(135deg,var(--teal),#007a72);
  border-color:var(--teal);color:#fff;
  box-shadow:0 0 10px rgba(0,180,170,.55);
  animation:auto-pulse 1.4s ease-in-out infinite;
}
@keyframes auto-pulse{
  0%,100%{box-shadow:0 0 6px rgba(0,180,170,.50);}
  50%{box-shadow:0 0 18px rgba(0,180,170,.90);}
}

/* ── モードボタン ── */
.mode-row{display:flex;gap:8px;padding:8px 14px;flex-shrink:0}
.mbtn{
  flex:1;padding:7px 4px;border-radius:22px;
  border:1.5px solid var(--border2);
  background:var(--glass2);
  color:var(--text-mid);
  cursor:pointer;font-family:var(--jp);font-size:.82rem;font-weight:700;
  transition:.2s;backdrop-filter:blur(4px);
}
.mbtn:hover{border-color:var(--lantern);color:var(--lantern);background:rgba(255,154,60,.10)}
.mbtn.active{
  background:linear-gradient(135deg, var(--teal), #007a72);
  color:#fff;border-color:var(--teal);
  box-shadow:0 3px 12px rgba(0,180,170,.40);
}

/* ── 統計バー ── */
.stats{
  display:flex;align-items:center;gap:8px;
  padding:4px 16px;flex-shrink:0;font-size:.74rem;color:var(--text-muted);
}
.stat-num{color:var(--lantern);font-weight:700}
.prog-wrap{flex:1;background:rgba(255,154,60,.12);border-radius:6px;height:6px;overflow:hidden}
.prog-bar{
  height:100%;
  background:linear-gradient(90deg, var(--teal), var(--lantern), var(--amber));
  border-radius:6px;transition:width .5s cubic-bezier(.4,0,.2,1);
}
.stat-pct{color:var(--teal);font-weight:800;min-width:34px;text-align:right}

/* ── カテゴリスクロール ── */
.cat-scroll{
  overflow-x:auto;display:flex;gap:7px;
  padding:5px 14px 10px;flex-shrink:0;
  scrollbar-width:thin;
  scrollbar-color:var(--lantern) rgba(255,154,60,.10);
}
.cat-scroll::-webkit-scrollbar{height:5px}
.cat-scroll::-webkit-scrollbar-track{background:rgba(255,154,60,.08);border-radius:4px}
.cat-scroll::-webkit-scrollbar-thumb{background:rgba(255,154,60,.45);border-radius:4px}
.cat-scroll::-webkit-scrollbar-thumb:hover{background:var(--lantern)}
.cpill{
  flex-shrink:0;padding:5px 13px;border-radius:22px;
  border:1.5px solid var(--border2);
  background:rgba(31,27,21,.70);
  color:var(--text-mid);
  cursor:pointer;font-size:.74rem;font-family:var(--jp);font-weight:600;
  transition:.18s;backdrop-filter:blur(4px);white-space:nowrap;
}
.cpill:hover{
  border-color:var(--lantern);color:var(--lantern);
  background:rgba(255,154,60,.10);
  box-shadow:0 2px 8px rgba(255,154,60,.18);
}
.cpill.active{
  background:linear-gradient(135deg, var(--teal), #007a72);
  border-color:var(--teal);color:#fff;
  box-shadow:0 2px 10px rgba(0,180,170,.40);
}

/* ── カードエリア ── */
.card-area{flex:1;display:flex;align-items:center;justify-content:center;padding:6px 14px;min-height:0}
.card{
  width:100%;max-width:560px;
  background:rgba(31,27,21,.85);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border:1.5px solid rgba(255,154,60,.22);
  border-radius:24px;
  padding:20px 22px 18px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:transform .18s cubic-bezier(.4,0,.2,1), box-shadow .18s;
  box-shadow:
    0 8px 32px rgba(0,0,0,.50),
    0 2px 8px rgba(0,0,0,.30),
    inset 0 1px 0 rgba(255,154,60,.10);
  display:flex;flex-direction:column;gap:10px;
  min-height:185px;max-height:300px;
  justify-content:center;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg, var(--teal), var(--lantern), var(--amber), var(--silk));
  border-radius:24px 24px 0 0;
}
.card:hover{
  transform:translateY(-3px) scale(1.005);
  box-shadow:
    0 16px 48px rgba(0,180,170,.15),
    0 4px 12px rgba(0,0,0,.35),
    inset 0 1px 0 rgba(255,154,60,.15);
}
.card-meta{display:flex;justify-content:space-between;align-items:center;margin-top:2px}
.cat-label{
  font-size:.71rem;font-weight:700;
  background:linear-gradient(135deg,rgba(0,180,170,.20),rgba(255,154,60,.15));
  color:var(--lantern);
  padding:3px 10px;border-radius:14px;
  border:1px solid rgba(255,154,60,.30);
}
.card-count{font-size:.72rem;color:var(--text-muted);font-weight:600}
.card-body{
  text-align:center;flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
}
.foreign-text{
  font-family:var(--foreign);
  font-size:clamp(1.5rem,5vw,2.4rem);
  font-weight:700;color:var(--text);line-height:1.2;
  letter-spacing:.01em;
}
.jp-text{
  font-family:var(--jp);
  font-size:clamp(1.2rem,4vw,1.8rem);
  font-weight:700;color:var(--text);line-height:1.3;
}
.note-text{
  font-family:var(--foreign);
  font-size:clamp(.76rem,2vw,.90rem);
  color:var(--amber);font-style:italic;font-weight:400;
  background:rgba(255,209,102,.10);
  padding:3px 12px;border-radius:10px;
  border:1px solid rgba(255,209,102,.20);
}
.hint-tap{
  font-size:.73rem;color:var(--text-muted);
  display:flex;align-items:center;gap:4px;
  background:rgba(255,154,60,.07);
  padding:4px 12px;border-radius:12px;
}
.speak-btn{
  background:linear-gradient(135deg,rgba(0,180,170,.15),rgba(255,209,102,.12));
  border:1.5px solid rgba(0,180,170,.32);
  color:var(--teal);
  padding:5px 16px;border-radius:20px;cursor:pointer;
  font-size:.8rem;font-family:var(--jp);font-weight:700;
  transition:.18s;margin-top:4px;
}
.speak-btn:hover{
  background:linear-gradient(135deg, var(--teal), var(--lantern));
  color:#0a1a14;border-color:var(--teal);
  box-shadow:0 3px 10px rgba(0,180,170,.30);
}
.speak-btn.pulsing{animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ── 操作ボタン行 ── */
.action-row{display:flex;gap:6px;padding:6px 14px;flex-shrink:0}
.abtn{
  flex:1;padding:9px 4px;border-radius:14px;
  border:1.5px solid var(--border2);
  background:rgba(31,27,21,.65);
  color:var(--text-mid);
  cursor:pointer;font-family:var(--jp);font-size:.8rem;font-weight:700;
  transition:.18s;backdrop-filter:blur(4px);
}
.abtn:hover{
  background:rgba(255,154,60,.12);
  border-color:var(--lantern);color:var(--lantern);
  box-shadow:0 2px 8px rgba(255,154,60,.18);
}
.abtn:active{transform:scale(.96)}
/* ▶ 表示ボタン：ティール */
.abtn.primary{
  background:linear-gradient(135deg, var(--teal) 0%, #007a72 100%);
  color:#fff;border-color:var(--teal);
  box-shadow:0 3px 12px rgba(0,180,170,.35);
}
.abtn.primary:hover{filter:brightness(1.10);box-shadow:0 5px 16px rgba(0,180,170,.45)}
/* 次へ ボタン：ランタンオレンジ */
.abtn.danger{
  background:linear-gradient(135deg, var(--lantern) 0%, var(--amber) 100%);
  color:#1a0a00;border-color:var(--lantern);
  box-shadow:0 3px 12px rgba(255,154,60,.30);
}
.abtn.danger:hover{filter:brightness(1.08);box-shadow:0 5px 16px rgba(255,154,60,.40)}
/* ✓ 覚えた：シルクピンク */
.abtn.success{
  background:linear-gradient(135deg, #d04080 0%, var(--silk) 100%);
  color:#fff;border-color:var(--silk);
  box-shadow:0 3px 12px rgba(232,93,154,.28);
}
.abtn.success:hover{filter:brightness(1.08);box-shadow:0 5px 16px rgba(232,93,154,.38)}

/* ── キーボードヒント ── */
.kb-hints{
  padding:3px 14px 8px;text-align:center;
  font-size:.67rem;color:var(--text-muted);opacity:.7;flex-shrink:0;
}

/* ── 完了オーバーレイ ── */
.done-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(13,12,10,.92);
  backdrop-filter:blur(14px);
  z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:14px;
}
.done-overlay.show{display:flex}
.done-trophy{font-size:5rem;animation:bounce 1s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:scale(1) rotate(-3deg)}50%{transform:scale(1.18) rotate(3deg)}}
.done-msg{font-size:1.5rem;font-weight:800;color:var(--lantern);text-shadow:0 0 20px rgba(255,154,60,.50)}
.done-sub{font-size:.9rem;color:var(--text-muted)}

/* ── モーダル ── */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.65);
  backdrop-filter:blur(6px);
  z-index:50;overflow-y:auto;padding:20px;
}
.modal-overlay.show{display:flex;align-items:flex-start;justify-content:center}
.modal{
  background:rgba(22,19,16,.97);
  backdrop-filter:blur(16px);
  border:1.5px solid rgba(255,154,60,.22);
  border-radius:20px;width:100%;max-width:580px;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.65);
}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;
  background:linear-gradient(135deg, #241808, #1a1205);
  border-bottom:1px solid rgba(255,154,60,.20);
}
.modal-title{font-weight:800;font-size:1rem;color:var(--lantern)}
.modal-close{
  background:rgba(255,154,60,.15);border:1px solid rgba(255,154,60,.30);
  color:var(--lantern);font-size:1.2rem;cursor:pointer;
  padding:3px 8px;border-radius:8px;transition:.15s;
}
.modal-close:hover{background:rgba(255,154,60,.30)}
.search-input{
  width:100%;background:rgba(31,27,21,.80);
  border:none;border-bottom:2px solid rgba(255,154,60,.18);
  color:var(--text);
  padding:10px 16px;font-family:var(--jp);font-size:.9rem;outline:none;
}
.search-input::placeholder{color:var(--text-muted)}
.search-input:focus{border-bottom-color:var(--lantern);background:rgba(31,27,21,.95)}
.modal-body{max-height:70vh;overflow-y:auto;padding:8px 0}
.cat-group-title{
  padding:8px 18px 4px;font-size:.72rem;
  color:var(--lantern);font-weight:800;letter-spacing:.08em;
  background:rgba(255,154,60,.06);
}
.list-row{
  display:flex;align-items:center;padding:9px 18px;
  cursor:pointer;gap:12px;
  border-bottom:1px solid rgba(255,154,60,.07);transition:.15s;
}
.list-row:hover{background:rgba(255,154,60,.07)}
.list-row.mastered{opacity:.35}
.list-foreign{font-family:var(--foreign);font-size:.9rem;font-weight:700;flex:1;color:var(--text)}
.list-jp{font-family:var(--jp);font-size:.82rem;color:var(--text-muted);flex:1}
</style>
</head>
<body>
<div id="app">

<header>
  <div class="logo">🇻🇳 ベトナム語B2レベル重要頻出語彙 1000例文集</div>
  <div class="hbtns">
    <button class="hbtn" id="btnList" title="一覧">📋</button>
    <button class="hbtn" id="btnReset" title="リセット">🔄</button>
    <button class="hbtn" id="btnShuffle" title="シャッフル">🔀</button>
    <button class="hbtn" id="btnAuto" title="自動再生">▶️</button>
    <button class="hbtn" id="btnMute" title="ミュート">🔊</button>
  </div>
</header>

<div class="mode-row">
  <button class="mbtn active" data-mode="ja2vi">和 → 越</button>
  <button class="mbtn" data-mode="vi2ja">越 → 和</button>
  <button class="mbtn" data-mode="random">🎲 ランダム</button>
</div>

<div class="stats">
  <span>全<span class="stat-num" id="statTotal">0</span>件</span>
  <span>残り<span class="stat-num" id="statLeft">0</span>件</span>
  <span>✓<span class="stat-num" id="statDone">0</span>件</span>
  <div class="prog-wrap"><div class="prog-bar" id="progBar" style="width:0%"></div></div>
  <span class="stat-pct" id="statPct">0%</span>
</div>

<div class="cat-scroll" id="catScroll"></div>

<div class="card-area">
  <div class="card" id="mainCard">
    <div class="card-meta">
      <span class="cat-label" id="cardCat">—</span>
      <span class="card-count" id="cardCount">0 / 0</span>
    </div>
    <div class="card-body" id="cardBody">
      <div class="hint-tap">👆 カードをタップして開始</div>
    </div>
  </div>
</div>

<div class="action-row">
  <button class="abtn" id="btnPrev">← 戻る</button>
  <button class="abtn primary" id="btnReveal">▶ 表示</button>
  <button class="abtn" id="btnUncheck">◀ 戻す</button>
  <button class="abtn success" id="btnMaster">✓ 覚えた</button>
  <button class="abtn danger" id="btnNext">次へ →</button>
</div>

<div class="kb-hints">→ 次へ ／ ← 戻る ／ Enter 答えを見る ／ C 覚えた</div>

<div class="done-overlay" id="doneOverlay">
  <div class="done-trophy">🏆</div>
  <div class="done-msg">全カードチェック完了！</div>
  <div class="done-sub">リセットして最初から始めます…</div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">📋 カード一覧</span>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 日本語・ベトナム語で検索…">
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

</div><!-- #app -->

<script>
const CARDS_RAW = [
{id:"b2_1",cat:`政治・外交 (100例)`,foreign:`Chính phủ đã thông qua chính sách mới nhằm thúc đẩy tăng trưởng kinh tế.`,ja:`政府は経済成長促進のため新政策を承認した。`},
{id:"b2_2",cat:`政治・外交 (100例)`,foreign:`Quan hệ ngoại giao giữa hai nước đang được cải thiện đáng kể.`,ja:`両国間の外交関係は大きく改善している。`},
{id:"b2_3",cat:`政治・外交 (100例)`,foreign:`Cuộc họp thượng đỉnh tập trung vào vấn đề biến đổi khí hậu.`,ja:`首脳会議は気候変動問題に焦点を当てた。`},
{id:"b2_4",cat:`政治・外交 (100例)`,foreign:`Các bên liên quan vẫn chưa đạt được thỏa thuận cuối cùng.`,ja:`関係者はまだ最終合意に至っていない。`},
{id:"b2_5",cat:`政治・外交 (100例)`,foreign:`Chính sách này gây ra nhiều tranh cãi trong dư luận.`,ja:`この政策は世論で大きな議論を呼んでいる。`},
{id:"b2_6",cat:`政治・外交 (100例)`,foreign:`Chính phủ cam kết cải thiện môi trường đầu tư.`,ja:`政府は投資環境の改善を約束した。`},
{id:"b2_7",cat:`政治・外交 (100例)`,foreign:`Luật mới sẽ có hiệu lực từ năm tới.`,ja:`新法は来年施行される。`},
{id:"b2_8",cat:`政治・外交 (100例)`,foreign:`Các nhà lãnh đạo kêu gọi hợp tác quốc tế.`,ja:`指導者たちは国際協力を呼びかけた。`},
{id:"b2_9",cat:`政治・外交 (100例)`,foreign:`Vấn đề an ninh khu vực đang được quan tâm.`,ja:`地域安全保障が注目されている。`},
{id:"b2_10",cat:`政治・外交 (100例)`,foreign:`Dự luật này đã được thông qua với đa số phiếu.`,ja:`法案は多数決で可決された。`},

const CARDS = CARDS_RAW.map(c => ({
  id: c.id,
  category: c.cat || c.category || "未分類",
  // normalize fields
  q: c.q || c.foreign || c.question || "",
  a: c.a || c.ja || c.answer || "",
  question: c.q || c.foreign || c.question || "",
  answer: c.a || c.ja || c.answer || ""
}));


const LSKEY = 'vietnamese_b1_mastered_v1';
let cards = [];
let mastered = new Set();
let filteredIds = [];
let curIdx = 0;
let mode = 'ja2vi';
let curCat = 'すべて';
let revealed = false;
let isMuted = false;
let cardMode = 'ja2vi';

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function loadMastered(){
  try{const d=localStorage.getItem(LSKEY);if(d)mastered=new Set(JSON.parse(d));}catch(e){}
}
function saveMastered(){
  try{localStorage.setItem(LSKEY,JSON.stringify([...mastered]));}catch(e){}
}

function init(){
  loadMastered();
  cards = CARDS_RAW.map((d,i)=>({...d,_id:d.id||i}));
  buildCatButtons();
  applyFilter();
  updateStats();
  renderCard();
}

function buildCatButtons(){
  const el=document.getElementById('catScroll');
  const cats=['すべて',...new Set(cards.map(c=>c.cat))];
  el.innerHTML=cats.map(c=>`<button class="cpill${c===curCat?' active':''}" data-cat="${escHtml(c)}">${escHtml(c)}</button>`).join('');
  el.querySelectorAll('.cpill').forEach(b=>b.addEventListener('click',()=>{
    if(isAutoPlay) stopAutoPlay();
    curCat=b.dataset.cat;
    el.querySelectorAll('.cpill').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    applyFilter();
    curIdx=0;revealed=false;renderCard();
  }));
}

function applyFilter(){
  filteredIds = cards
    .filter(c=>curCat==='すべて'||c.cat===curCat)
    .filter(c=>!mastered.has(c._id))
    .map(c=>c._id);
  updateStats();
}

function updateStats(){
  const total=cards.filter(c=>curCat==='すべて'||c.cat===curCat).length;
  const done=cards.filter(c=>(curCat==='すべて'||c.cat===curCat)&&mastered.has(c._id)).length;
  const left=filteredIds.length;
  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statLeft').textContent=left;
  document.getElementById('statDone').textContent=done;
  document.getElementById('progBar').style.width=pct+'%';
  document.getElementById('statPct').textContent=pct+'%';
}

function getCard(){
  if(filteredIds.length===0)return null;
  const id=filteredIds[curIdx];
  return cards.find(c=>c._id===id)||null;
}

// Windows Chrome/Edge の先頭切れ対策
const isWinChromium = /Windows/.test(navigator.userAgent) &&
                      /Chrome|Edg/.test(navigator.userAgent);
const sacrificeWord = (t) => isWinChromium ? 'ừ, ' + t : t;

function speakForeign(text, onDone){
  if(isMuted){if(onDone)onDone();return;}
  window.speechSynthesis.cancel();
  function doSpeak(lang){
    const u=new SpeechSynthesisUtterance(sacrificeWord(text));
    u.lang=lang; u.rate=0.82; u.pitch=1.0;
    u.onend=()=>{if(onDone)onDone();};
    u.onerror=()=>{if(onDone)onDone();};
    window.speechSynthesis.speak(u);
  }
  const voices=window.speechSynthesis.getVoices();
  const preferred=['vi-VN','vi','en-US'];
  let chosen=null;
  for(const lang of preferred){
    const v=voices.find(v=>v.lang===lang||v.lang.startsWith('vi'));
    if(v){chosen=v.lang;break;}
  }
  doSpeak(chosen||'vi-VN');
}

function speakJapanese(text, onDone){
  if(isMuted){if(onDone)onDone();return;}
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ja-JP'; u.rate=0.85;
  u.onend=()=>{if(onDone)onDone();};
  u.onerror=()=>{if(onDone)onDone();};
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

function speakAnswer(btn){
  const card=getCard();if(!card)return;
  const b=btn||document.getElementById('speakBtn');
  if(b)b.classList.add('pulsing');
  const done=()=>{if(b)b.classList.remove('pulsing');};
  if(cardMode==='ja2vi') speakForeign(card.foreign,done);
  else speakJapanese(card.ja,done);
}

function renderCard(){
  const card=getCard();
  const body=document.getElementById('cardBody');
  const catEl=document.getElementById('cardCat');
  const countEl=document.getElementById('cardCount');
  updateStats();

  if(!card){
    catEl.textContent='—';
    countEl.textContent='0 / 0';
    body.innerHTML='<div class="hint-tap">🎉 このカテゴリは全部覚えました！</div>';
    return;
  }

  catEl.textContent=card.cat;
  countEl.textContent=(curIdx+1)+' / '+filteredIds.length;

  if(mode==='random') cardMode=Math.random()<.5?'ja2vi':'vi2ja';
  else cardMode=mode;

  if(!revealed){
    const qText = cardMode==='ja2vi'
      ? `<div class="jp-text">${escHtml(card.ja)}</div>`
      : `<div class="foreign-text">${escHtml(card.foreign)}</div>`;
    body.innerHTML=qText+'<div class="hint-tap">👆 タップして答えを見る</div>';
  } else {
    let aHTML = '';
    if(cardMode==='ja2vi'){
      aHTML = `<div class="foreign-text">${escHtml(card.foreign)}</div>`;
      if(card.note) aHTML += `<div class="note-text">📝 ${escHtml(card.note)}</div>`;
    } else {
      aHTML = `<div class="jp-text">${escHtml(card.ja)}</div>`;
      if(card.note) aHTML += `<div class="note-text">📝 ${escHtml(card.note)}</div>`;
    }
    aHTML += `<button class="speak-btn" id="speakBtn">🔊 読み上げ</button>`;
    body.innerHTML=aHTML;
    document.getElementById('speakBtn').addEventListener('click',e=>{
      e.stopPropagation();speakAnswer(e.currentTarget);
    });
    speakAnswer(null);
  }
}

  if(isAutoPlay) stopAutoPlay();
  const card=getCard();if(!card)return;
  mastered.add(card._id);
  saveMastered();
  applyFilter();
  const total=cards.filter(c=>curCat==='すべて'||c.cat===curCat).length;
  const done=cards.filter(c=>(curCat==='すべて'||c.cat===curCat)&&mastered.has(c._id)).length;
  if(done>=total&&total>0){showDone();return;}
  if(curIdx>=filteredIds.length)curIdx=0;
  revealed=false;renderCard();
});

document.querySelectorAll('.mbtn').forEach(b=>b.addEventListener('click',()=>{

const btnReset=document.getElementById('btnReset');
btnReset.addEventListener('click',()=>{
  if(mastered.size===0)return;
  mastered.clear();saveMastered();
  applyFilter();curIdx=0;revealed=false;renderCard();
  btnReset.textContent='✅';btnReset.classList.add('active-flash');
  setTimeout(()=>{btnReset.textContent='🔄';btnReset.classList.remove('active-flash');},800);
});

const btnShuffle=document.getElementById('btnShuffle');
btnShuffle.addEventListener('click',()=>{
  for(let i=filteredIds.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [filteredIds[i],filteredIds[j]]=[filteredIds[j],filteredIds[i]];
  }
  curIdx=0;revealed=false;renderCard();
  btnShuffle.textContent='✅';btnShuffle.classList.add('active-flash');
  setTimeout(()=>{btnShuffle.textContent='🔀';btnShuffle.classList.remove('active-flash');},800);
});

document.getElementById('btnMute').addEventListener('click',function(){
  isMuted=!isMuted;
  this.textContent=isMuted?'🔇':'🔊';
  if(isMuted)window.speechSynthesis.cancel();
});

// ── 自動再生 ──────────────────────────────────────────────
let isAutoPlay = false;
let autoTimer  = null;

function stopAutoPlay(){
  isAutoPlay = false;
  clearTimeout(autoTimer);
  autoTimer = null;
  window.speechSynthesis.cancel();
  const btn = document.getElementById('btnAuto');
  btn.textContent = '▶️';
  btn.classList.remove('auto-on');
  btn.title = '自動再生';
}

function autoStep(){
  if(!isAutoPlay) return;
  if(!getCard()){ stopAutoPlay(); return; }
  revealed = false;
  renderCard();
  autoTimer = setTimeout(()=>{
    if(!isAutoPlay) return;
    revealed = true;
    renderCard();
    autoSpeakAndNext();
  }, 2200);
}

function autoSpeakAndNext(){
  if(!isAutoPlay) return;
  const card = getCard();
  if(!card){ stopAutoPlay(); return; }

  if(isMuted){
    autoTimer = setTimeout(()=>{ if(isAutoPlay) advanceAuto(); }, 3500);
    return;
  }

  window.speechSynthesis.cancel();

  const text = cardMode==='ja2vi' ? card.foreign : card.ja;
  const spokenText = cardMode==='ja2vi' ? sacrificeWord(text) : text;

  const u = new SpeechSynthesisUtterance(spokenText);
  u.rate  = cardMode==='ja2vi' ? 0.82 : 0.85;
  u.pitch = 1.0;

  const onFinish = ()=>{
    if(!isAutoPlay) return;
    autoTimer = setTimeout(()=>{ if(isAutoPlay) advanceAuto(); }, 2500);
  };
  u.onend  = onFinish;
  u.onerror= onFinish;

  if(cardMode==='ja2vi'){
    const voices  = window.speechSynthesis.getVoices();
    let chosen = null;
    const preferred = ['vi-VN','vi','en-US'];
    for(const l of preferred){
      const v = voices.find(v=>v.lang===l||v.lang.startsWith('vi'));
      if(v){chosen=v.lang;break;}
    }
    u.lang = chosen||'vi-VN';
  } else {
    u.lang = 'ja-JP';
  }

  window.speechSynthesis.speak(u);
}

function advanceAuto(){
  if(!isAutoPlay) return;
  if(filteredIds.length === 0){ stopAutoPlay(); return; }
  curIdx = (curIdx + 1) % filteredIds.length;
  autoStep();
}

document.getElementById('btnAuto').addEventListener('click', function(){
  if(isAutoPlay){
    stopAutoPlay();
  } else {
    if(filteredIds.length === 0) return;
    isAutoPlay = true;
    this.textContent = '⏹️';
    this.classList.add('auto-on');
    this.title = '自動再生を停止';
    autoStep();
  }
});

function showDone(){
  const ov=document.getElementById('doneOverlay');
  ov.classList.add('show');
  setTimeout(()=>{
    ov.classList.remove('show');
    mastered.clear();saveMastered();
    applyFilter();curIdx=0;revealed=false;renderCard();
  },1800);
}

// Modal
document.getElementById('btnList').addEventListener('click',openModal);
document.getElementById('modalClose').addEventListener('click',closeModal);
document.getElementById('modalOverlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('modalOverlay'))closeModal();
});
document.getElementById('searchInput').addEventListener('input',renderModal);

function openModal(){
  if(isAutoPlay) stopAutoPlay();
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('searchInput').value='';
  renderModal();
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('show');
}
function renderModal(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const body=document.getElementById('modalBody');
  const cats=[...new Set(cards.map(c=>c.cat))];
  let html='';
  cats.forEach(cat=>{
    const rows=cards.filter(c=>{
      if(c.cat!==cat)return false;
      if(!q)return true;
      return c.foreign.toLowerCase().includes(q)||c.ja.includes(q);
    });
    if(rows.length===0)return;
    html+=`<div class="cat-group-title">${escHtml(cat)}</div>`;
    rows.forEach(c=>{
      const m=mastered.has(c._id)?'mastered':'';
      html+=`<div class="list-row ${m}" data-id="${escHtml(String(c._id))}">
        <span class="list-foreign">${escHtml(c.foreign)}</span>
        <span class="list-jp">${escHtml(c.ja)}</span>
      </div>`;
    });
  });
  body.innerHTML=html||'<div style="padding:20px;color:var(--text-muted);text-align:center">該当なし</div>';
  body.querySelectorAll('.list-row').forEach(row=>{
    row.addEventListener('click',()=>{
      const id=row.dataset.id;
      const target=cards.find(c=>String(c._id)===id);
      if(!target)return;
      if(curCat!==target.cat&&curCat!=='すべて'){
        curCat='すべて';
        document.querySelectorAll('.cpill').forEach(p=>{
          p.classList.toggle('active',p.dataset.cat==='すべて');
        });
        applyFilter();
      }
      let idx=filteredIds.indexOf(target._id);
      if(idx===-1){
        filteredIds=cards.filter(c=>curCat==='すべて'||c.cat===curCat).map(c=>c._id);
        idx=filteredIds.indexOf(target._id);
      }
      if(idx!==-1)curIdx=idx;
      revealed=false;
      closeModal();
      renderCard();
    });
  });
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(document.getElementById('modalOverlay').classList.contains('show')){
    if(e.key==='Escape')closeModal();return;
  }
  if(e.key==='ArrowRight'||e.key==='ArrowLeft'){
    const d=e.key==='ArrowRight'?1:-1;
    if(filteredIds.length===0)return;
    curIdx=(curIdx+d+filteredIds.length)%filteredIds.length;
    revealed=false;renderCard();
  }else if(e.key==='Enter'||e.key===' '){
    e.preventDefault();
    if(!getCard())return;
    revealed=!revealed;renderCard();
  }else if(e.key.toLowerCase()==='c'){
    document.getElementById('btnMaster').click();
  }
});

window.speechSynthesis.onvoiceschanged=function(){};

init();
</script>
